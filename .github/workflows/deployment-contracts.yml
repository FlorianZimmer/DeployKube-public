name: Deployment Contracts

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-deployment-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep (rg)
        run: |
          if command -v rg >/dev/null 2>&1; then
            rg --version
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y ripgrep
          rg --version

      - name: Install yq (mikefarah)
        run: |
          set -euo pipefail
          if command -v yq >/dev/null 2>&1; then
            yq --version
            exit 0
          fi
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.47.2/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Install jq
        run: |
          if command -v jq >/dev/null 2>&1; then
            jq --version
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y jq
          jq --version

      - name: Install kustomize
        run: |
          set -euo pipefail
          if command -v kustomize >/dev/null 2>&1; then
            kustomize version
            exit 0
          fi
          KUSTOMIZE_VERSION="v5.6.0"
          tmpdir="$(mktemp -d)"
          curl -sSfL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" -o "${tmpdir}/kustomize.tgz"
          tar -xzf "${tmpdir}/kustomize.tgz" -C "${tmpdir}"
          sudo mv "${tmpdir}/kustomize" /usr/local/bin/kustomize
          sudo chmod +x /usr/local/bin/kustomize
          rm -rf "${tmpdir}"
          kustomize version

      - name: Setup Helm v3
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Run deployment contracts suite
        run: ./tests/scripts/ci.sh deployment-contracts
