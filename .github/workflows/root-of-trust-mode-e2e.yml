name: Root Of Trust Mode E2E

on:
  pull_request:
    paths:
      - "platform/gitops/components/secrets/bootstrap/**"
      - "platform/gitops/components/secrets/vault/**"
      - "platform/gitops/components/secrets/external-secrets/**"
      - "platform/gitops/deployments/**"
      - "tests/scripts/e2e-root-of-trust-modes-matrix.sh"
      - "tests/scripts/lib/kms_shim_external_proxy_sim.py"
      - ".github/workflows/root-of-trust-mode-e2e.yml"
  workflow_dispatch:
    inputs:
      profile:
        description: quick runs inCluster; full runs quick plus optional external
        type: choice
        options:
          - quick
          - full
        default: full
      run_external:
        description: Include external mode in full profile (auto|yes|no)
        type: choice
        options:
          - auto
          - yes
          - no
        default: auto
      provision_external_simulator:
        description: Provision in-cluster external KMS simulator (auto|yes|no)
        type: choice
        options:
          - yes
          - auto
          - no
        default: yes
      verify_vault_restart:
        description: Verify Vault restart/unseal during external mode (yes|no)
        type: choice
        options:
          - yes
          - no
        default: yes
      external_address:
        description: Optional override for external seal endpoint URL
        type: string
        default: ""
      kubeconfig_path:
        description: Optional absolute path to kubeconfig on runner
        type: string
        default: ""
  schedule:
    # Nightly run. Intentionally offset from :00.
    - cron: "53 3 * * *"

permissions:
  contents: read

concurrency:
  # Runtime mode tests mutate singleton DeploymentConfig; never run in parallel.
  group: deploykube-runtime-e2e
  cancel-in-progress: false

jobs:
  quick:
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       vars.DK_ROT_E2E_ENABLED == 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'quick')
    runs-on:
      - self-hosted
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate script syntax
        run: bash -n ./tests/scripts/e2e-root-of-trust-modes-matrix.sh

      - name: Resolve kubeconfig
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.kubeconfig_path }}" ]]; then
            echo "KUBECONFIG=${{ github.event.inputs.kubeconfig_path }}" >> "${GITHUB_ENV}"
          elif [[ -n "${{ vars.DK_ROT_E2E_KUBECONFIG }}" ]]; then
            echo "KUBECONFIG=${{ vars.DK_ROT_E2E_KUBECONFIG }}" >> "${GITHUB_ENV}"
          elif [[ -n "${{ vars.DK_E2E_KUBECONFIG }}" ]]; then
            echo "KUBECONFIG=${{ vars.DK_E2E_KUBECONFIG }}" >> "${GITHUB_ENV}"
          fi

      - name: Run quick root-of-trust mode E2E
        env:
          DK_ROT_E2E_ACK_CONFIG_MUTATION: yes
        run: |
          set -euo pipefail
          ./tests/scripts/e2e-root-of-trust-modes-matrix.sh \
            --profile quick \
            --run-external no \
            --timeout 25m \
            --ack-config-mutation yes

  full:
    if: |
      (github.event_name == 'schedule' && vars.DK_ROT_E2E_ENABLED == 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'full')
    runs-on:
      - self-hosted
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate script syntax
        run: bash -n ./tests/scripts/e2e-root-of-trust-modes-matrix.sh

      - name: Resolve kubeconfig
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.kubeconfig_path }}" ]]; then
            echo "KUBECONFIG=${{ github.event.inputs.kubeconfig_path }}" >> "${GITHUB_ENV}"
          elif [[ -n "${{ vars.DK_ROT_E2E_KUBECONFIG }}" ]]; then
            echo "KUBECONFIG=${{ vars.DK_ROT_E2E_KUBECONFIG }}" >> "${GITHUB_ENV}"
          elif [[ -n "${{ vars.DK_E2E_KUBECONFIG }}" ]]; then
            echo "KUBECONFIG=${{ vars.DK_E2E_KUBECONFIG }}" >> "${GITHUB_ENV}"
          fi

      - name: Run full root-of-trust mode E2E
        env:
          DK_ROT_E2E_ACK_CONFIG_MUTATION: yes
          DK_ROT_E2E_EXTERNAL_ADDRESS: ${{ vars.DK_ROT_E2E_EXTERNAL_ADDRESS }}
          DK_ROT_E2E_PROVISION_EXTERNAL_SIMULATOR: ${{ vars.DK_ROT_E2E_PROVISION_EXTERNAL_SIMULATOR }}
          DK_ROT_E2E_EXTERNAL_SIMULATOR_NAMESPACE: ${{ vars.DK_ROT_E2E_EXTERNAL_SIMULATOR_NAMESPACE }}
          DK_ROT_E2E_EXTERNAL_SIMULATOR_NAME: ${{ vars.DK_ROT_E2E_EXTERNAL_SIMULATOR_NAME }}
          DK_ROT_E2E_VERIFY_VAULT_RESTART: ${{ vars.DK_ROT_E2E_VERIFY_VAULT_RESTART }}
        run: |
          set -euo pipefail
          run_external="${{ github.event.inputs.run_external }}"
          if [[ -z "${run_external}" ]]; then
            run_external="${{ vars.DK_ROT_E2E_RUN_EXTERNAL }}"
          fi
          if [[ -z "${run_external}" ]]; then
            run_external="auto"
          fi

          provision_sim="${{ github.event.inputs.provision_external_simulator }}"
          if [[ -z "${provision_sim}" ]]; then
            provision_sim="${DK_ROT_E2E_PROVISION_EXTERNAL_SIMULATOR:-}"
          fi
          if [[ -z "${provision_sim}" ]]; then
            provision_sim="yes"
          fi

          verify_restart="${{ github.event.inputs.verify_vault_restart }}"
          if [[ -z "${verify_restart}" ]]; then
            verify_restart="${DK_ROT_E2E_VERIFY_VAULT_RESTART:-}"
          fi
          if [[ -z "${verify_restart}" ]]; then
            verify_restart="yes"
          fi

          external_address="${{ github.event.inputs.external_address }}"
          if [[ -n "${external_address}" ]]; then
            export DK_ROT_E2E_EXTERNAL_ADDRESS="${external_address}"
          fi

          ./tests/scripts/e2e-root-of-trust-modes-matrix.sh \
            --profile full \
            --run-external "${run_external}" \
            --provision-external-simulator "${provision_sim}" \
            --verify-vault-restart "${verify_restart}" \
            --timeout 30m \
            --ack-config-mutation yes
