name: Support Session Cleanup

on:
  workflow_dispatch:
  schedule:
    # Daily, intentionally offset from :00 to avoid noisy collisions.
    - cron: "17 4 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup-expired:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep (rg)
        run: |
          if command -v rg >/dev/null 2>&1; then
            rg --version
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y ripgrep
          rg --version

      - name: Install yq (mikefarah)
        run: |
          set -euo pipefail
          if command -v yq >/dev/null 2>&1; then
            yq --version
            exit 0
          fi
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.47.2/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Install kustomize
        run: |
          set -euo pipefail
          if command -v kustomize >/dev/null 2>&1; then
            kustomize version
            exit 0
          fi
          KUSTOMIZE_VERSION="v5.6.0"
          tmpdir="$(mktemp -d)"
          curl -sSfL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" -o "${tmpdir}/kustomize.tgz"
          tar -xzf "${tmpdir}/kustomize.tgz" -C "${tmpdir}"
          sudo mv "${tmpdir}/kustomize" /usr/local/bin/kustomize
          sudo chmod +x /usr/local/bin/kustomize
          rm -rf "${tmpdir}"
          kustomize version

      - name: Cleanup expired sessions (apply)
        run: ./scripts/toils/support-sessions/cleanup-expired.sh --apply

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore(multitenancy): prune expired support sessions"
          commit-message: "chore(multitenancy): prune expired support sessions"
          branch: "automation/support-sessions/prune-expired"
          delete-branch: true
          body: |
            Automated cleanup PR generated by `./scripts/toils/support-sessions/cleanup-expired.sh --apply`.

