schemaVersion: v1alpha1
description: Component-owned Trivy targets for External Secrets Operator.
watch_paths:
  - platform/gitops/artifacts/runtime-artifact-index.yaml
  - platform/gitops/components/secrets/external-secrets
  - tests/trivy/components/external-secrets.yaml
image_targets:
  - id: external-secrets-operator
    artifact_catalog: runtime-artifacts
    artifact_name: external-secrets-operator
config_targets:
  - id: external-secrets-manifests
    path: platform/gitops/components/secrets/external-secrets
