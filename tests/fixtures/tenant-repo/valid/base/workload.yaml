apiVersion: apps/v1
kind: Deployment
metadata:
  name: example
  namespace: t-acme-p-payments-dev-app
spec:
  selector:
    matchLabels:
      app: example
  template:
    metadata:
      labels:
        app: example
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80

