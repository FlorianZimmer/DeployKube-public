apiVersion: apps/v1
kind: Deployment
metadata:
  name: example
  namespace: t-acme-p-payments-dev-app
spec:
  selector:
    matchLabels:
      app: example
  template:
    metadata:
      labels:
        app: example
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
---
apiVersion: v1
kind: Service
metadata:
  name: example
  namespace: t-acme-p-payments-dev-app
spec:
  selector:
    app: example
  ports:
    - port: 80
      targetPort: 80
