apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tenant-allow-garage-s3-egress
  namespace: t-<orgId>-p-<projectId>-dev-app
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: garage
          podSelector:
            matchLabels:
              app.kubernetes.io/name: garage
              app.kubernetes.io/component: object-storage
      ports:
        - protocol: TCP
          port: 3900
