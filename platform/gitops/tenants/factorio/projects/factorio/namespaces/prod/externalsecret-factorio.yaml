apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: factorio-secret
  namespace: t-factorio-p-factorio-prod-app
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-core
    kind: ClusterSecretStore
  target:
    name: factorio-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: apps/factorio
        property: username
    - secretKey: token
      remoteRef:
        key: apps/factorio
        property: token
