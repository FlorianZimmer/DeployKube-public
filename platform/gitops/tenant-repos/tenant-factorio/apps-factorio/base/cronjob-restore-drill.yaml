apiVersion: batch/v1
kind: CronJob
metadata:
  name: factorio-restore-drill
  labels:
    app.kubernetes.io/name: factorio
    app.kubernetes.io/component: backup
spec:
  # A restore drill should be periodic but low-impact.
  schedule: "15 3 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 0
      activeDeadlineSeconds: 1800
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: drill
              image: itzg/mc-backup:latest
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              env:
                - name: RESTIC_REPOSITORY
                  valueFrom:
                    secretKeyRef:
                      name: factorio-backup
                      key: RESTIC_REPOSITORY
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: factorio-backup
                      key: RESTIC_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: factorio-backup
                      key: S3_ACCESS_KEY
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: factorio-backup
                      key: S3_SECRET_KEY
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    secretKeyRef:
                      name: factorio-backup
                      key: S3_REGION
                - name: RESTIC_RESTORE_TIMEOUT
                  value: 20m
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  (set -o pipefail 2>/dev/null) || true

                  timeout "${RESTIC_RESTORE_TIMEOUT}" restic snapshots --latest 1 >/dev/null

                  rm -rf /restore/* || true
                  timeout "${RESTIC_RESTORE_TIMEOUT}" restic restore latest \
                    --target /restore \
                    --include /factorio/saves \
                    --include /factorio/config \
                    --include /factorio/player-data.json

                  test -d /restore/factorio/saves
                  ls -1 /restore/factorio/saves/*.zip >/dev/null
                  test -d /restore/factorio/config
                  test -f /restore/factorio/player-data.json

                  echo "[restore-drill] OK: restored latest snapshot and validated expected files"
              volumeMounts:
                - name: restore-tmp
                  mountPath: /restore
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 512Mi
          volumes:
            - name: restore-tmp
              emptyDir: {}

