apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: factorio-data
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    darksite.cloud/backup: skip
    darksite.cloud/backup-skip-reason: in-app-restic
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Tenant baseline quota: requests.storage <= 10Gi per namespace (default).
      storage: 10Gi
  storageClassName: shared-rwo
