apiVersion: v1
kind: ConfigMap
metadata:
  name: factorio-server-settings
data:
  server-settings.json: |
    {
      "name": "factorio/factorio",
      "description": "DeployKube tenant canary (no public listing; no auth server calls).",
      "tags": ["deploykube", "tenant-canary"],
      "max_players": 0,
      "visibility": {
        "public": false,
        "lan": true
      },
      "username": "",
      "token": "",
      "game_password": "",
      "require_user_verification": false,
      "allow_commands": "admins-only",
      "autosave_interval": 10,
      "autosave_slots": 5,
      "afk_autokick_interval": 0
    }
