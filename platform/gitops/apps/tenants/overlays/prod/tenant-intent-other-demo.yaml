apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenant-intent-other-demo
  namespace: argocd
  labels:
    darksite.cloud/tenant-id: other
    darksite.cloud/project-id: demo
  annotations:
    # Tenant intent applies cluster-scoped namespaces; sync early to avoid “missing namespace” races.
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: tenant-intent-other-p-demo
  destination:
    name: in-cluster
    namespace: t-other-p-demo-prod-app
  source:
    repoURL: https://forgejo-https.forgejo.svc.cluster.local/platform/cluster-config.git
    targetRevision: main
    path: tenants/other/projects/demo/namespaces/prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PrunePropagationPolicy=background
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        # Controller-managed defaults/finalizers
        - .metadata.finalizers
        - .spec.target.deletionPolicy
        - .spec.target.template.engineVersion
        - .spec.target.template.mergePolicy
