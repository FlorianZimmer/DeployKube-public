apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - tenant-intent-smoke-demo.yaml
  - tenant-intent-other-demo.yaml
  - tenant-intent-factorio-factorio.yaml

patches:
  # Dev profiles do not deploy the backup-system component by default, so avoid creating
  # ConfigMaps in a namespace that does not exist.
  - path: patches/delete-backup-system-tenant-registry.yaml
  # storage-garage owns Namespace/garage; ensure it exists before writing tenant registry state there.
  - path: patches/add-sync-wave-garage-tenant-registry.yaml
  # shared-rbac owns Namespace/rbac-system; avoid root app sync races during bootstrap.
  - path: patches/add-sync-wave-rbac-system-tenant-registry.yaml
