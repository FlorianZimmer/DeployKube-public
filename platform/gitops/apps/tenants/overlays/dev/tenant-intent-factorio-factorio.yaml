apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenant-intent-factorio-factorio
  namespace: argocd
  labels:
    darksite.cloud/tenant-id: factorio
    darksite.cloud/project-id: factorio
  annotations:
    # Tenant intent applies cluster-scoped namespaces; sync early to avoid “missing namespace” races.
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: tenant-intent-factorio-p-factorio
  destination:
    name: in-cluster
    namespace: t-factorio-p-factorio-dev-app
  source:
    repoURL: https://forgejo-https.forgejo.svc.cluster.local/platform/cluster-config.git
    targetRevision: main
    path: tenants/factorio/projects/factorio/namespaces/dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PrunePropagationPolicy=background
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        # Controller-managed defaults/finalizers
        - .metadata.finalizers
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.target.deletionPolicy
        - .spec.target.template.engineVersion
        - .spec.target.template.mergePolicy
