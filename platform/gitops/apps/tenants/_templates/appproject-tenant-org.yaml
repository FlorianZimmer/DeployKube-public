apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  # Template: replace <orgId>
  name: tenant-<orgId>
  namespace: argocd
spec:
  description: Tenant org <orgId>

  # Tenant self-service (no per-tenant growth in global argocd-rbac-cm):
  # Bind Keycloak groups to Argo roles inside the tenant AppProject.
  roles:
    - name: admin
      description: Tenant org admin (<orgId>)
      policies:
        - p, proj:tenant-<orgId>:admin, applications, get, tenant-<orgId>/*, allow
        - p, proj:tenant-<orgId>:admin, applications, sync, tenant-<orgId>/*, allow
        - p, proj:tenant-<orgId>:admin, logs, get, tenant-<orgId>/*, allow
        - p, proj:tenant-<orgId>:admin, projects, get, tenant-<orgId>, allow
      groups:
        - dk-tenant-<orgId>-admins

    - name: viewer
      description: Tenant org viewer (<orgId>)
      policies:
        - p, proj:tenant-<orgId>:viewer, applications, get, tenant-<orgId>/*, allow
        - p, proj:tenant-<orgId>:viewer, logs, get, tenant-<orgId>/*, allow
        - p, proj:tenant-<orgId>:viewer, projects, get, tenant-<orgId>, allow
      groups:
        - dk-tenant-<orgId>-viewers

  # Repo-per-project product mode:
  # - Forgejo org: tenant-<orgId>
  # - Repos: apps-<projectId>.git
  sourceRepos:
    - https://forgejo-https.forgejo.svc.cluster.local/tenant-<orgId>/*

  # Namespace boundary (org-scoped):
  destinations:
    - name: in-cluster
      namespace: t-<orgId>-p-*-*

  # Tenants must not apply cluster-scoped resources via GitOps.
  # Keep this list empty by using a non-existent API group/kind.
  clusterResourceWhitelist:
    - group: do-not-use
      kind: DoNotUse

  # Namespaced workload-plane allowlist (tight by default; expand with evidence).
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: PersistentVolumeClaim
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: apps
      kind: Deployment
    - group: apps
      kind: DaemonSet
    - group: apps
      kind: StatefulSet
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: policy
      kind: PodDisruptionBudget
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
