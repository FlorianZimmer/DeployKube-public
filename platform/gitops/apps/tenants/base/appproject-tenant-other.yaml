apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: tenant-other
  namespace: argocd
  labels:
    darksite.cloud/tenant-id: other
  annotations:
    argocd.argoproj.io/sync-wave: "-98"
spec:
  description: Tenant org other

  # Tenant self-service (no per-tenant growth in global argocd-rbac-cm):
  # Bind Keycloak groups to Argo roles inside the tenant AppProject.
  roles:
    - name: admin
      description: Tenant org admin (other)
      policies:
        - p, proj:tenant-other:admin, applications, get, tenant-other/*, allow
        - p, proj:tenant-other:admin, applications, sync, tenant-other/*, allow
        - p, proj:tenant-other:admin, logs, get, tenant-other/*, allow
        - p, proj:tenant-other:admin, projects, get, tenant-other, allow
      groups:
        - dk-tenant-other-admins

    - name: viewer
      description: Tenant org viewer (other)
      policies:
        - p, proj:tenant-other:viewer, applications, get, tenant-other/*, allow
        - p, proj:tenant-other:viewer, logs, get, tenant-other/*, allow
        - p, proj:tenant-other:viewer, projects, get, tenant-other, allow
      groups:
        - dk-tenant-other-viewers

  # Repo-per-project product mode:
  # - Forgejo org: tenant-other
  # - Repos: apps-<projectId>.git
  sourceRepos:
    - https://forgejo-https.forgejo.svc.cluster.local/tenant-other/*

  # Namespace boundary (org-scoped):
  destinations:
    - name: in-cluster
      namespace: t-other-p-*-*

  # Tenants must not apply cluster-scoped resources via GitOps.
  # Keep this list empty by using a non-existent API group/kind.
  clusterResourceWhitelist:
    - group: do-not-use
      kind: DoNotUse

  # Namespaced workload-plane allowlist (tight by default; expand with evidence).
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: PersistentVolumeClaim
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: apps
      kind: Deployment
    - group: apps
      kind: DaemonSet
    - group: apps
      kind: StatefulSet
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: policy
      kind: PodDisruptionBudget
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
