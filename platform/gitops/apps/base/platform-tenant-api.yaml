apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-tenant-api
  namespace: argocd
  annotations:
    # Must run after the tenant provisioner CRDs are installed.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  destination:
    name: in-cluster
    namespace: argocd
  source:
    repoURL: https://forgejo-https.forgejo.svc.cluster.local/platform/cluster-config.git
    targetRevision: main
    path: apps/tenant-api/base
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
