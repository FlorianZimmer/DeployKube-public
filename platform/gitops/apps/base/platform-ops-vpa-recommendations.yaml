apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-ops-vpa-recommendations
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6.2"
spec:
  project: platform
  destination:
    name: in-cluster
    namespace: kube-system
  source:
    repoURL: https://forgejo-https.forgejo.svc.cluster.local/platform/cluster-config.git
    targetRevision: main
    path: components/platform/ops/vpa-recommendations
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true

