apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: certificates-vault-pki-external
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6.5"
spec:
  project: platform
  destination:
    name: in-cluster
    namespace: vault-system
  source:
    repoURL: https://forgejo-https.forgejo.svc.cluster.local/platform/cluster-config.git
    targetRevision: main
    path: components/certificates/vault-pki-external
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
