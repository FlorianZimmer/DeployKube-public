apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage-garage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform
  destination:
    name: in-cluster
    namespace: garage
  source:
    repoURL: https://forgejo-https.forgejo.svc.cluster.local/platform/cluster-config.git
    targetRevision: main
    path: components/storage/garage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        # K8s drops apiVersion/kind inside volumeClaimTemplates; this prevents perpetual OutOfSync noise.
        - .spec.volumeClaimTemplates[].apiVersion
        - .spec.volumeClaimTemplates[].kind
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        # Controller-managed defaults/finalizers
        - .metadata.finalizers
        - .spec.target.deletionPolicy
        - .spec.target.template.engineVersion
        - .spec.target.template.mergePolicy
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        # Gateway API defaults group/kind on parent/backend refs
        - .spec.parentRefs[].group
        - .spec.parentRefs[].kind
        - .spec.rules[].backendRefs[].group
        - .spec.rules[].backendRefs[].kind
