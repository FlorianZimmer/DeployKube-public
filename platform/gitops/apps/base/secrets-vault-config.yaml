apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-vault-config
  namespace: argocd
  annotations:
    # Seeds Vault KV paths consumed by ESO projections (e.g. PowerDNS, Keycloak DB creds).
    # Must run after Vault bootstrap and before apps that consume those secrets.
    argocd.argoproj.io/sync-wave: "1.2"
spec:
  project: platform
  destination:
    name: in-cluster
    namespace: vault-system
  source:
    repoURL: https://forgejo-https.forgejo.svc.cluster.local/platform/cluster-config.git
    targetRevision: main
    path: components/secrets/vault/config
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: vault-kubernetes-tokenreviewer
      namespace: vault-system
      jsonPointers:
        - /data
        - /metadata/annotations
