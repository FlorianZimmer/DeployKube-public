apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-tenant-provisioner
  namespace: argocd
  annotations:
    # Must run before gateway smoke hooks if Gateways become controller-owned.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: platform
  destination:
    name: in-cluster
    namespace: tenant-system
  source:
    repoURL: https://forgejo-https.forgejo.svc.cluster.local/platform/cluster-config.git
    targetRevision: main
    path: components/platform/tenant-provisioner
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
