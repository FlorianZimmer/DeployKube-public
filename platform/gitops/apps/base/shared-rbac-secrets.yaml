apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shared-rbac-secrets
  namespace: argocd
  annotations:
    # Depends on Keycloak + Step CA OIDC trust being published into Vault.
    argocd.argoproj.io/sync-wave: "8"
spec:
  project: platform
  destination:
    name: in-cluster
    namespace: rbac-system
  source:
    repoURL: https://forgejo-https.forgejo.svc.cluster.local/platform/cluster-config.git
    targetRevision: main
    path: components/shared/rbac-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
