apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-deployment-config-crd
  namespace: argocd
  annotations:
    # Must land before the per-deployment DeploymentConfig CR (deployment-secrets-bundle).
    argocd.argoproj.io/sync-wave: "-11"
spec:
  project: platform
  destination:
    name: in-cluster
    namespace: argocd
  source:
    repoURL: https://forgejo-https.forgejo.svc.cluster.local/platform/cluster-config.git
    targetRevision: main
    path: components/platform/deployment-config-crd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
