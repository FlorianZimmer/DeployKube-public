apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-keycloak-oidc-trust
  namespace: argocd
  annotations:
    # Depends on Step CA bootstrap publishing the OIDC trust bundle into Vault (secret/keycloak/oidc-ca).
    argocd.argoproj.io/sync-wave: "7.5"
spec:
  project: platform
  destination:
    name: in-cluster
    namespace: keycloak
  source:
    repoURL: https://forgejo-https.forgejo.svc.cluster.local/platform/cluster-config.git
    targetRevision: main
    path: components/secrets/external-secrets/keycloak-oidc-trust
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true

