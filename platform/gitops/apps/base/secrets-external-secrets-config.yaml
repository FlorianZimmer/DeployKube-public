apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-external-secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1.1"
spec:
  project: platform
  destination:
    name: in-cluster
    namespace: external-secrets
  source:
    repoURL: https://forgejo-https.forgejo.svc.cluster.local/platform/cluster-config.git
    targetRevision: main
    path: components/secrets/external-secrets/config
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
