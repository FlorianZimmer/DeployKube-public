apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-keycloak
  namespace: argocd
  annotations:
    # ESO projections depend on External Secrets Operator + Vault KV seed/config being ready.
    argocd.argoproj.io/sync-wave: "1.3"
spec:
  project: platform
  destination:
    name: in-cluster
    namespace: keycloak
  source:
    repoURL: https://forgejo-https.forgejo.svc.cluster.local/platform/cluster-config.git
    targetRevision: main
    path: components/secrets/external-secrets/keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
