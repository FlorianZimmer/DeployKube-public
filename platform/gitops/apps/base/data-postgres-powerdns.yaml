apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-postgres-powerdns
  namespace: argocd
  annotations:
    # Depends on Vault+ESO for bootstrap/role Secrets (dns/powerdns/postgres).
    argocd.argoproj.io/sync-wave: "1.3"
spec:
  project: platform
  destination:
    name: in-cluster
    namespace: dns-system
  ignoreDifferences:
    - group: postgresql.cnpg.io
      kind: Cluster
      jqPathExpressions:
        - '.metadata.annotations."kubectl.kubernetes.io/last-applied-configuration"'
      jsonPointers:
        - /status
  source:
    repoURL: https://forgejo-https.forgejo.svc.cluster.local/platform/cluster-config.git
    targetRevision: main
    path: components/data/postgres/powerdns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
