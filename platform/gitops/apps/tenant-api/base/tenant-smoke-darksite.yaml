---
# Tenant API v1alpha1 (platform-owned; not tenant-writable).
#
# darksite.cloud migration: this mirrors tenant-smoke.yaml under the canonical tenancy API group.
apiVersion: tenancy.darksite.cloud/v1alpha1
kind: Tenant
metadata:
  name: tenant-smoke
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  orgId: smoke
  description: Reserved for smoke validation only. Do not onboard real users.
  tier: S
  lifecycle:
    retentionMode: immediate
    deleteFromBackups: retention-only
---
apiVersion: tenancy.darksite.cloud/v1alpha1
kind: TenantProject
metadata:
  name: tenant-smoke-p-demo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  tenantRef:
    name: tenant-smoke
  projectId: demo
  description: Reserved for smoke validation only.
  environments: [dev, prod]
  egress:
    httpProxy:
      allow:
        - type: exact
          value: example.com
  git:
    forgejoOrg: tenant-smoke
    repo: apps-demo
    seedTemplate: default
  argo:
    mode: project-scoped

