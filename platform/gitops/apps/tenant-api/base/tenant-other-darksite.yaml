# Tenant API v1alpha1 (platform-owned; not tenant-writable).
#
# darksite.cloud migration: this mirrors tenant-other.yaml under the canonical tenancy API group.
apiVersion: tenancy.darksite.cloud/v1alpha1
kind: Tenant
metadata:
  name: tenant-other
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  orgId: other
  description: Reserved for platform integration testing. Do not onboard real users.
  tier: S
  lifecycle:
    retentionMode: immediate
    deleteFromBackups: retention-only
---
apiVersion: tenancy.darksite.cloud/v1alpha1
kind: TenantProject
metadata:
  name: tenant-other-p-other
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  tenantRef:
    name: tenant-other
  projectId: other
  description: Reserved for platform integration testing.
  environments: [dev, prod]
  git:
    forgejoOrg: tenant-other
    repo: apps-other
    seedTemplate: default
  argo:
    mode: project-scoped

