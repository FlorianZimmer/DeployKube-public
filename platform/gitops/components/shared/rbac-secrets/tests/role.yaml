apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rbac-secrets-smoke
  namespace: rbac-system
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - secrets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["external-secrets.io"]
    resources:
      - externalsecrets
    verbs: ["get", "list", "watch"]

