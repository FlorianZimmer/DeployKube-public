apiVersion: batch/v1
kind: Job
metadata:
  name: rbac-secrets-smoke
  namespace: rbac-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    # Keep successful hooks until TTL cleanup so Argo can reliably observe completion.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookFailed
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      annotations:
        sidecar.istio.io/nativeSidecar: "true"
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts":true}'
    spec:
      serviceAccountName: rbac-secrets-smoke
      restartPolicy: Never
      containers:
        - name: smoke
          image: registry.example.internal/deploykube/bootstrap-tools:1.4
          imagePullPolicy: IfNotPresent
          env:
            - name: KEYCLOAK_BASE_URL
              value: __KEYCLOAK_BASE_URL__
            - name: KEYCLOAK_CONNECT_HOST
              value: keycloak.keycloak.svc.cluster.local
            - name: KEYCLOAK_REALM
              value: deploykube-admin
            - name: FORGEJO_BASE_URL
              value: https://forgejo-https.forgejo.svc.cluster.local
            - name: FORGEJO_CA_SECRET_NAMESPACE
              value: forgejo
            - name: FORGEJO_CA_SECRET_NAME
              value: forgejo-repo-tls
            - name: FORGEJO_CA_SECRET_KEY
              value: tls.crt
            - name: FORGEJO_ORG
              value: platform
            - name: FORGEJO_REPO
              value: cluster-config
          volumeMounts:
            - name: ca-cert
              mountPath: /etc/step-ca
              readOnly: true
            - name: istio-native-exit
              mountPath: /helpers
              readOnly: true
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail

              dump_on_error() {
                echo "[rbac-secrets-smoke] diagnostics (best-effort)" >&2
                kubectl -n rbac-system get externalsecret forgejo-team-sync -o yaml >&2 || true
                kubectl -n rbac-system get secret forgejo-team-sync -o yaml >&2 || true
              }
              trap dump_on_error ERR

              ca="/etc/step-ca/ca.crt"
              forgejo_ca="/tmp/forgejo-ca.crt"
              . /helpers/istio-native-exit.sh
              trap 'deploykube_istio_quit_sidecar || true' EXIT INT TERM

              echo "[rbac-secrets-smoke] ExternalSecret Ready=True"
              ready="$(kubectl -n rbac-system get externalsecret forgejo-team-sync -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' || true)"
              test "${ready}" = "True"

              echo "[rbac-secrets-smoke] secret exists and required keys non-empty"
              kubectl -n rbac-system get secret forgejo-team-sync >/dev/null
              test -s "${ca}"

              forgejo_token="$(kubectl -n rbac-system get secret forgejo-team-sync -o jsonpath='{.data.forgejoToken}' | base64 -d)"
              kc_client_id="$(kubectl -n rbac-system get secret forgejo-team-sync -o jsonpath='{.data.keycloakClientId}' | base64 -d)"
              kc_client_secret="$(kubectl -n rbac-system get secret forgejo-team-sync -o jsonpath='{.data.keycloakClientSecret}' | base64 -d)"
              test -n "${forgejo_token}"
              test -n "${kc_client_id}"
              test -n "${kc_client_secret}"

              echo "[rbac-secrets-smoke] Keycloak token (client_credentials)"
              test -n "${KEYCLOAK_BASE_URL}"
              test -n "${KEYCLOAK_CONNECT_HOST}"

              kc_hostport="${KEYCLOAK_BASE_URL#*://}"
              kc_hostport="${kc_hostport%%/*}"
              kc_host="${kc_hostport%%:*}"
              kc_port="${kc_hostport##*:}"
              if [[ "${kc_hostport}" == "${kc_host}" ]]; then
                kc_port="443"
              fi

              kc_ip="$(python3 -c 'import socket,sys; print(socket.gethostbyname(sys.argv[1]))' "${KEYCLOAK_CONNECT_HOST}")"
              token_json="$(
                curl -fsS --cacert "${ca}" \
                  --retry 10 \
                  --retry-delay 1 \
                  --retry-all-errors \
                  --retry-connrefused \
                  --resolve "${kc_host}:${kc_port}:${kc_ip}" \
                  --data-urlencode "grant_type=client_credentials" \
                  --data-urlencode "client_id=${kc_client_id}" \
                  --data-urlencode "client_secret=${kc_client_secret}" \
                  "${KEYCLOAK_BASE_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token"
              )"
              access_token="$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read()).get("access_token",""))' <<<"${token_json}")"
              test -n "${access_token}"

              echo "[rbac-secrets-smoke] Forgejo token + org teams read"
              test -n "${FORGEJO_BASE_URL}"
              forgejo_ca_secret_namespace="${FORGEJO_CA_SECRET_NAMESPACE:-forgejo}"
              forgejo_ca_secret_name="${FORGEJO_CA_SECRET_NAME:-forgejo-repo-tls}"
              forgejo_ca_secret_key="${FORGEJO_CA_SECRET_KEY:-tls.crt}"
              forgejo_ca_b64="$(kubectl -n "${forgejo_ca_secret_namespace}" get secret "${forgejo_ca_secret_name}" -o "go-template={{ index .data \"${forgejo_ca_secret_key}\" }}" 2>/dev/null || true)"
              test -n "${forgejo_ca_b64}"
              echo "${forgejo_ca_b64}" | base64 -d > "${forgejo_ca}"
              test -s "${forgejo_ca}"
              teams_json="$(
                curl -fsS \
                --cacert "${forgejo_ca}" \
                --retry 10 \
                --retry-delay 1 \
                --retry-all-errors \
                --retry-connrefused \
                -H "Authorization: token ${forgejo_token}" \
                "${FORGEJO_BASE_URL}/api/v1/orgs/${FORGEJO_ORG}/teams"
              )"
              echo "${teams_json}" | jq -e 'type=="array"' >/dev/null

              echo "[rbac-secrets-smoke] ok"
      volumes:
        - name: ca-cert
          secret:
            secretName: forgejo-team-sync
            items:
              - key: ca.crt
                path: ca.crt
        - name: istio-native-exit
          configMap:
            name: istio-native-exit-script
            defaultMode: 0444
