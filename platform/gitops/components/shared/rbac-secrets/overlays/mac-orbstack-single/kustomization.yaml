apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - ../../tests
patches:
  - path: patch-forgejo-team-bootstrap.yaml
    target:
      kind: Job
      name: forgejo-team-bootstrap
  - target:
      kind: Job
      name: rbac-secrets-smoke
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: https://keycloak.dev-single.internal.example.com:8443
