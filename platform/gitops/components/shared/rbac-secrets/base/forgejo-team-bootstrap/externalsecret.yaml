apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-admin
  namespace: rbac-system
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-core
    kind: ClusterSecretStore
  target:
    name: forgejo-admin
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: forgejo/admin
        property: username
    - secretKey: password
      remoteRef:
        key: forgejo/admin
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-admin-credentials
  namespace: rbac-system
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-core
    kind: ClusterSecretStore
  target:
    name: keycloak-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: keycloak/admin
        property: username
    - secretKey: password
      remoteRef:
        key: keycloak/admin
        property: password
