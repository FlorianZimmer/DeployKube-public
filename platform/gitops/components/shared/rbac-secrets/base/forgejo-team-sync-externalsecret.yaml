apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-team-sync
  namespace: rbac-system
spec:
  # This Secret also carries the CA bundle used to validate Keycloak TLS. Keep the refresh
  # interval short so CA rotations and trust fixes propagate before the next hourly run.
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-core
  target:
    name: forgejo-team-sync
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: forgejoToken
      remoteRef:
        key: forgejo/team-sync
        property: token
    - secretKey: keycloakClientId
      remoteRef:
        key: forgejo/team-sync
        property: keycloakClientId
    - secretKey: keycloakClientSecret
      remoteRef:
        key: forgejo/team-sync
        property: keycloakClientSecret
    - secretKey: ca.crt
      remoteRef:
        key: keycloak/oidc-ca
        property: ca_crt
