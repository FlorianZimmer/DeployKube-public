apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patchesStrategicMerge:
  - patch-oidc-runtime-issuer.yaml
patches:
  - patch: |-
      - op: replace
        path: /spec/schedule
        value: "*/15 * * * *"
    target:
      kind: CronJob
      name: access-guardrails-smoke-allow-rbac-mutations
  - patch: |-
      - op: replace
        path: /spec/schedule
        value: "*/15 * * * *"
    target:
      kind: CronJob
      name: access-guardrails-smoke-deny-rbac-mutations
  - patch: |-
      - op: replace
        path: /spec/schedule
        value: "*/15 * * * *"
    target:
      kind: CronJob
      name: access-guardrails-smoke-oidc-runtime
