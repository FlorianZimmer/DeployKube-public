apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: tenant-deny-external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  admission: true
  validationFailureAction: Enforce
  background: false
  emitWarning: false
  rules:
    - name: deny-eso-crds
      match:
        any:
          - resources:
              kinds: ["ExternalSecret", "SecretStore", "PushSecret", "ClusterSecretStore"]
              namespaceSelector:
                matchLabels:
                  darksite.cloud/rbac-profile: tenant
      skipBackgroundRequests: true
      preconditions:
        all:
          # Allow platform GitOps and ESO controller to manage platform-owned ExternalSecrets in tenant namespaces.
          # Tenants are denied in defense-in-depth (RBAC + AppProject + admission).
          - key: "{{ request.userInfo.username }}"
            operator: NotIn
            value:
              - system:serviceaccount:argocd:argocd-application-controller
              - system:serviceaccount:external-secrets:external-secrets
      validate:
        message: "Tenant namespaces may not create External Secrets Operator resources (secret projection is platform-owned)."
        allowExistingViolations: true
        deny:
          conditions:
            any:
              - key: "{{ request.operation }}"
                operator: Equals
                value: CREATE
              - key: "{{ request.operation }}"
                operator: Equals
                value: UPDATE
