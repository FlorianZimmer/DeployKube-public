  - apiGroups: ["", "apps", "batch", "policy", "networking.k8s.io"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets", "jobs", "cronjobs", "pods", "services", "configmaps", "secrets", "serviceaccounts", "persistentvolumeclaims", "poddisruptionbudgets", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
