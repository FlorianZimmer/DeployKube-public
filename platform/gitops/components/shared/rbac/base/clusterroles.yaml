apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-operator
rules:
  - apiGroups: ["", "apps", "batch", "policy", "networking.k8s.io"]
    resources: ["namespaces", "deployments", "statefulsets", "daemonsets", "replicasets", "jobs", "cronjobs", "pods", "services", "configmaps", "secrets", "serviceaccounts", "persistentvolumeclaims", "poddisruptionbudgets", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses", "gateways", "httproutes", "tcproutes", "udproutes", "referencegrants"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets", "appprojects"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: app-namespace-admin
rules:
  - apiGroups: ["", "apps", "batch", "policy", "networking.k8s.io"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets", "jobs", "cronjobs", "pods", "services", "configmaps", "secrets", "serviceaccounts", "persistentvolumeclaims", "poddisruptionbudgets", "networkpolicies"]
    verbs: ["*"]

---
apiVersion: rbac.authorization.k8s.io/v1
