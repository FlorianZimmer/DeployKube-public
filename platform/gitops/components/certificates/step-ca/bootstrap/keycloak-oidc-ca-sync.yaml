apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-oidc-ca-sync
  namespace: step-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: keycloak-oidc-ca-sync
  namespace: cert-manager
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["step-ca-root-ca"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keycloak-oidc-ca-sync
  namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: keycloak-oidc-ca-sync
subjects:
  - kind: ServiceAccount
    name: keycloak-oidc-ca-sync
    namespace: step-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-oidc-ca-sync
  namespace: step-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-options: Replace=true
    argocd.argoproj.io/hook-weight: "20"
spec:
  activeDeadlineSeconds: 2400
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    metadata:
      labels:
        deploykube.gitops/job: keycloak-oidc-ca-sync
        sidecar.istio.io/inject: "true"
      annotations:
        sidecar.istio.io/inject: "true"
        sidecar.istio.io/nativeSidecar: "true"
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
    spec:
      serviceAccountName: keycloak-oidc-ca-sync
      restartPolicy: Never
      containers:
        - name: sync
          image: registry.example.internal/deploykube/bootstrap-tools:1.4
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /scripts/keycloak-oidc-ca-sync.sh
          env:
            - name: VAULT_ADDR
              value: http://vault-active.vault-system.svc.cluster.local:8200
            - name: VAULT_ROLE
              value: keycloak-oidc-ca-sync
            - name: CERT_MANAGER_NAMESPACE
              value: cert-manager
            - name: CA_SECRET_NAME
              value: step-ca-root-ca
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: istio-native-exit
              mountPath: /helpers
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: keycloak-oidc-ca-sync-script
            defaultMode: 0555
        - name: istio-native-exit
          configMap:
            name: istio-native-exit-script
            defaultMode: 0444
