apiVersion: v1
kind: ServiceAccount
metadata:
  name: step-ca-root-secret-bootstrap
  namespace: step-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: step-ca-root-secret-bootstrap
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: step-ca-root-secret-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: step-ca-root-secret-bootstrap
subjects:
- kind: ServiceAccount
  name: step-ca-root-secret-bootstrap
  namespace: step-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: step-ca-root-secret-bootstrap
  namespace: step-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-options: Replace=true
    argocd.argoproj.io/hook-weight: "10"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        deploykube.gitops/job: step-ca-root-secret-bootstrap
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: step-ca-root-secret-bootstrap
      restartPolicy: OnFailure
      containers:
      - name: bootstrap
        image: registry.example.internal/deploykube/bootstrap-tools:1.4
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - /scripts/step-ca-root-secret-bootstrap.sh
        env:
        - name: STEP_CA_FULLNAME
          value: step-ca-step-certificates
        - name: STEP_CA_NAMESPACE
          value: step-system
        - name: CERT_MANAGER_NAMESPACE
          value: cert-manager
        - name: STEP_CA_TLS_SECRET_NAME
          value: step-ca-root-ca
        volumeMounts:
        - name: script
          mountPath: /scripts
          readOnly: true
      volumes:
      - name: script
        configMap:
          name: step-ca-root-secret-bootstrap-script
          defaultMode: 0755
