kind: StatefulSet
replicaCount: 1

bootstrap:
  enabled: false
  secrets: false
  configmaps: false

inject:
  enabled: false

existingSecrets:
  enabled: true
  ca: true
  issuer: false
  certsAsSecret: true
  configAsSecret: true
  sshHostCa: false
  sshUserCa: false

service:
  type: ClusterIP
  port: 443

ca:
  name: DeployKube CA
  address: :9000
  dns: step-ca.step-system.svc.cluster.local,step-ca.local
  url: https://step-ca.step-system.svc.cluster.local
  provisioner:
    name: admin@deploykube.local
  db:
    enabled: true
    persistent: true
    storageClass: shared-rwo
    accessModes:
      - ReadWriteOnce
    size: 10Gi
  ssh:
    enabled: false
  existingSecrets:
    enabled: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
