apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: step-ca-config
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-core
    kind: ClusterSecretStore
  target:
    name: step-ca-step-certificates-config
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
  data:
    - secretKey: ca.json
      remoteRef:
        key: step-ca/config
        property: ca_json
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: defaults.json
      remoteRef:
        key: step-ca/config
        property: defaults_json
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: x509_leaf.tpl
      remoteRef:
        key: step-ca/config
        property: x509_leaf_tpl
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
