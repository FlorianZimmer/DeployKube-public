apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-external
spec:
  vault:
    server: http://vault.vault-system.svc:8200
    path: pki-ext/sign/platform-ingress
    auth:
      kubernetes:
        role: cert-manager-vault-external
        mountPath: /v1/auth/kubernetes
        serviceAccountRef:
          name: cert-manager
