apiVersion: v1
kind: ServiceAccount
metadata:
  name: cert-smoke
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: cert-smoke
---
# ClusterRole for cluster-scoped reads only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cert-smoke-cluster
  labels:
    app.kubernetes.io/name: cert-smoke
rules:
  # Read ClusterIssuers
  - apiGroups: ["cert-manager.io"]
    resources: ["clusterissuers"]
    verbs: ["get"]
  # Read DeploymentConfig mode contract
  - apiGroups: ["platform.darksite.cloud"]
    resources: ["deploymentconfigs"]
    verbs: ["get", "list", "watch"]
  # Read Certificates across namespaces (for ingress check)
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch"]
  # Read Secrets across relevant namespaces (step-ca-root-ca in cert-manager, TLS secrets in istio-system)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-smoke-cluster
  labels:
    app.kubernetes.io/name: cert-smoke
subjects:
  - kind: ServiceAccount
    name: cert-smoke
    namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cert-smoke-cluster
---
# Role for cert-manager namespace reads plus ephemeral issuance artifacts.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-smoke-cert-manager
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: cert-smoke
rules:
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "certificaterequests"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-smoke-cert-manager
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: cert-smoke
subjects:
  - kind: ServiceAccount
    name: cert-smoke
    namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-smoke-cert-manager
---
# Role for istio-system namespace reads only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-smoke-istio-system
  namespace: istio-system
  labels:
    app.kubernetes.io/name: cert-smoke
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-smoke-istio-system
  namespace: istio-system
  labels:
    app.kubernetes.io/name: cert-smoke
subjects:
  - kind: ServiceAccount
    name: cert-smoke
    namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-smoke-istio-system
