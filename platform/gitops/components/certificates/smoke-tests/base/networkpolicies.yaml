apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cert-smoke-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cert-smoke
  policyTypes:
    - Egress
  egress:
    # Kubernetes API fallback for environments where the Cilium entity path is insufficient.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              component: kube-apiserver
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP

    # DNS for resolving in-cluster Services such as the public gateway and Vault.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: coredns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    # Gateway SNI smoke connects directly to the public gateway Service endpoint.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
          podSelector:
            matchLabels:
              gateway.networking.k8s.io/gateway-name: public-gateway
      ports:
        - port: 443
          protocol: TCP

    # Vault external issuance smoke validates CRL and OCSP against the in-cluster Vault Service.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: vault
      ports:
        - port: 8200
          protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cert-smoke-allow-kube-apiserver
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cert-smoke
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
