apiVersion: batch/v1
kind: CronJob
metadata:
  name: cert-smoke-ingress-readiness
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: cert-smoke
    app.kubernetes.io/component: ingress-readiness
spec:
  # Intentionally offset from :00 to avoid top-of-hour kube-apiserver contention.
  schedule: "31 * * * *"  # hourly, overridden in overlays
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 900
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cert-smoke
            app.kubernetes.io/component: ingress-readiness
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          restartPolicy: Never
          enableServiceLinks: false
          serviceAccountName: cert-smoke
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: smoke
              image: registry.example.internal/deploykube/validation-tools-core@sha256:babdd8ea44c3f169da4b55458061729329880fdf5c00194906d2dd6cdc655347
              imagePullPolicy: IfNotPresent
              env:
                - name: HOME
                  value: /tmp
                - name: XDG_CONFIG_HOME
                  value: /tmp/.config
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              command:
                - /bin/sh
                - -c
              args:
                - |
                  set -euo pipefail

                  ingress_ns="istio-system"
                  label_selector="deploykube.certificates/purpose=ingress"
                  dep_cfg_json="$(kubectl get deploymentconfigs.platform.darksite.cloud -o json 2>/dev/null || true)"
                  if [ -z "${dep_cfg_json}" ]; then
                    echo "FAIL: could not read DeploymentConfig objects (requires platform.darksite.cloud permissions)" >&2
                    exit 1
                  fi
                  dep_cfg_count="$(echo "${dep_cfg_json}" | jq -r '.items | length')"
                  if [ "${dep_cfg_count}" -ne 1 ]; then
                    echo "FAIL: expected exactly one DeploymentConfig, found ${dep_cfg_count}" >&2
                    exit 1
                  fi
                  platform_mode="$(echo "${dep_cfg_json}" | jq -r '.items[0].spec.certificates.platformIngress.mode // "subCa"')"
                  wildcard_secret="$(echo "${dep_cfg_json}" | jq -r '.items[0].spec.certificates.platformIngress.wildcard.secretName // "platform-wildcard-tls"')"

                  echo "=== Ingress Certificate Readiness Smoke Test ==="
                  echo "Platform ingress mode: ${platform_mode}"
                  echo ""

                  if [ "${platform_mode}" = "wildcard" ]; then
                    echo "1. Checking wildcard TLS Secret ${ingress_ns}/${wildcard_secret}..."
                    crt_exists="$(kubectl -n "${ingress_ns}" get secret "${wildcard_secret}" -o jsonpath='{.data.tls\.crt}' 2>/dev/null || echo "")"
                    key_exists="$(kubectl -n "${ingress_ns}" get secret "${wildcard_secret}" -o jsonpath='{.data.tls\.key}' 2>/dev/null || echo "")"
                    if [ -z "${crt_exists}" ] || [ -z "${key_exists}" ]; then
                      echo "FAIL: Wildcard secret ${wildcard_secret} missing tls.crt and/or tls.key" >&2
                      kubectl -n "${ingress_ns}" describe secret "${wildcard_secret}" 2>/dev/null || true
                      exit 1
                    fi
                    echo "   Wildcard secret is present with tls.crt/tls.key"
                    echo ""
                    echo "=== Ingress Certificate Readiness Smoke Test PASSED ==="
                    exit 0
                  fi

                  echo "Checking all Certificates with label ${label_selector} in ${ingress_ns}"
                  echo ""

                  # Get all ingress certificates
                  echo "1. Listing ingress certificates..."
                  certs="$(kubectl -n "${ingress_ns}" get certificates -l "${label_selector}" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true)"

                  if [ -z "${certs}" ]; then
                    echo "FAIL: No certificates found with label ${label_selector} in ${ingress_ns}" >&2
                    echo "Check that ingress certificate overlays have commonLabels applied." >&2
                    exit 1
                  fi

                  cert_count=$(echo "${certs}" | wc -l | tr -d ' ')
                  echo "   Found ${cert_count} ingress certificate(s)"
                  echo ""

                  echo "2. Waiting for all ingress certificates to become Ready..."
                  if ! kubectl -n "${ingress_ns}" wait --for=condition=Ready certificate -l "${label_selector}" --timeout=600s; then
                    echo "WARN: Not all ingress certificates reached Ready=True within timeout; reporting details." >&2
                    echo ""
                  else
                    echo "   All ingress certificates are Ready"
                    echo ""
                  fi

                  # Check each certificate
                  failed=0
                  echo "3. Checking certificate status and secrets..."
                  while IFS= read -r cert_name; do
                    [ -z "${cert_name}" ] && continue

                    echo "   Checking: ${cert_name}"

                    ready="$(kubectl -n "${ingress_ns}" get certificate "${cert_name}" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "Unknown")"
                    secret_name="$(kubectl -n "${ingress_ns}" get certificate "${cert_name}" -o jsonpath='{.spec.secretName}' 2>/dev/null || echo "")"

                    if [ "${ready}" != "True" ]; then
                      echo "     FAIL: Ready=${ready} (expected True)" >&2
                      kubectl -n "${ingress_ns}" describe certificate "${cert_name}" 2>/dev/null || true
                      failed=1
                      continue
                    fi
                    echo "     Ready: True"

                    if [ -z "${secret_name}" ]; then
                      echo "     FAIL: No spec.secretName set" >&2
                      failed=1
                      continue
                    fi

                    crt_exists="$(kubectl -n "${ingress_ns}" get secret "${secret_name}" -o jsonpath='{.data.tls\.crt}' 2>/dev/null || echo "")"
                    key_exists="$(kubectl -n "${ingress_ns}" get secret "${secret_name}" -o jsonpath='{.data.tls\.key}' 2>/dev/null || echo "")"
                    if [ -z "${crt_exists}" ] || [ -z "${key_exists}" ]; then
                      echo "     FAIL: Secret ${secret_name} missing tls.crt and/or tls.key" >&2
                      failed=1
                      continue
                    fi
                    echo "     Secret: ${secret_name} (tls.crt/tls.key present)"

                    expiry="$(kubectl -n "${ingress_ns}" get certificate "${cert_name}" -o jsonpath='{.status.notAfter}' 2>/dev/null || echo "unknown")"
                    echo "     Expires: ${expiry}"
                  done <<EOF
                  ${certs}
                  EOF

                  echo ""
                  if [ "${failed}" -ne 0 ]; then
                    echo "FAIL: One or more ingress certificates failed readiness/secret checks" >&2
                    exit 1
                  fi

                  echo "   All ${cert_count} ingress certificates are Ready with valid Secrets"
                  echo ""
                  echo "=== Ingress Certificate Readiness Smoke Test PASSED ==="
          volumes:
            - name: tmp
              emptyDir: {}
