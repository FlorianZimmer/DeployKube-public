apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: powerdns-allow-coredns
  namespace: dns-system
  labels:
    app: powerdns
spec:
  podSelector:
    matchLabels:
      app: powerdns
      component: authoritative
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
