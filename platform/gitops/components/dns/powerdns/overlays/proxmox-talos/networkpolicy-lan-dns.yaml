apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: powerdns-allow-lan-dns
  namespace: dns-system
  labels:
    app: powerdns
spec:
  podSelector:
    matchLabels:
      app: powerdns
      component: authoritative
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 198.51.100.0/24
        - ipBlock:
            cidr: 10.10.0.0/24
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
