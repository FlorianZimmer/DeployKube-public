apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: powerdns-allow-observability-vip-probes
  namespace: dns-system
  labels:
    app: powerdns
spec:
  podSelector:
    matchLabels:
      app: powerdns
      component: authoritative
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: alloy
              app.kubernetes.io/instance: alloy-metrics
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
