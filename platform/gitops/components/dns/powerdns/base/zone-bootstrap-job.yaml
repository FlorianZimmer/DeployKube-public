apiVersion: batch/v1
kind: Job
metadata:
  name: powerdns-zone-bootstrap
  namespace: dns-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
    argocd.argoproj.io/sync-options: Replace=true
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: powerdns-zone-bootstrap
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default
      containers:
        - name: bootstrap
          image: registry.example.internal/deploykube/bootstrap-tools:1.4
          env:
            - name: PDNS_API
              value: http://powerdns.dns-system.svc.cluster.local:8081/api/v1
            - name: PDNS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: powerdns-api
                  key: api_key
            # Wired by components/platform/tenant-provisioner (DNS wiring controller).
            - name: DNS_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: deploykube-dns-wiring
                  key: DNS_DOMAIN
            - name: LB_IP
              valueFrom:
                configMapKeyRef:
                  name: deploykube-dns-wiring
                  key: LB_IP
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              DOMAIN=$(printf '%s.' "${DNS_DOMAIN}")
              NS_HOST="ns1.${DNS_DOMAIN}."
              API="${PDNS_API}/servers/localhost"

              echo "[zone-bootstrap] waiting for PowerDNS API"
              ready=0
              for _ in $(seq 1 60); do
                if curl -fsS -H "X-API-Key: ${PDNS_API_KEY}" "${API}" >/dev/null; then
                  ready=1
                  break
                fi
                sleep 5
              done
              if [ "${ready}" -ne 1 ]; then
                echo "[zone-bootstrap] PowerDNS API never became reachable" >&2
                exit 1
              fi

              if ! curl -fsS -H "X-API-Key: ${PDNS_API_KEY}" "${API}/zones/${DOMAIN}" >/dev/null 2>&1; then
                echo "[zone-bootstrap] creating zone ${DOMAIN}"
                curl -fsS -H "X-API-Key: ${PDNS_API_KEY}" -H 'Content-Type: application/json' \
                  -X POST "${API}/zones" \
                  -d "{\"name\":\"${DOMAIN}\",\"kind\":\"Native\",\"masters\":[],\"nameservers\":[\"${NS_HOST}\"]}"
              else
                echo "[zone-bootstrap] zone ${DOMAIN} already exists"
              fi

              SOA_CONTENT="ns1.${DNS_DOMAIN}. admin.${DNS_DOMAIN}. 1 3600 600 604800 300"
              printf '%s\n' "[zone-bootstrap] ensuring SOA/NS/A records" \
                && curl -fsS -H "X-API-Key: ${PDNS_API_KEY}" -H 'Content-Type: application/json' \
                  -X PATCH "${API}/zones/${DOMAIN}" \
                  -d "{\"rrsets\":[{\"name\":\"${DOMAIN}\",\"type\":\"SOA\",\"ttl\":3600,\"changetype\":\"REPLACE\",\"records\":[{\"content\":\"${SOA_CONTENT}\",\"disabled\":false}]},{\"name\":\"${DOMAIN}\",\"type\":\"NS\",\"ttl\":3600,\"changetype\":\"REPLACE\",\"records\":[{\"content\":\"${NS_HOST}\",\"disabled\":false}]},{\"name\":\"${NS_HOST}\",\"type\":\"A\",\"ttl\":3600,\"changetype\":\"REPLACE\",\"records\":[{\"content\":\"${LB_IP}\",\"disabled\":false}]}]}"
