apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns
  namespace: dns-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods", "namespaces"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes", "gatewayclasses"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["externaldns.k8s.io"]
    resources: ["dnsendpoints"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns-viewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns
subjects:
  - kind: ServiceAccount
    name: external-dns
    namespace: dns-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: dns-system
  labels:
    app: external-dns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: external-dns
                topologyKey: kubernetes.io/hostname
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.14.1
          args:
            - --source=service
            - --source=ingress
            - --source=gateway-httproute
            - --source=crd
            # Patched by components/platform/tenant-provisioner (DNS wiring controller).
            - --domain-filter=example.invalid
            - --provider=pdns
            - --policy=upsert-only
            - --registry=txt
            # Patched by components/platform/tenant-provisioner (DNS wiring controller).
            - --txt-owner-id=deploykube-placeholder
            - --log-format=json
            - --log-level=info
            - --pdns-server=http://powerdns.dns-system.svc.cluster.local:8081
            - --pdns-api-key=$(PDNS_API_KEY)
            - --interval=30s
          env:
            - name: PDNS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: powerdns-api
                  key: api_key
