apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: grafana-allow-public-gateway
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "3.2"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/istio-system/sa/public-gateway-istio
      to:
        - operation:
            ports: ["3000"]
      when:
        # Patched by the grafana ingress host switch Job (PostSync), based on the deployment config.
        - key: request.headers[host]
          values:
            - grafana.invalid
    - from:
        - source:
            principals:
              - cluster.local/ns/grafana/sa/grafana-smoke
      to:
        - operation:
            ports: ["3000"]
