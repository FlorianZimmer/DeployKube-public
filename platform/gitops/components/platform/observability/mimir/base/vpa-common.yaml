apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: mimir-query-frontend
  namespace: mimir
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mimir-query-frontend
  updatePolicy:
    updateMode: Off
  resourcePolicy:
    containerPolicies:
      - containerName: istio-proxy
        mode: "Off"
      - containerName: "*"
        controlledValues: RequestsOnly
        # Keep requests <= configured limits in the selected overlay values (overlays/<deploymentId>/values.yaml).
        maxAllowed:
          cpu: 500m
          memory: 512Mi
        minAllowed:
          cpu: 25m
          memory: 64Mi
---
