apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: mimir-distributor
  namespace: mimir
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mimir-distributor
  updatePolicy:
    updateMode: Off
  resourcePolicy:
    containerPolicies:
      - containerName: istio-proxy
        mode: "Off"
      - containerName: "*"
        controlledValues: RequestsOnly
        maxAllowed:
          cpu: "2"
          memory: 1Gi
        minAllowed:
          cpu: 25m
          memory: 128Mi
---
