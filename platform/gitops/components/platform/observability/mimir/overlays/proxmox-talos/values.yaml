alertmanager:
  enabled: true
  replicas: 1
  # Fallback config used when no tenant-specific config exists.
  # Notifications are routed via webhook URLs projected from Vault path
  # `secret/observability/alertmanager` into Secret/mimir-alertmanager-notifications.
  fallbackConfig: |
    global:
      resolve_timeout: 5m
    receivers:
      - name: 'null'
      - name: platform-ops
        webhook_configs:
          - url: ${ALERTMANAGER_PLATFORM_WEBHOOK_URL}
            send_resolved: true
      - name: backup-system-platform-ops
        webhook_configs:
          - url: ${ALERTMANAGER_BACKUP_WEBHOOK_URL}
            send_resolved: true
    route:
      receiver: platform-ops
      group_by: [team, service, severity, cluster]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        # Watchdog / Deadman switch goes to null
        - match:
            alertname: Watchdog
          receiver: 'null'
        # Backup-plane and DR contract alerts are owned by platform ops and must be visible quickly.
        - match:
            service: backup-system
          receiver: backup-system-platform-ops
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 15m
    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: [service, cluster]

ruler:
  enabled: true
  replicas: 1

gateway:
  enabled: true
  ingress:
    enabled: false  # HTTPRoute/mesh to be added later
  nginx:
    config:
      # NGINX `resolver` expects DNS server IP(s), not a hostname. Using the kube-dns ClusterIP avoids runtime upstream
      # resolution failures for `proxy_pass http://$upstream`.
      resolver: 10.96.0.10
      # Istio/Envoy outbound routing uses the HTTP Host/:authority header to select the correct upstream cluster
      # (and therefore mTLS settings). The upstreams in the default Mimir nginx.conf include a trailing dot, e.g.
      # `mimir-query-frontend.mimir.svc.cluster.local.` which turns into `mimir-query-frontend.mimir.svc.cluster.local.:8080`
      # and causes Envoy to fall back to PassthroughCluster (plaintext -> STRICT mTLS reset on the server side).
      httpSnippet: |-
        map $proxy_host $deploykube_upstream_host {
          "~^(?<h>[^:]+)\\.:\\d+$" $h;
          "~^(?<h>[^:]+):\\d+$" $h;
          default $proxy_host;
        }
      serverSnippet: |-
        proxy_set_header Host $deploykube_upstream_host;

query_frontend:
  # The cluster is currently very tight on CPU requests (workers ~98-99% requested). Keep the query-frontend schedulable.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi

ingester:
  resources:
    # Keep a safe baseline so the ingester doesn't start under-requested before VPA converges.
    requests:
      cpu: 200m
      memory: 1Gi

metaMonitoring:
  serviceMonitor:
    enabled: true
