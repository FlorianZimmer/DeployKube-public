apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: mimir-ingester-zone-a
  namespace: mimir
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: mimir-ingester-zone-a
  updatePolicy:
    updateMode: Off
  resourcePolicy:
    containerPolicies:
      - containerName: istio-proxy
        mode: "Off"
      - containerName: "*"
        controlledValues: RequestsOnly
        maxAllowed:
          cpu: "4"
          memory: 4Gi
        minAllowed:
          cpu: 100m
          memory: 512Mi
---
