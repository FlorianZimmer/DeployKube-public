apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mimir
commonAnnotations:
  argocd.argoproj.io/sync-wave: "2.5"
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: mimir-distributed
    version: 6.0.5
    releaseName: mimir
    namespace: mimir
    valuesFile: values.yaml

resources:
  - ../../base
  - vpa-singlezone.yaml

patches:
  - target:
      kind: Deployment
      name: mimir-distributor
      namespace: mimir
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mimir-distributor
        namespace: mimir
      spec:
        template:
          metadata:
            annotations:
              sidecar.istio.io/inject: "true"
          spec:
            containers:
              - name: distributor
                resources:
                  limits:
                    memory: 1Gi
  - target:
      kind: Deployment
      name: mimir-overrides-exporter
      namespace: mimir
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mimir-overrides-exporter
        namespace: mimir
      spec:
        template:
          metadata:
            annotations:
              sidecar.istio.io/inject: "true"
          spec:
            containers:
              - name: overrides-exporter
                resources:
                  limits:
                    memory: 256Mi
  - target:
      kind: Deployment
      name: mimir-querier
      namespace: mimir
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mimir-querier
        namespace: mimir
      spec:
        template:
          spec:
            containers:
              - name: querier
                resources:
                  limits:
                    memory: 2Gi
  - target:
      kind: Deployment
      name: mimir-query-scheduler
      namespace: mimir
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mimir-query-scheduler
        namespace: mimir
      spec:
        template:
          metadata:
            annotations:
              sidecar.istio.io/inject: "true"
          spec:
            containers:
              - name: query-scheduler
                resources:
                  limits:
                    memory: 512Mi
  - target:
      kind: Deployment
      name: mimir-ruler
      namespace: mimir
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mimir-ruler
        namespace: mimir
      spec:
        template:
          spec:
            containers:
              - name: ruler
                resources:
                  limits:
                    memory: 1Gi
  - target:
      kind: StatefulSet
      name: mimir-alertmanager
      namespace: mimir
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: mimir-alertmanager
        namespace: mimir
      spec:
        template:
          metadata:
            annotations:
              sidecar.istio.io/inject: "true"
          spec:
            containers:
              - name: alertmanager
                resources:
                  limits:
                    memory: 512Mi
  - target:
      kind: StatefulSet
      name: mimir-compactor
      namespace: mimir
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: mimir-compactor
        namespace: mimir
      spec:
        template:
          spec:
            containers:
              - name: compactor
                resources:
                  limits:
                    memory: 2Gi
  - target:
      kind: StatefulSet
      name: mimir-ingester
      namespace: mimir
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: mimir-ingester
        namespace: mimir
      spec:
        template:
          spec:
            containers:
              - name: ingester
                resources:
                  limits:
                    memory: 4Gi
  - target:
      kind: StatefulSet
      name: mimir-store-gateway
      namespace: mimir
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: mimir-store-gateway
        namespace: mimir
      spec:
        template:
          spec:
            containers:
              - name: store-gateway
                resources:
                  limits:
                    memory: 2Gi
  - target:
      kind: Deployment
      name: mimir-gateway
      namespace: mimir
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mimir-gateway
        namespace: mimir
      spec:
        template:
          metadata:
            annotations:
              sidecar.istio.io/inject: "true"
          spec:
            containers:
              - name: gateway
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    memory: 512Mi
  - target:
      kind: Job
      name: mimir-smoke-test
      namespace: mimir
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: mimir-smoke-test
        namespace: mimir
      spec:
        template:
          spec:
            containers:
              - name: smoke-test
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    memory: 256Mi
