# Loki distributed defaults tuned for Garage S3 + multi-tenancy.
fullnameOverride: loki

deploymentMode: Distributed

test:
  enabled: false

global:
  extraArgs:
    - -config.expand-env=true
  extraEnvFrom:
    - secretRef:
        name: loki-s3

gateway:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  ingress:
    enabled: false  # HTTPRoute/mesh will be added later
  nginxConfig:
    # Loki gateway uses `$request_uri` in `proxy_pass`, which requires a working `resolver` for runtime DNS.
    # Using the kube-dns Service hostname here can deadlock/fail; use the cluster DNS Service IP instead.
    resolver: "10.96.0.10"

loki:
  auth_enabled: true
  commonConfig:
    replication_factor: 1
  storage:
    bucketNames:
      chunks: ${S3_BUCKET}
      ruler: ${S3_BUCKET}
      admin: ${S3_BUCKET}
    s3:
      endpoint: garage.garage.svc:3900
      region: us-east-1
      s3ForcePathStyle: true
      insecure: true
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: boltdb-shipper
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage_config:
    aws:
      s3: s3://${S3_BUCKET}
      region: us-east-1
      endpoint: garage.garage.svc:3900
      insecure: true
      s3forcepathstyle: true
    boltdb_shipper:
      active_index_directory: /var/loki/index
      cache_location: /var/loki/cache
  limits_config:
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20
    retention_period: 168h  # Controller-owned (deployment config derived; Helm value is a fallback)
    max_global_streams_per_user: 5000
    allow_structured_metadata: false

  server:
    http_listen_port: 3100
  validation:
    allow_structured_metadata: false

compactor:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

ingester:
  replicas: 3
  zoneAwareReplication:
    enabled: false
  # Explicit resources for the main container (avoid relying on Istio sidecar defaults).
  # Sizing note: one ingester was observed at ~2Gi working set with no limit; set a safe baseline.
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      memory: 4Gi

querier:
  replicas: 2
  maxUnavailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

queryFrontend:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi

queryScheduler:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi

distributor:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi

indexGateway:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi

ruler:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi

singleBinary:
  replicas: 0

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

chunksCache:
  replicas: 1
  allocatedMemory: 512
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

resultsCache:
  replicas: 1
  allocatedMemory: 512
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

memcachedExporter:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

lokiCanary:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

monitoring:
  serviceMonitor:
    enabled: true
