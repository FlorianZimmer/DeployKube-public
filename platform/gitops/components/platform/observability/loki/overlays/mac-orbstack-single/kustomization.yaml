apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: loki
commonAnnotations:
  argocd.argoproj.io/sync-wave: "2"

# Low-mem dev profile: keep Loki Distributed but avoid Pending pods on small clusters.
# This overlay is consumed via `apps/environments/mac-orbstack-single`.
resources:
  - ../../base
helmGlobals:
  chartHome: ../../charts
helmCharts:
  - name: loki
    version: 6.46.0
    releaseName: loki
    namespace: loki
    valuesFile: values.yaml

patches:
  # Argo CD repo-server runs Kustomize with load restrictions, so patch files must live in (or under)
  # the overlay directory (see also docs/design/gitops-operating-model.md).
  - patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: loki-chunks-cache
        namespace: loki
      spec:
        template:
          spec:
            containers:
              - name: memcached
                args:
                  - -m 256
                  - --extended=modern,track_sizes
                  - -I 5m
                  - -c 16384
                  - -v
                  - -u 11211
                resources:
                  requests:
                    cpu: 50m
                    memory: 256Mi
                  limits:
                    memory: 512Mi
  - patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: loki-results-cache
        namespace: loki
      spec:
        template:
          spec:
            containers:
              - name: memcached
                args:
                  - -m 256
                  - --extended=modern,track_sizes
                  - -I 5m
                  - -c 16384
                  - -v
                  - -u 11211
                resources:
                  requests:
                    cpu: 50m
                    memory: 256Mi
                  limits:
                    memory: 512Mi
