apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: grafana
commonAnnotations:
  argocd.argoproj.io/sync-wave: "3"

resources:
  - ../../base
helmGlobals:
  chartHome: charts
helmCharts:
  - name: grafana
    version: 10.1.4
    releaseName: grafana
    namespace: grafana
    valuesFile: values.yaml
