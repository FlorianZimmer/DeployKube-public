# Platform Dashboards ConfigMap
# Contains curated dashboards for cluster and LGTM stack monitoring.
# Mounted by Grafana via dashboardsConfigMaps setting in values.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-platform
  namespace: grafana
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/component: dashboards
data:
