apiVersion: batch/v1
kind: CronJob
metadata:
  name: observability-log-smoke
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  # Intentionally offset from :00 to avoid top-of-hour kube-apiserver contention.
  schedule: "21,51 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      ttlSecondsAfterFinished: 900
      template:
        metadata:
          annotations:
            sidecar.istio.io/nativeSidecar: "true"
            proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
        spec:
          restartPolicy: Never
          volumes:
            - name: run
              emptyDir: {}
            - name: istio-native-exit
              configMap:
                name: istio-native-exit-script
                defaultMode: 0444
          initContainers:
            - name: init-run
              image: busybox:1.36
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  runid="$(date +%s)"
                  tenant="smoke-${runid}"
                  echo "${runid}" >/run/runid
                  echo "${tenant}" >/run/tenant
              volumeMounts:
                - name: run
                  mountPath: /run
          containers:
            - name: log-smoke
              image: curlimages/curl:8.6.0
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 256Mi
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  ISTIO_HELPER="/helpers/istio-native-exit.sh"
                  [ -f "${ISTIO_HELPER}" ] || { echo "missing istio-native-exit helper" >&2; exit 1; }
                  . "${ISTIO_HELPER}"
                  trap deploykube_istio_quit_sidecar EXIT INT TERM
                  runid="$(cat /run/runid)"
                  tenant="$(cat /run/tenant)"
                  base="http://loki-gateway.loki.svc.cluster.local"
                  ts="$(date +%s)"
                  ns="${ts}000000000"
                  start="$((ts-30))000000000"
                  end="$((ts+30))000000000"
                  line="smoke loki ${runid}"

                  echo "pushing log to Loki tenant=${tenant}..."
                  curl -sfS -X POST "${base}/loki/api/v1/push" \
                    --connect-timeout 5 --max-time 20 \
                    -H "Content-Type: application/json" \
                    -H "X-Scope-OrgID: ${tenant}" \
                    -d "{\"streams\":[{\"stream\":{\"job\":\"smoke\",\"run\":\"${runid}\"},\"values\":[[\"${ns}\",\"${line}\"]]}]}"

                  echo "querying log back..."
                  attempts=20
                  sleep_s=3
                  i=1
                  resp=""
                  while [ "${i}" -le "${attempts}" ]; do
                    echo "attempt ${i}/${attempts}..."
                    resp="$(curl -sfS -G "${base}/loki/api/v1/query_range" \
                      --connect-timeout 5 --max-time 20 \
                      -H "X-Scope-OrgID: ${tenant}" \
                      --data-urlencode "query={job=\"smoke\",run=\"${runid}\"}" \
                      --data-urlencode "start=${start}" \
                      --data-urlencode "end=${end}" \
                      --data-urlencode "limit=10" || true)"
                    if echo "${resp}" | grep -q "${line}"; then
                      echo "log found"
                      break
                    fi
                    i="$((i+1))"
                    sleep "${sleep_s}"
                  done
                  if [ "${i}" -gt "${attempts}" ]; then
                    echo "log not found after ${attempts} attempts"
                    echo "${resp}"
                    exit 1
                  fi

                  echo "deleting log series (best-effort)..."
                  del_code="$(curl -sS -o /dev/null -w '%{http_code}' -X POST "${base}/loki/api/v1/delete" \
                    --connect-timeout 5 --max-time 20 \
                    -H "X-Scope-OrgID: ${tenant}" \
                    --data-urlencode "query={job=\"smoke\",run=\"${runid}\"}" \
                    --data-urlencode "start=${start}" \
                    --data-urlencode "end=${end}" || true)"

                  if [ -n "${del_code}" ] && [ "${del_code}" -ge 200 ] && [ "${del_code}" -lt 300 ]; then
                    sleep 3
                    echo "verifying deletion (best-effort)..."
                    resp2="$(curl -sfS -G "${base}/loki/api/v1/query_range" \
                      --connect-timeout 5 --max-time 20 \
                      -H "X-Scope-OrgID: ${tenant}" \
                      --data-urlencode "query={job=\"smoke\",run=\"${runid}\"}" \
                      --data-urlencode "start=${start}" \
                      --data-urlencode "end=${end}" \
                      --data-urlencode "limit=10")"
                    if echo "${resp2}" | grep -q "${line}"; then
                      echo "warning: log still visible, compactor retention may lag"
                    fi
                  else
                    echo "warning: delete endpoint returned HTTP ${del_code:-<none>} (expected if deletion is disabled)"
                  fi

                  echo "log smoke ok"
                  # Give Envoy a brief window to fully initialize and avoid pilot-agent abort
                  # when we trigger quitquitquit on fast-exiting Jobs.
                  sleep 5
              volumeMounts:
                - name: run
                  mountPath: /run
                - name: istio-native-exit
                  mountPath: /helpers
                  readOnly: true
