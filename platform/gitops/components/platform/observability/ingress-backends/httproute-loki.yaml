apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: loki-api
  namespace: loki
spec:
  parentRefs:
    - name: public-gateway
      namespace: istio-system
      # Patch per deployment to a real listener name (e.g., https-loki-api) once enabled.
      sectionName: https-loki-api
  hostnames:
    # Patch per deployment before enabling.
    - loki-api.REPLACE_ME.internal.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: loki-gateway
          port: 80

