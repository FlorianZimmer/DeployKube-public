apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mimir-api
  namespace: mimir
spec:
  parentRefs:
    - name: public-gateway
      namespace: istio-system
      # Use a dedicated listener/hostname if enabling this for external use.
      sectionName: https-mimir-api
  hostnames:
    - mimir-api.REPLACE_ME.internal.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mimir-gateway
          port: 80

