apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tempo-api
  namespace: tempo
spec:
  parentRefs:
    - name: public-gateway
      namespace: istio-system
      sectionName: https-tempo-api
  hostnames:
    - tempo-api.REPLACE_ME.internal.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: tempo
          port: 3200

