apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: observability
spec:
  template:
    spec:
      containers:
        - name: alloy
          resources:
            requests:
              cpu: "80m"
              memory: "256Mi"
            limits:
              memory: "984Mi"
        - name: config-reloader
          resources:
            requests:
              cpu: "15m"
              memory: "32Mi"
            limits:
              memory: "48Mi"
