apiVersion: data.darksite.cloud/v1alpha1
kind: PostgresClass
metadata:
  name: platform-ha
spec:
  serviceLevel: platform
  engine:
    family: postgres
    majorVersion: 16
    imageName: registry.example.internal/cloudnative-pg/postgresql:16.3
  compute:
    instances: 3
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 2Gi
    sharedBuffers: 512MB
    maxConnections: 300
    enableSuperuserAccess: true
  storage:
    data:
      size: 5Gi
      storageClassName: shared-rwo
    wal:
      size: 3Gi
      storageClassName: shared-rwo
  backup:
    mode: pgDump
    schedule: "0 3 * * *"
    retentionPolicy: 7d
    volume:
      size: 20Gi
      storageClassName: shared-rwo
  service:
    accessMode: SameNamespace
---
