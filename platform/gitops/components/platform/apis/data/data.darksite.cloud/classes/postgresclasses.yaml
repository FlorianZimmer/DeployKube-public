apiVersion: data.darksite.cloud/v1alpha1
kind: PostgresClass
metadata:
  name: platform-poc-disposable
spec:
  serviceLevel: platform-poc
  engine:
    family: postgres
    majorVersion: 16
    imageName: registry.example.internal/cloudnative-pg/postgresql:16.3
  compute:
    instances: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
    enableSuperuserAccess: true
  storage:
    data:
      size: 4Gi
      storageClassName: shared-rwo
  backup:
    mode: Disabled
    skipReason: proof-of-concept
  monitoring:
    enablePodMonitor: false
  service:
    accessMode: SameNamespace
