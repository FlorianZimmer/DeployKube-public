apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-postgres-controller
  labels:
    app.kubernetes.io/name: platform-postgres-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-postgres-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-postgres-controller
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: platform-postgres-controller
      containers:
        - name: controller
          image: registry.example.internal/deploykube/tenant-provisioner:0.2.24
          imagePullPolicy: IfNotPresent
          args:
            - --controller-profile=postgres
            - --leader-elect=true
            - --leader-election-id=platform-postgres-controller.darksite.cloud
            - --postgres-observe-only=false
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          ports:
            - name: metrics
              containerPort: 8080
            - name: probes
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
