spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-core
  target:
    name: harbor-oidc-ca
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: ca.crt
      remoteRef:
        key: keycloak/oidc-ca
        property: ca_crt
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: harbor-selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: harbor-token-cert
spec:
  secretName: harbor-token-cert
  commonName: harbor-token-service
  duration: 87600h # 10y
  renewBefore: 720h # 30d
  issuerRef:
    name: harbor-selfsigned
    kind: Issuer
