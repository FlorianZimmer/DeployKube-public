apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: harbor-smoke
  namespace: harbor
rules:
  - apiGroups: [""]
    resources: ["secrets", "endpoints", "services", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: harbor-smoke
  namespace: harbor
subjects:
  - kind: ServiceAccount
    name: harbor-smoke
    namespace: harbor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: harbor-smoke
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: harbor-smoke
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["deploykube-deployment-config"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["argocd-oidc-ca"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: harbor-smoke
subjects:
  - kind: ServiceAccount
    name: harbor-smoke
    namespace: harbor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: harbor-smoke

