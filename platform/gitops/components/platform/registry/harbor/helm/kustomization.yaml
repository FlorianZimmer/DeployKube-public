apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: harbor
helmGlobals:
  chartHome: charts
helmCharts:
  - name: harbor
    version: 1.18.2
    releaseName: harbor
    namespace: harbor
    valuesFile: values.yaml
patches:
  # Harbor uses `envFrom: secretRef` for internal component wiring. When `existingSecret*`
  # values are set, the chart still emits placeholder Secrets with empty `data:` for some
  # components. Those would race/overwrite ExternalSecrets-managed Secrets. Delete them and
  # let ExternalSecrets own the final Secret objects.
  - path: patch-delete-secret-harbor-jobservice.yaml
    target:
      kind: Secret
      name: harbor-jobservice
  - path: patch-delete-secret-harbor-registry.yaml
    target:
      kind: Secret
      name: harbor-registry
  - path: patch-harbor-nginx-configmap.yaml
    target:
      kind: ConfigMap
      name: harbor-nginx
  - path: patch-harbor-nginx-deployment-checksum.yaml
    target:
      kind: Deployment
      name: harbor-nginx
  - path: patch-ha-tier-labels.yaml
