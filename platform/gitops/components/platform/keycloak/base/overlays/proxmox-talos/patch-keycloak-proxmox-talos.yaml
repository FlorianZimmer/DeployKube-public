apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
spec:
  hostname:
    hostname: https://keycloak.prod.internal.example.com
    admin: https://keycloak.prod.internal.example.com
    adminUrl: https://keycloak.prod.internal.example.com
  resources:
    requests:
      cpu: "15m"
      memory: 1328Mi
    limits:
      memory: 1992Mi
