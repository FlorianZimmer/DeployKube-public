apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: keycloak
resources:
  - variable-map.yaml
generatorOptions:
  disableNameSuffixHash: true
  labels:
    deploykube.gitops/component: keycloak-realms
configMapGenerator:
  - name: keycloak-realm-template-deploykube-admin
    files:
      - deploykube-admin.yaml=templates/deploykube-admin.yaml
  - name: keycloak-realm-template-deploykube-apps
    files:
      - deploykube-apps.yaml=templates/deploykube-apps.yaml
