apiVersion: batch/v1
kind: CronJob
metadata:
  name: keycloak-ldap-sync
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "3.21"
  labels:
    app.kubernetes.io/name: keycloak-ldap-sync
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 1200
      template:
        metadata:
          labels:
            app.kubernetes.io/name: keycloak-ldap-sync
          annotations:
            sidecar.istio.io/nativeSidecar: "true"
            proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
        spec:
          serviceAccountName: keycloak-iam-sync
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: ldap-sync
              image: registry.example.internal/deploykube/bootstrap-tools:1.4
              imagePullPolicy: IfNotPresent
              command:
                - /scripts/ldap-sync.sh
              env:
                - name: HOME
                  value: /tmp
                - name: KEYCLOAK_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: KEYCLOAK_INTERNAL_URL
                  value: http://keycloak.keycloak.svc.cluster.local:8080
                - name: DEPLOYKUBE_CONFIG_SNAPSHOT_NAME
                  value: deploykube-deployment-config
                - name: DEPLOYKUBE_CONFIG_SNAPSHOT_KEY
                  value: deployment-config.yaml
                - name: STATUS_CONFIGMAP
                  value: keycloak-ldap-sync-status
              volumeMounts:
                - name: ldap-sync-script
                  mountPath: /scripts/ldap-sync.sh
                  subPath: ldap-sync.sh
                  readOnly: true
                - name: istio-native-exit
                  mountPath: /helpers
                  readOnly: true
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: ldap-sync-script
              configMap:
                name: keycloak-ldap-sync-script
                defaultMode: 0555
            - name: istio-native-exit
              configMap:
                name: istio-native-exit-script
                defaultMode: 0444
