apiVersion: batch/v1
kind: CronJob
metadata:
  name: keycloak-upstream-sim-smoke
  namespace: keycloak-upstream-sim
  annotations:
    argocd.argoproj.io/sync-wave: "3.06"
  labels:
    app.kubernetes.io/name: keycloak-upstream-sim-smoke
spec:
  schedule: "17 */6 * * *"
  suspend: true
  startingDeadlineSeconds: 300
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      activeDeadlineSeconds: 900
      backoffLimit: 1
      ttlSecondsAfterFinished: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: keycloak-upstream-sim-smoke
        spec:
          serviceAccountName: keycloak-upstream-sim-bootstrap
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: smoke
              image: registry.example.internal/deploykube/bootstrap-tools:1.4
              imagePullPolicy: IfNotPresent
              command:
                - /scripts/smoke.sh
              env:
                - name: HOME
                  value: /tmp
                - name: UPSTREAM_KEYCLOAK_URL
                  value: http://keycloak-upstream-sim.keycloak-upstream-sim.svc.cluster.local:8080
                - name: UPSTREAM_REALM
                  value: upstream-sim
                - name: UPSTREAM_ALIAS
                  value: upstream
                - name: UPSTREAM_CLIENT_ID
                  value: deploykube-upstream-broker
                - name: UPSTREAM_SIM_ISSUER_HOST
                  value: keycloak-upstream-sim.keycloak-upstream-sim.svc.cluster.local
                - name: DEPLOYMENT_CONFIG_NAMESPACE
                  value: argocd
                - name: DOWNSTREAM_REALM
                  value: deploykube-admin
                - name: STATUS_CONFIGMAP
                  value: keycloak-upstream-sim-smoke-status
                - name: BOOTSTRAP_STATUS_CONFIGMAP
                  value: keycloak-upstream-sim-status
                - name: AUTO_SCALE_UPSTREAM_SIM
                  value: "true"
                - name: SCALE_DOWN_AFTER_TEST
                  value: "true"
                - name: BOOTSTRAP_BEFORE_TEST
                  value: "true"
                - name: UPSTREAM_DEPLOYMENT_NAME
                  value: keycloak-upstream-sim
                - name: ADMIN_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-upstream-sim-values
                      key: adminUsername
                - name: ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-upstream-sim-values
                      key: adminPassword
                - name: SIM_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-upstream-sim-values
                      key: simUserUsername
                - name: SIM_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-upstream-sim-values
                      key: simUserPassword
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: scripts
              configMap:
                name: keycloak-upstream-sim-scripts
                defaultMode: 0555
