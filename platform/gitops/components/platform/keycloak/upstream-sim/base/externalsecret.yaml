apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-upstream-sim-values
  namespace: keycloak-upstream-sim
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-core
  target:
    name: keycloak-upstream-sim-values
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: keycloak/upstream-sim
