apiVersion: v1
kind: Service
metadata:
  name: keycloak-upstream-sim
  namespace: keycloak-upstream-sim
  labels:
    app.kubernetes.io/name: keycloak-upstream-sim
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: keycloak-upstream-sim
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 8443
      targetPort: 8443
      protocol: TCP
