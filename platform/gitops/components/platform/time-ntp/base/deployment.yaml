apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-ntp
  namespace: time-system
  labels:
    app.kubernetes.io/name: platform-ntp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-ntp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-ntp
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: ntp
          image: registry.example.internal/deploykube/bootstrap-tools:1.4
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - /scripts/ntp-server.py
          ports:
            - name: ntp
              containerPort: 123
              protocol: UDP
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - ALL
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: scripts
          configMap:
            name: platform-time-ntp-scripts
            defaultMode: 0555
        - name: tmp
          emptyDir: {}
