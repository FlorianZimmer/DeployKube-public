---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: deploymentconfigs.platform.darksite.cloud
spec:
  group: platform.darksite.cloud
  names:
    kind: DeploymentConfig
    listKind: DeploymentConfigList
    plural: deploymentconfigs
    singular: deploymentconfig
    shortNames:
      - dkdc
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: DeployKube deployment identity and configuration contract (v1alpha1)
          type: object
          required:
            - spec
          x-kubernetes-validations:
            - rule: self.metadata.name == self.spec.deploymentId
              message: metadata.name must equal spec.deploymentId
          properties:
            spec:
              type: object
              required:
                - deploymentId
                - environmentId
                - dns
                - trustRoots
                - network
                - secrets
                - time
              properties:
                deploymentId:
                  type: string
                  minLength: 1
                  description: Stable deployment identifier, must match metadata.name and folder name
                environmentId:
                  type: string
                  enum:
                    - dev
                    - prod
                    - staging
                  description: Semantic environment identifier
                dns:
                  type: object
                  required:
                    - baseDomain
                    - hostnames
                  properties:
                    baseDomain:
                      type: string
                      pattern: ^[a-z0-9][a-z0-9.-]*\.internal\.[a-z0-9.-]+$
                      description: Base domain for the deployment (must use .internal convention)
                    operatorDnsServers:
                      type: array
                      items:
                        type: string
                        pattern: ^[0-9]{1,3}(\.[0-9]{1,3}){3}$
                      description: Optional operator/LAN DNS resolvers that should be able to resolve the internal zone (e.g. Pi-hole, Unbound)
                    hostnames:
                      type: object
                      additionalProperties:
                        type: string
                        pattern: ^[a-z0-9][a-z0-9.-]+$
                      description: Explicit hostnames for externally-reachable platform endpoints
                    authority:
                      type: object
                      description: Optional authoritative DNS settings for baseDomain (nameserver identities for SOA/NS)
                      properties:
                        nameServers:
                          type: array
                          items:
                            type: string
                            pattern: ^[a-z0-9][a-z0-9.-]+$
                          description: Optional list of nameserver FQDNs for baseDomain; defaults to ns1.<baseDomain> when unset
                    delegation:
                      type: object
                      description: Optional parent-zone delegation settings for baseDomain
                      properties:
                        mode:
                          type: string
                          enum:
                            - none
                            - manual
                            - auto
                          description: Delegation mode; none (disabled), manual (publish instructions), auto (provider-driven reconcile)
                        parentZone:
                          type: string
                          pattern: ^[a-z0-9][a-z0-9.-]+$
                          description: Parent zone where delegation records for baseDomain should be created
                        writerRef:
                          type: object
                          description: Reference to a Secret containing auto-delegation writer settings (used when mode=auto)
                          properties:
                            name:
                              type: string
                              minLength: 1
                            namespace:
                              type: string
                              minLength: 1
                    cloudDNS:
                      type: object
                      description: Optional Cloud DNS settings for tenant workload zones and standalone DNSZone workflows
                      properties:
                        tenantWorkloadZones:
                          type: object
                          description: "Platform mode: derive one zone per tenant (<orgId>.<zoneSuffix>.<baseDomain>) and project tenant RFC2136 credentials"
                          properties:
                            enabled:
                              type: boolean
                              description: Enable per-tenant workload DNS zones managed by the tenant-provisioner
                            zoneSuffix:
                              type: string
                              pattern: ^[a-z0-9][a-z0-9-]*$
                              description: "Label segment used in derived tenant zones (default: workloads)"
                certificates:
                  type: object
                  description: Ingress TLS issuance/projection modes for platform and tenant surfaces.
                  properties:
                    platformIngress:
                      type: object
                      properties:
                        mode:
                          type: string
                          enum:
                            - subCa
                            - vault
                            - acme
                            - wildcard
                          description: Platform ingress TLS mode. subCa uses Step CA for simpler internal/private-style issuance, vault uses the external high-assurance Vault/OpenBao PKI path with CRL/OCSP, acme uses ClusterIssuer/acme, wildcard projects one BYO wildcard Secret.
                        wildcard:
                          type: object
                          properties:
                            secretName:
                              type: string
                              minLength: 1
                              description: Secret name in istio-system containing wildcard tls.crt/tls.key.
                            externalSecretName:
                              type: string
                              minLength: 1
                              description: Controller-owned ExternalSecret name for wildcard TLS projection.
                            vaultPath:
                              type: string
                              minLength: 1
                              description: Vault path containing wildcard TLS keypair values.
                            tlsCertProperty:
                              type: string
                              minLength: 1
                              description: Vault property name mapped to tls.crt.
                            tlsKeyProperty:
                              type: string
                              minLength: 1
                              description: Vault property name mapped to tls.key.
                            caBundleSecretName:
                              type: string
                              minLength: 1
                              description: Optional Secret name in istio-system for a CA bundle used by smoke verification.
                            caBundleExternalSecretName:
                              type: string
                              minLength: 1
                              description: Optional ExternalSecret name for CA bundle projection.
                            caBundleVaultPath:
                              type: string
                              minLength: 1
                              description: Optional Vault path containing CA bundle material.
                            caBundleProperty:
                              type: string
                              minLength: 1
                              description: Vault property name mapped to ca.crt.
                    tenants:
                      type: object
                      properties:
                        mode:
                          type: string
                          enum:
                            - subCa
                            - acme
                          description: Tenant workloads wildcard certificate mode. wildcard is intentionally unsupported for tenants in Option A.
                    acme:
                      type: object
                      properties:
                        server:
                          type: string
                          pattern: ^https://
                          description: ACME directory URL (internal or external ACME endpoint).
                        email:
                          type: string
                          minLength: 1
                          description: ACME account contact email.
                        caBundle:
                          type: string
                          minLength: 1
                          description: Optional base64-encoded PEM CA bundle for self-hosted ACME endpoint trust.
                        clusterIssuerName:
                          type: string
                          minLength: 1
                          description: Controller-owned ClusterIssuer name.
                        privateKeySecretName:
                          type: string
                          minLength: 1
                          description: Secret name used by cert-manager for ACME account private key.
                        solver:
                          type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - dns01
                              description: ACME challenge solver type.
                            provider:
                              type: string
                              enum:
                                - rfc2136
                                - cloudflare
                                - route53
                              description: ACME DNS01 provider wiring.
                            rfc2136:
                              type: object
                              properties:
                                nameServer:
                                  type: string
                                  minLength: 1
                                  description: RFC2136 nameserver in host:port form.
                                tsigKeyName:
                                  type: string
                                  minLength: 1
                                  description: RFC2136 TSIG key name.
                                tsigAlgorithm:
                                  type: string
                                  minLength: 1
                                  description: RFC2136 TSIG algorithm.
                            cloudflare:
                              type: object
                              properties:
                                email:
                                  type: string
                                  minLength: 1
                                  description: Cloudflare account email (optional when API token auth is used).
                            route53:
                              type: object
                              properties:
                                region:
                                  type: string
                                  minLength: 1
                                  description: AWS Route53 region hint.
                                hostedZoneID:
                                  type: string
                                  minLength: 1
                                  description: Optional Route53 hosted zone ID to avoid zone listing lookup.
                                role:
                                  type: string
                                  minLength: 1
                                  description: Optional AWS role ARN for Route53 DNS updates.
                        credentials:
                          type: object
                          properties:
                            secretName:
                              type: string
                              minLength: 1
                              description: Secret name in cert-manager namespace containing ACME solver credentials.
                            externalSecretName:
                              type: string
                              minLength: 1
                              description: Controller-owned ExternalSecret name for ACME solver credentials.
                            vaultPath:
                              type: string
                              minLength: 1
                              description: Vault path for ACME solver credentials.
                            tsigSecretProperty:
                              type: string
                              minLength: 1
                              description: Vault property that contains TSIG secret value.
                            cloudflareApiTokenProperty:
                              type: string
                              minLength: 1
                              description: Vault property containing the Cloudflare API token.
                            route53AccessKeyIdProperty:
                              type: string
                              minLength: 1
                              description: Vault property containing AWS access key ID.
                            route53SecretAccessKeyProperty:
                              type: string
                              minLength: 1
                              description: Vault property containing AWS secret access key.
                iam:
                  type: object
                  description: Platform IAM mode and optional upstream identity/provisioning configuration.
                  properties:
                    mode:
                      type: string
                      enum:
                        - standalone
                        - downstream
                        - hybrid
                      default: standalone
                      description: IAM mode; standalone uses local Keycloak accounts, downstream delegates to upstream identity, hybrid prefers upstream and falls back to local login.
                    primaryRealm:
                      type: string
                      default: deploykube-admin
                      description: Primary Keycloak realm where IAM mode reconciliation is applied.
                    secondaryRealms:
                      type: array
                      description: Additional realms that should follow the same IAM mode behavior.
                      items:
                        type: string
                        minLength: 1
                    upstream:
                      type: object
                      description: Optional upstream identity/provisioning source (required for downstream/hybrid).
                      properties:
                        type:
                          type: string
                          enum:
                            - oidc
                            - saml
                            - ldap
                            - scim
                          description: Upstream integration protocol.
                        alias:
                          type: string
                          default: upstream
                          description: Stable Keycloak identity provider alias.
                        displayName:
                          type: string
                          description: Display name shown on the Keycloak login screen for upstream login.
                        oidc:
                          type: object
                          properties:
                            issuerUrl:
                              type: string
                              pattern: ^https://
                              description: OIDC issuer URL.
                            clientId:
                              type: string
                              minLength: 1
                            clientSecretRef:
                              type: object
                              description: Reference to OIDC client secret (ESO Secret and/or Vault path).
                              properties:
                                secretName:
                                  type: string
                                  minLength: 1
                                secretKey:
                                  type: string
                                  minLength: 1
                                namespace:
                                  type: string
                                  minLength: 1
                                vaultPath:
                                  type: string
                                  minLength: 1
                                vaultKey:
                                  type: string
                                  minLength: 1
                            caRef:
                              type: object
                              description: Optional custom CA reference for upstream TLS trust.
                              properties:
                                secretName:
                                  type: string
                                  minLength: 1
                                secretKey:
                                  type: string
                                  minLength: 1
                                namespace:
                                  type: string
                                  minLength: 1
                                vaultPath:
                                  type: string
                                  minLength: 1
                                vaultKey:
                                  type: string
                                  minLength: 1
                            groupsClaim:
                              type: string
                              description: OIDC claim containing group identifiers.
                            groupMappings:
                              type: array
                              items:
                                type: object
                                properties:
                                  source:
                                    type: string
                                    minLength: 1
                                  target:
                                    type: string
                                    minLength: 1
                        saml:
                          type: object
                          properties:
                            entityId:
                              type: string
                              minLength: 1
                            ssoUrl:
                              type: string
                              pattern: ^https://
                              description: SAML single-sign-on endpoint URL.
                            signingCertRef:
                              type: object
                              description: Reference to upstream SAML signing certificate.
                              properties:
                                secretName:
                                  type: string
                                  minLength: 1
                                secretKey:
                                  type: string
                                  minLength: 1
                                namespace:
                                  type: string
                                  minLength: 1
                                vaultPath:
                                  type: string
                                  minLength: 1
                                vaultKey:
                                  type: string
                                  minLength: 1
                            groupsAttribute:
                              type: string
                              description: SAML attribute name containing group values.
                            groupMappings:
                              type: array
                              items:
                                type: object
                                properties:
                                  source:
                                    type: string
                                    minLength: 1
                                  target:
                                    type: string
                                    minLength: 1
                        ldap:
                          type: object
                          properties:
                            url:
                              type: string
                              minLength: 1
                            startTls:
                              type: boolean
                            bindDnRef:
                              type: object
                              description: Reference to bind DN value.
                              properties:
                                secretName:
                                  type: string
                                  minLength: 1
                                secretKey:
                                  type: string
                                  minLength: 1
                                namespace:
                                  type: string
                                  minLength: 1
                                vaultPath:
                                  type: string
                                  minLength: 1
                                vaultKey:
                                  type: string
                                  minLength: 1
                            bindPasswordRef:
                              type: object
                              description: Reference to LDAP bind password.
                              properties:
                                secretName:
                                  type: string
                                  minLength: 1
                                secretKey:
                                  type: string
                                  minLength: 1
                                namespace:
                                  type: string
                                  minLength: 1
                                vaultPath:
                                  type: string
                                  minLength: 1
                                vaultKey:
                                  type: string
                                  minLength: 1
                            usersBaseDn:
                              type: string
                              minLength: 1
                            groupsBaseDn:
                              type: string
                              minLength: 1
                            userFilter:
                              type: string
                            groupFilter:
                              type: string
                            operationMode:
                              type: string
                              enum:
                                - federation
                                - sync
                              description: LDAP operation mode. Hybrid-safe deployments should prefer sync.
                        scim:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                            direction:
                              type: string
                              enum:
                                - inbound
                            authRef:
                              type: object
                              description: Reference to SCIM bridge/API auth credential.
                              properties:
                                secretName:
                                  type: string
                                  minLength: 1
                                secretKey:
                                  type: string
                                  minLength: 1
                                namespace:
                                  type: string
                                  minLength: 1
                                vaultPath:
                                  type: string
                                  minLength: 1
                                vaultKey:
                                  type: string
                                  minLength: 1
                            baseUrl:
                              type: string
                              pattern: ^https://
                              description: Optional SCIM endpoint base URL.
                        egress:
                          type: object
                          description: Optional upstream egress allowlist for IAM integrations.
                          properties:
                            allowedCidrs:
                              type: array
                              items:
                                type: string
                                pattern: ^[0-9]{1,3}(\.[0-9]{1,3}){3}/[0-9]{1,2}$
                            ports:
                              type: array
                              items:
                                type: integer
                                minimum: 1
                                maximum: 65535
                    hybrid:
                      type: object
                      description: Hybrid-specific health and offline credential behavior.
                      properties:
                        healthCheck:
                          type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - http
                                - tcp
                            url:
                              type: string
                              pattern: ^https?://
                            host:
                              type: string
                              minLength: 1
                            port:
                              type: integer
                              minimum: 1
                              maximum: 65535
                            caRef:
                              type: object
                              description: Optional CA bundle reference used to verify HTTPS hybrid health checks.
                              properties:
                                secretName:
                                  type: string
                                  minLength: 1
                                secretKey:
                                  type: string
                                  minLength: 1
                                namespace:
                                  type: string
                                  minLength: 1
                                vaultPath:
                                  type: string
                                  minLength: 1
                                vaultKey:
                                  type: string
                                  minLength: 1
                            timeoutSeconds:
                              type: integer
                              minimum: 1
                            intervalSeconds:
                              type: integer
                              minimum: 1
                            successThreshold:
                              type: integer
                              minimum: 1
                            failureThreshold:
                              type: integer
                              minimum: 1
                        offlineCredential:
                          type: object
                          properties:
                            required:
                              type: boolean
                            method:
                              type: string
                              enum:
                                - password
                                - webauthn
                                - password+otp
                        failOpen:
                          type: boolean
                          default: true
                          description: When true, uncertain or failed upstream health keeps local login visible.
                trustRoots:
                  type: object
                  required:
                    - stepCaRootCertPath
                  properties:
                    stepCaRootCertPath:
                      type: string
                      description: Path to Step CA root certificate in repo
                secrets:
                  type: object
                  required:
                    - rootOfTrust
                  properties:
                    rootOfTrust:
                      type: object
                      required:
                        - provider
                        - mode
                        - assurance
                      properties:
                        provider:
                          type: string
                          enum:
                            - kmsShim
                          description: Auto-unseal/root-of-trust provider
                        mode:
                          type: string
                          enum:
                            - inCluster
                            - external
                          description: Where the root-of-trust boundary lives (in-cluster vs external endpoint)
                        assurance:
                          type: string
                          enum:
                            - low
                            - external-soft
                          description: Assurance level of the root-of-trust (hardware-backed modes are future work)
                        acknowledgeLowAssurance:
                          type: boolean
                          description: Required when environmentId=prod and assurance=low; makes low-assurance prod explicit
                        external:
                          type: object
                          description: External endpoint wiring for rootOfTrust.mode=external (non-secret)
                          properties:
                            address:
                              type: string
                              description: Base URL for the external seal provider endpoint (e.g. https://kms-shim.example.com:8200)
                      # Note: We intentionally do not set additionalProperties: false here.
                      # Kubernetes (v1.34+) rejects CRD schemas that set both properties and additionalProperties.
                time:
                  type: object
                  required:
                    - ntp
                  description: Time synchronization contract for nodes and in-cluster workload consumers.
                  properties:
                    ntp:
                      type: object
                      required:
                        - upstreamServers
                      properties:
                        upstreamServers:
                          type: array
                          minItems: 1
                          x-kubernetes-list-type: set
                          description: Upstream NTP servers used by platform time sync (IP or hostname; internal-first for air-gapped deployments).
                          items:
                            type: string
                            minLength: 1
                network:
                  type: object
                  required:
                    - handoffMode
                    - metallb
                  properties:
                    handoffMode:
                      type: string
                      enum:
                        - l2
                        - ebgp
                      description: Network handoff mode (l2 today, ebgp for future)
                    metallb:
                      type: object
                      required:
                        - pools
                      properties:
                        pools:
                          type: object
                          additionalProperties:
                            type: array
                            items:
                              type: string
                              pattern: ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+([-/][0-9.]+)?$
                            description: Named IP pools (CIDR or range format)
                    vip:
                      type: object
                      description: Optional pinned VIPs
                      properties:
                        publicGatewayIP:
                          type: string
                          pattern: ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$
                        powerdnsIP:
                          type: string
                          pattern: ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$
                backup:
                  type: object
                  description: Backup/DR configuration (optional in v1alpha1; expected for prod-class deployments)
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    target:
                      type: object
                      required:
                        - type
                      properties:
                        type:
                          type: string
                          enum:
                            - nfs
                            - s3
                          description: "Backup target type (v1: nfs)"
                        nfs:
                          type: object
                          required:
                            - server
                            - exportPath
                          properties:
                            server:
                              type: string
                              minLength: 1
                              pattern: ^[a-zA-Z0-9][a-zA-Z0-9.-]*$
                              description: NFS server hostname or IP
                            exportPath:
                              type: string
                              minLength: 1
                              pattern: ^/.*$
                              description: NFS export path
                            mountOptions:
                              type: array
                              items:
                                type: string
                              description: Optional NFS mount options (e.g. vers=4.1)
                        s3:
                          type: object
                          required:
                            - endpoint
                            - bucket
                          properties:
                            endpoint:
                              type: string
                              minLength: 1
                              pattern: ^https?://
                              description: S3 endpoint URL (future)
                            bucket:
                              type: string
                              minLength: 1
                              description: S3 bucket for backups (future)
                            region:
                              type: string
                              minLength: 1
                        authRef:
                          type: object
                          description: Reference to where backup target auth material is stored (never inline secrets)
                          properties:
                            vaultPath:
                              type: string
                              minLength: 1
                              description: Vault KV path holding backup target credentials (when applicable)
                    rpo:
                      type: object
                      description: Recommended RPO targets / schedules (duration strings like 1h, 6h)
                      properties:
                        tier0:
                          type: string
                          minLength: 1
                        s3Mirror:
                          type: string
                          minLength: 1
                        pvc:
                          type: string
                          minLength: 1
                    schedules:
                      type: object
                      description: Optional Cron schedule overrides for backup-system jobs (5-field cron syntax).
                      properties:
                        s3Mirror:
                          type: string
                          minLength: 1
                          pattern: ^\S+\s+\S+\s+\S+\s+\S+\s+\S+$
                        smokeBackupTargetWrite:
                          type: string
                          minLength: 1
                          pattern: ^\S+\s+\S+\s+\S+\s+\S+\s+\S+$
                        smokeBackupsFreshness:
                          type: string
                          minLength: 1
                          pattern: ^\S+\s+\S+\s+\S+\s+\S+\s+\S+$
                        backupSetAssemble:
                          type: string
                          minLength: 1
                          pattern: ^\S+\s+\S+\s+\S+\s+\S+\s+\S+$
                        pvcResticBackup:
                          type: string
                          minLength: 1
                          pattern: ^\S+\s+\S+\s+\S+\s+\S+\s+\S+$
                        smokePvcResticCredentials:
                          type: string
                          minLength: 1
                          pattern: ^\S+\s+\S+\s+\S+\s+\S+\s+\S+$
                        pruneTier0:
                          type: string
                          minLength: 1
                          pattern: ^\S+\s+\S+\s+\S+\s+\S+\s+\S+$
                        smokeFullRestoreStaleness:
                          type: string
                          minLength: 1
                          pattern: ^\S+\s+\S+\s+\S+\s+\S+\s+\S+$
                      # Note: We intentionally do not set additionalProperties: false here.
                      # Kubernetes rejects CRD schemas that set both properties and additionalProperties.
                    s3Mirror:
                      type: object
                      description: S3 mirroring policy knobs (consumed by backup-system jobs).
                      properties:
                        mode:
                          type: string
                          enum:
                            - filesystem
                            - s3-replication
                          default: filesystem
                          description: Backup bucket mirroring mode. s3-replication is preferred for DR (object-to-object, NFS stores only markers). filesystem mirrors objects onto the backup target filesystem (legacy; deprecated for DR).
                        mirrorObservabilityBuckets:
                          type: boolean
                          default: false
                          description: If true, mirror observability buckets (logs/traces/metrics) to the backup target. Defaults to false.
                        replication:
                          type: object
                          description: Configuration for mode=s3-replication.
                          properties:
                            destination:
                              type: object
                              properties:
                                endpoint:
                                  type: string
                                  minLength: 1
                                  pattern: ^https?://
                                  description: Destination S3 endpoint URL (e.g. https://s3.example.com).
                                region:
                                  type: string
                                  minLength: 1
                                  description: Destination S3 region value (S3-compatible).
                                bucket:
                                  type: string
                                  minLength: 1
                                  description: Optional single destination bucket. If set, all source buckets replicate into this bucket under destination.prefix + <sourceBucket>/...
                                prefix:
                                  type: string
                                  description: Optional object prefix within destination.bucket (recommended <deploymentId>/). If set, bucket X replicates into destination.bucket/<prefix>/X/...
                                bucketPrefix:
                                  type: string
                                  description: "Legacy: optional destination bucket name prefix (e.g. dr-). If set and destination.bucket is unset, bucket X replicates into bucketPrefix+X."
                    retention:
                      type: object
                      properties:
                        restic:
                          type: string
                          minLength: 1
                        sets:
                          type: object
                          properties:
                            hourlyWithin:
                              type: string
                              pattern: ^[0-9]+[smhd]$
                              description: Keep all backup sets within this window (e.g. 24h).
                            dailyWithin:
                              type: string
                              pattern: ^[0-9]+[smhd]$
                              description: For sets older than hourlyWithin but newer than this window, keep the newest per day (e.g. 7d).
                            weeklyWithin:
                              type: string
                              pattern: ^[0-9]+[smhd]$
                              description: For sets older than dailyWithin but newer than this window, keep the newest per ISO week; delete anything older (e.g. 56d).
                        tier0:
                          type: object
                          properties:
                            hourlyWithin:
                              type: string
                              pattern: ^[0-9]+[smhd]$
                              description: Keep all tier-0 artifacts within this window (e.g. 24h).
                            dailyWithin:
                              type: string
                              pattern: ^[0-9]+[smhd]$
                              description: For artifacts older than hourlyWithin but newer than this window, keep the newest per day (e.g. 7d).
                            totalWithin:
                              type: string
                              pattern: ^[0-9]+[smhd]$
                              description: For artifacts older than dailyWithin but newer than this window, keep the newest per ISO week; delete anything older (e.g. 56d).
                observability:
                  type: object
                  description: Observability tuning knobs (optional in v1alpha1; consumed via GitOps-rendered overlays).
                  properties:
                    loki:
                      type: object
                      properties:
                        limits:
                          type: object
                          properties:
                            retentionPeriod:
                              type: string
                              pattern: ^[0-9]+[smhd]$
                              description: Loki per-tenant retention period (e.g. 24h, 168h). Rendered into loki.limits_config.retention_period.
                            ingestionRateMb:
                              type: integer
                              minimum: 0
                              description: Loki ingestion rate limit (MB/s). Rendered into loki.limits_config.ingestion_rate_mb when set.
                            ingestionBurstSizeMb:
                              type: integer
                              minimum: 0
                              description: Loki ingestion burst size (MB). Rendered into loki.limits_config.ingestion_burst_size_mb when set.
                            maxGlobalStreamsPerUser:
                              type: integer
                              minimum: 0
                              description: Loki global stream limit per tenant. Rendered into loki.limits_config.max_global_streams_per_user when set.
            status:
              type: object
              properties:
                observedGeneration:
                  format: int64
                  type: integer
                dns:
                  type: object
                  properties:
                    delegation:
                      type: object
                      properties:
                        mode:
                          type: string
                          enum:
                            - none
                            - manual
                            - auto
                        baseDomain:
                          type: string
                          minLength: 1
                        parentZone:
                          type: string
                          minLength: 1
                        nameServers:
                          type: array
                          items:
                            type: string
                            minLength: 1
                        authoritativeDNSIP:
                          type: string
                          minLength: 1
                        parentNSRecords:
                          type: array
                          items:
                            type: string
                            minLength: 1
                        parentGlueRecords:
                          type: array
                          items:
                            type: string
                            minLength: 1
                        manualInstructions:
                          type: array
                          items:
                            type: string
                            minLength: 1
                conditions:
                  type: array
                  items:
                    description: Condition contains details for one aspect of the current state of this API Resource.
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
      subresources:
        status: {}
