apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-forgejo-controller
  labels:
    app.kubernetes.io/name: tenant-forgejo-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tenant-forgejo-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tenant-forgejo-controller
        sidecar.istio.io/inject: "true"
      annotations:
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
    spec:
      serviceAccountName: tenant-forgejo-controller
      containers:
        - name: controller
          image: registry.example.internal/deploykube/tenant-provisioner:0.2.24
          imagePullPolicy: IfNotPresent
          args:
            - --controller-profile=forgejo
            - --forgejo-base-url=http://forgejo-http.forgejo.svc.cluster.local:3000
          env:
            - name: FORGEJO_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: forgejo-admin
                  key: username
            - name: FORGEJO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forgejo-admin
                  key: password
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          ports:
            - name: metrics
              containerPort: 8080
            - name: probes
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      securityContext:
        runAsNonRoot: true
      volumes:
        - name: tmp
          emptyDir: {}
