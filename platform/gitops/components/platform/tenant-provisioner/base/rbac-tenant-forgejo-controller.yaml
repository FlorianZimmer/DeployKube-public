apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tenant-forgejo-controller
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["forgejo-repo-tls"]
    verbs: ["get"]
  - apiGroups: ["tenancy.darksite.cloud"]
    resources: ["tenantprojects"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["tenancy.darksite.cloud"]
    resources: ["tenantprojects/status"]
    verbs: ["patch", "update"]
  - apiGroups: ["tenancy.darksite.cloud"]
    resources: ["tenants"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tenant-forgejo-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tenant-forgejo-controller
subjects:
  - kind: ServiceAccount
    name: tenant-forgejo-controller
    namespace: tenant-system
