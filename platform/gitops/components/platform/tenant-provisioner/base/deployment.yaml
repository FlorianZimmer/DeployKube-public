apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-networking-controller
  labels:
    app.kubernetes.io/name: tenant-networking-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tenant-networking-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tenant-networking-controller
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: tenant-networking-controller
      containers:
        - name: controller
          image: registry.example.internal/deploykube/tenant-provisioner:0.2.24
          imagePullPolicy: IfNotPresent
          args:
            - --deployment-config-namespace=argocd
            - --deployment-config-name=deploykube-deployment-config
            - --deployment-config-key=deployment-config.yaml
            - --gateway-namespace=istio-system
            - --public-gateway-name=public-gateway
            - --egress-proxy-observe-only=false
            - --platform-ingress-certs-observe-only=false
            - --ingress-adjacent-observe-only=false
            - --loki-limits-observe-only=false
            - --dns-wiring-observe-only=false
            - --cloud-dns-observe-only=false
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          ports:
            - name: metrics
              containerPort: 8080
            - name: probes
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      securityContext:
        runAsNonRoot: true
      volumes:
        - name: tmp
          emptyDir: {}
