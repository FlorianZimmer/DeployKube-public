apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dnszones.dns.darksite.cloud
spec:
  group: dns.darksite.cloud
  names:
    kind: DNSZone
    listKind: DNSZoneList
    plural: dnszones
    singular: dnszone
    shortNames:
      - dkdnszone
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - zoneName
              properties:
                zoneName:
                  type: string
                  minLength: 1
                  pattern: ^[a-z0-9][a-z0-9.-]+$
                  description: FQDN of the authoritative zone hosted by Cloud DNS.
                zoneWriterRef:
                  type: object
                  description: Secret reference for the authoritative zone writer backend (defaults to dns-system/powerdns-api).
                  properties:
                    name:
                      type: string
                      minLength: 1
                    namespace:
                      type: string
                      minLength: 1
                authority:
                  type: object
                  properties:
                    nameServers:
                      type: array
                      items:
                        type: string
                        pattern: ^[a-z0-9][a-z0-9.-]+$
                    ip:
                      type: string
                      pattern: ^[0-9]{1,3}(\.[0-9]{1,3}){3}$
                records:
                  type: object
                  properties:
                    wildcardARecordIP:
                      type: string
                      pattern: ^[0-9]{1,3}(\.[0-9]{1,3}){3}$
                credentials:
                  type: object
                  properties:
                    vaultPath:
                      type: string
                      minLength: 1
                delegation:
                  type: object
                  properties:
                    mode:
                      type: string
                      enum:
                        - none
                        - manual
                        - auto
                    parentZone:
                      type: string
                      pattern: ^[a-z0-9][a-z0-9.-]+$
                    writerRef:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        namespace:
                          type: string
                          minLength: 1
