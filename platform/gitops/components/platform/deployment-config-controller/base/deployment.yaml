apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-config-controller
  labels:
    app.kubernetes.io/name: deployment-config-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deployment-config-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deployment-config-controller
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: deployment-config-controller
      containers:
        - name: controller
          image: registry.example.internal/deploykube/tenant-provisioner:0.2.24
          imagePullPolicy: IfNotPresent
          args:
            - --controller-profile=deployment-config
            - --backup-system-wiring-observe-only=false
            - --keycloak-upstream-egress-observe-only=false
            - --snapshot-namespaces=argocd,backup-system,forgejo,grafana,keycloak
            - --snapshot-name=deploykube-deployment-config
            - --snapshot-key=deployment-config.yaml
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          ports:
            - name: metrics
              containerPort: 8080
            - name: probes
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      securityContext:
        runAsNonRoot: true
      volumes:
        - name: tmp
          emptyDir: {}
