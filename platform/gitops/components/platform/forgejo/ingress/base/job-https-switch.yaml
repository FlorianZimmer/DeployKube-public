apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-https-switch
  namespace: forgejo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-https-switch
  namespace: forgejo
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get", "patch", "create"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "patch"]
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["httproutes"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgejo-https-switch
  namespace: forgejo
subjects:
- kind: ServiceAccount
  name: forgejo-https-switch
  namespace: forgejo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: forgejo-https-switch
---
apiVersion: batch/v1
kind: Job
metadata:
  name: forgejo-https-switch
  namespace: forgejo
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: forgejo-https-switch
      restartPolicy: OnFailure
      containers:
      - name: https-switch
        image: registry.example.internal/deploykube/bootstrap-tools:1.4
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          cp /config/https-switch.sh /usr/local/bin/https-switch.sh && \
          chmod +x /usr/local/bin/https-switch.sh && \
          /usr/local/bin/https-switch.sh
        volumeMounts:
        - name: script
          mountPath: /config
      volumes:
      - name: script
        configMap:
          name: forgejo-https-switch-script
          defaultMode: 0755
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
        sidecar.istio.io/nativeSidecar: 'true'
