apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/valkey
patches:
  # Valkey StatefulSet: 1 replica, emptyDir instead of PVC
  - target:
      kind: StatefulSet
      name: forgejo-valkey
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/volumeClaimTemplates
        value: []
      - op: replace
        path: /spec/template/spec/volumes
        value:
          - name: scripts
            configMap:
              name: forgejo-valkey-scripts
              defaultMode: 0555
          - name: data
            emptyDir:
              sizeLimit: 512Mi
  # Sentinel StatefulSet: 1 replica
  - target:
      kind: StatefulSet
      name: forgejo-valkey-sentinel
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
