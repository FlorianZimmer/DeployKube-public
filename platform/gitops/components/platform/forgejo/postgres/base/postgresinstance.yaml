apiVersion: data.darksite.cloud/v1alpha1
kind: PostgresInstance
metadata:
  name: postgres
spec:
  classRef:
    name: platform-ha-large
  databaseName: forgejo
  ownerRole: forgejo
  connectionSecretName: forgejo-postgres-app
  superuserSecretName: forgejo-postgres-superuser
  resourceNames:
    backupConfigMapName: backup-encryption
    backupServiceAccountName: postgres-backup
    backupCronJobName: postgres-backup
    backupPVCName: postgres-backup-v2
    backupWarmupJobName: postgres-backup-warmup
    networkPolicyName: forgejo-postgres-ingress
  network:
    accessMode: SameNamespace
  backup:
    schedule: "0 3 * * *"
    sourceName: postgres
    connection:
      host: postgres-rw
      sslMode: require
