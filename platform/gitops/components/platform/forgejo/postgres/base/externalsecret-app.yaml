apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-postgres-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-core
  target:
    name: forgejo-postgres-app
    creationPolicy: Owner
    template:
      mergePolicy: Merge
      type: Opaque
      data:
        database: forgejo
        username: forgejo
  data:
    - secretKey: password
      remoteRef:
        key: forgejo/database
        property: appPassword
