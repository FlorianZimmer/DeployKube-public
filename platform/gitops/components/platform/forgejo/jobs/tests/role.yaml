apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-smoke
  namespace: forgejo
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - endpoints
      - secrets
      - services
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources:
      - clusters
    verbs: ["get", "list", "watch"]

