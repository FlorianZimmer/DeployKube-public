apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-cache-switch
  namespace: forgejo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-cache-switch
  namespace: forgejo
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get", "patch", "create"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgejo-cache-switch
  namespace: forgejo
subjects:
- kind: ServiceAccount
  name: forgejo-cache-switch
  namespace: forgejo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: forgejo-cache-switch
---
apiVersion: batch/v1
kind: Job
metadata:
  name: forgejo-cache-switch
  namespace: forgejo
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: forgejo-cache-switch
      restartPolicy: OnFailure
      containers:
      - name: cache-switch
        image: registry.example.internal/deploykube/bootstrap-tools:1.4
        imagePullPolicy: IfNotPresent
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        command:
        - /bin/sh
        - -c
        - |
          cp /scripts/cache-switch.sh /usr/local/bin/cache-switch.sh && \
          chmod +x /usr/local/bin/cache-switch.sh && \
          /usr/local/bin/cache-switch.sh
        volumeMounts:
        - name: script
          mountPath: /scripts
          readOnly: true
      volumes:
      - name: script
        configMap:
          name: forgejo-cache-switch-script
          defaultMode: 0755
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
        sidecar.istio.io/nativeSidecar: 'true'
