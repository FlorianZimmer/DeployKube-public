apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-db-seed
  namespace: forgejo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-db-seed
  namespace: forgejo
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "create"]
- apiGroups: ["postgresql.cnpg.io"]
  resources: ["clusters"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgejo-db-seed
  namespace: forgejo
subjects:
- kind: ServiceAccount
  name: forgejo-db-seed
  namespace: forgejo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: forgejo-db-seed
---
apiVersion: batch/v1
kind: Job
metadata:
  name: forgejo-db-seed
  namespace: forgejo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: forgejo-db-seed
      restartPolicy: OnFailure
      containers:
      - name: db-seed
        image: registry.example.internal/deploykube/bootstrap-tools:1.4
        command:
        - /bin/sh
        - -c
        - |
          cp /scripts/db-seed.sh /usr/local/bin/db-seed
          chmod +x /usr/local/bin/db-seed
          /usr/local/bin/db-seed
        volumeMounts:
        - name: script
          mountPath: /scripts
          readOnly: true
        - name: istio-native-exit
          mountPath: /helpers
          readOnly: true
        - name: forgejo-data
          mountPath: /forgejo-data
        env:
        - name: POSTGRES_HOST
          value: postgres-rw
        - name: POSTGRES_DB
          value: forgejo
        - name: POSTGRES_SUPERUSER_USER
          valueFrom:
            secretKeyRef:
              name: forgejo-postgres-superuser
              key: username
        - name: POSTGRES_SUPERUSER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: forgejo-postgres-superuser
              key: password
        - name: POSTGRES_APP_USER
          valueFrom:
            secretKeyRef:
              name: forgejo-postgres-app
              key: username
        - name: POSTGRES_APP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: forgejo-postgres-app
              key: password
        - name: DATA_DIR
          value: /forgejo-data
        - name: FORGEJO_DEPLOYMENT
          value: forgejo
        - name: FORGEJO_LABEL_SELECTOR
          value: app.kubernetes.io/name=forgejo
      volumes:
      - name: script
        configMap:
          name: forgejo-db-job-scripts
          defaultMode: 0755
      - name: istio-native-exit
        configMap:
          name: istio-native-exit-script
          defaultMode: 0444
      - name: forgejo-data
        persistentVolumeClaim:
          claimName: gitea-shared-storage
    metadata:
      annotations:
        sidecar.istio.io/nativeSidecar: 'true'
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
        traffic.sidecar.istio.io/excludeOutboundPorts: "5432"
