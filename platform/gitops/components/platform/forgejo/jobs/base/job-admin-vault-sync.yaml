apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-admin-sync
  namespace: forgejo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-admin-sync
  namespace: forgejo
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["forgejo-admin"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgejo-admin-sync
  namespace: forgejo
subjects:
- kind: ServiceAccount
  name: forgejo-admin-sync
  namespace: forgejo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: forgejo-admin-sync
---
apiVersion: batch/v1
kind: Job
metadata:
  name: forgejo-admin-vault-sync
  namespace: forgejo
  annotations:
    argocd.argoproj.io/sync-wave: "12"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      annotations:
        sidecar.istio.io/nativeSidecar: 'true'
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
    spec:
      serviceAccountName: forgejo-admin-sync
      restartPolicy: Never
      containers:
      - name: sync
        image: registry.example.internal/deploykube/bootstrap-tools:1.4
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - /scripts/admin-vault-sync.sh
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: VAULT_ADDR
          value: http://vault.vault-system.svc:8200
        - name: VAULT_ROLE
          value: forgejo-admin-sync
        volumeMounts:
        - name: script
          mountPath: /scripts/admin-vault-sync.sh
          subPath: admin-vault-sync.sh
          readOnly: true
        - name: istio-native-exit
          mountPath: /helpers
          readOnly: true
      volumes:
      - name: script
        configMap:
          name: forgejo-admin-vault-sync-script
          defaultMode: 0555
      - name: istio-native-exit
        configMap:
          name: istio-native-exit-script
          defaultMode: 0444
