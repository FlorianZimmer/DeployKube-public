    repo: https://kubernetes-sigs.github.io/metrics-server
    version: 3.12.2
    releaseName: metrics-server
    namespace: kube-system
    valuesFile: values-metrics-server.yaml

patches:
  - path: patch-vpa-requests-deployment-metrics-server.yaml

