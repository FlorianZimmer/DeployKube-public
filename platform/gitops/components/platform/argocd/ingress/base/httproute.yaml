apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  # Patched by the tenant provisioner controller (and historically by the HTTPS switch Job), based on the deployment config.
  # NOTE: Do not leave this empty (empty hostnames can match all hosts).
  hostnames:
    - argocd.invalid
  parentRefs:
    - name: public-gateway
      namespace: istio-system
      sectionName: https-argocd
  rules:
    # Back-compat redirect: Argo CD v3 UI does not serve /explore/repos (blank page).
    - matches:
        - path:
            type: Exact
            value: /explore/repos
        - path:
            type: PathPrefix
            value: /explore/repos/
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /settings/repos
    # Argo CD UI loads /extensions.js if present. Serve a tiny shim to redirect
    # SPA navigations from /explore/repos -> /settings/repos.
    - matches:
        - path:
            type: Exact
            value: /extensions.js
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Cache-Control
                value: no-store
      backendRefs:
        - name: argocd-ui-extensions
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Port
                value: "443"
      backendRefs:
        - name: argo-cd-argocd-server
          port: 443
