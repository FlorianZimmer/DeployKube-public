apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argocd-core-egress
  namespace: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: argo-cd
  policyTypes:
    - Egress
  egress:
    # Core Argo components communicate with each other inside the namespace.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd

    # Kubernetes API (for watches/reconciliation); Cilium policy below is the main path,
    # this K8s NP rule is kept as a compatibility fallback.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              component: kube-apiserver
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP

    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: coredns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    # Istio control plane (xDS) + public gateway HTTPS (Keycloak/Argo host flows via Gateway).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 15012
          protocol: TCP
        - port: 15017
          protocol: TCP
        - port: 443
          protocol: TCP

    # Forgejo internal HTTPS endpoint for repo-server Git operations.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: forgejo
          podSelector:
            matchLabels:
              app.kubernetes.io/name: forgejo-tls-proxy
      ports:
        - port: 443
          protocol: TCP
        - port: 8443
          protocol: TCP

    # Keycloak service traffic (OIDC-related server flows).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
          podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - port: 8443
          protocol: TCP
        - port: 8080
          protocol: TCP
