apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-oidc-config
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-oidc-config
  namespace: argocd
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "patch"]
  resourceNames:
    - argocd-cm
    - argocd-rbac-cm
    - argocd-oidc-config-state
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames:
    - argocd-secret
    - argocd-oidc-ca
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get"]
  resourceNames:
    - platform-keycloak-bootstrap
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "watch", "patch"]
  resourceNames:
    - argo-cd-argocd-server
    - argo-cd-argocd-repo-server
    - argo-cd-argocd-applicationset-controller
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "watch", "patch"]
  resourceNames:
    - argo-cd-argocd-application-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-oidc-config
  namespace: argocd
subjects:
- kind: ServiceAccount
  name: argocd-oidc-config
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-oidc-config
---
apiVersion: batch/v1
kind: Job
metadata:
  name: argocd-oidc-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "3.5"
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        deploykube.gitops/job: argocd-oidc-config
      annotations:
        sidecar.istio.io/nativeSidecar: 'true'
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
    spec:
      serviceAccountName: argocd-oidc-config
      restartPolicy: Never
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    deploykube.gitops/job: argocd-oidc-config
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              deploykube.gitops/job: argocd-oidc-config
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: configure
        image: registry.example.internal/deploykube/bootstrap-tools@sha256:e7be47a69e3a11bc58c857f2d690a71246ada91ac3a60bdfb0a547f091f6485a
        imagePullPolicy: IfNotPresent
        command:
        - /scripts/configure-oidc.sh
        env:
        - name: HOME
          value: /tmp
        - name: XDG_CONFIG_HOME
          value: /tmp/.config
        - name: KEYCLOAK_REALM
          value: deploykube-admin
        - name: KEYCLOAK_BOOTSTRAP_APP
          value: platform-keycloak-bootstrap
        - name: OIDC_CA_FILE
          value: /etc/oidc-ca/ca.crt
        - name: DEPLOYMENT_CONFIG_FILE
          value: /etc/deploykube/deployment-config/deployment-config.yaml
        - name: OIDC_STATE_CONFIGMAP
          value: argocd-oidc-config-state
        - name: IDEMPOTENCE_VERSION
          value: "2026-03-02-v1"
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        volumeMounts:
        - name: script
          mountPath: /scripts/configure-oidc.sh
          subPath: configure-oidc.sh
          readOnly: true
        - name: oidc-ca
          mountPath: /etc/oidc-ca
          readOnly: true
        - name: deployment-config
          mountPath: /etc/deploykube/deployment-config
          readOnly: true
        - name: istio-native-exit
          mountPath: /helpers
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: script
        configMap:
          name: argocd-oidc-config-script
          defaultMode: 0755
      - name: oidc-ca
        secret:
          secretName: argocd-oidc-ca
      - name: deployment-config
        configMap:
          name: deploykube-deployment-config
          items:
            - key: deployment-config.yaml
              path: deployment-config.yaml
      - name: istio-native-exit
        configMap:
          name: istio-native-exit-script
          defaultMode: 0444
      - name: tmp
        emptyDir: {}
  ttlSecondsAfterFinished: 3600
