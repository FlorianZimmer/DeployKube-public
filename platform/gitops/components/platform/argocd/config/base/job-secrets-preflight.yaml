apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-secrets-preflight
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-secrets-preflight
  namespace: argocd
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames:
    - repo-forgejo-platform
    - argocd-secret
    - argocd-oidc-ca
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-secrets-preflight
  namespace: argocd
subjects:
- kind: ServiceAccount
  name: argocd-secrets-preflight
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-secrets-preflight
---
apiVersion: batch/v1
kind: Job
metadata:
  name: argocd-secrets-preflight
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "3.45"
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        deploykube.gitops/job: argocd-secrets-preflight
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: argocd-secrets-preflight
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: preflight
        image: registry.example.internal/deploykube/bootstrap-tools@sha256:e7be47a69e3a11bc58c857f2d690a71246ada91ac3a60bdfb0a547f091f6485a
        imagePullPolicy: IfNotPresent
        command:
        - /scripts/secrets-preflight.sh
        env:
        - name: WAIT_ATTEMPTS
          value: "60"
        - name: WAIT_INTERVAL
          value: "5"
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        volumeMounts:
        - name: script
          mountPath: /scripts/secrets-preflight.sh
          subPath: secrets-preflight.sh
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: script
        configMap:
          name: argocd-secrets-preflight-script
          defaultMode: 0755
      - name: tmp
        emptyDir: {}
