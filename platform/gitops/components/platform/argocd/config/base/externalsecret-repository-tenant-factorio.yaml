apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-forgejo-repo-tenant-factorio
  namespace: argocd
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-core
    kind: ClusterSecretStore
  target:
    name: repo-forgejo-tenant-factorio-apps-factorio
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: https://forgejo-https.forgejo.svc.cluster.local/tenant-factorio/apps-factorio.git
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: forgejo/argocd-repo
        property: username
    - secretKey: password
      remoteRef:
        key: forgejo/argocd-repo
        property: password
---
