apiVersion: apps/v1
kind: Deployment
metadata:
  name: sync-controller
  namespace: idlab
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app.kubernetes.io/name: sync-controller
    darksite.cloud/ha-tier: tier-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sync-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sync-controller
        darksite.cloud/ha-tier: tier-2
    spec:
      containers:
        - name: controller
          image: registry.example.internal/deploykube/idlab-poc:0.1.0
          args: ["sync-controller", "--loop"]
          env:
            - name: IDLAB_LISTEN_ADDR
              value: :8080
            - name: IDLAB_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: idlab-postgres-app
                  key: uri
            - name: MKC_SCIM_URL
              value: http://mkc-scim-facade:8080/scim/v2
            - name: MKC_INTERNAL_URL
              value: http://mkc-scim-facade:8080
            - name: MKC_KEYCLOAK_URL
              value: http://mkc-keycloak:8080
            - name: MKC_KEYCLOAK_REALM
              value: mkc
            - name: MKC_KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: idlab-service-clients
                  key: mkcClientId
            - name: MKC_KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: idlab-service-clients
                  key: mkcClientSecret
            - name: BTP_SCIM_URL
              value: http://btp-scim-facade:8080/scim/v2
            - name: SCIM_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: idlab-service-clients
                  key: scimBearerToken
            - name: SYNC_LOOP_INTERVAL_SECONDS
              value: "30"
            - name: SOURCE_SCIM_STALE_AFTER_SECONDS
              value: "45"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 20m
              memory: 96Mi
            limits:
              memory: 256Mi
---
