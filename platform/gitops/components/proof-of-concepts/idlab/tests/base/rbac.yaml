apiVersion: v1
kind: ServiceAccount
metadata:
  name: idlab-smoke
  namespace: idlab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: idlab-smoke
  namespace: idlab
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "secrets", "services", "persistentvolumeclaims", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: idlab-smoke
  namespace: idlab
subjects:
  - kind: ServiceAccount
    name: idlab-smoke
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: idlab-smoke
