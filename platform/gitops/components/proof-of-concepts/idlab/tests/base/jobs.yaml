apiVersion: batch/v1
kind: Job
metadata:
  name: idlab-smoke-auth-offline
  namespace: idlab
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
spec:
  suspend: true
  backoffLimit: 1
  activeDeadlineSeconds: 1200
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: idlab-smoke
    spec:
      serviceAccountName: idlab-smoke
      restartPolicy: Never
      initContainers:
        - name: scale-ukc
          image: registry.example.internal/deploykube/bootstrap-tools:1.4
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ceu"]
          args:
            - |
              kubectl -n idlab scale deployment/ukc-keycloak --replicas=0
              while true; do
                ready="$(kubectl -n idlab get deployment ukc-keycloak -o jsonpath='{.status.readyReplicas}' 2>/dev/null || true)"
                if [ "${ready:-0}" = "0" ]; then
                  break
                fi
                sleep 2
              done
      containers:
        - name: playwright
          image: mcr.microsoft.com/playwright:v1.52.0-jammy
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-lc"]
          args:
            - |
              export npm_config_cache=/tmp/npm-cache
              export PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
              export PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
              npm install --prefix /tmp/idlab-playwright playwright@1.52.0
              export NODE_PATH=/tmp/idlab-playwright/node_modules
              node /scripts/auth-offline.js
          env:
            - name: BTP_BASE_URL
              value: http://btp-keycloak:8080
            - name: MKC_USERNAME
              value: alice
            - name: MKC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: idlab-offline-passwords
                  key: aliceOfflinePassword
            - name: EXPECT_NO_UKC_BROKER
              value: "yes"
          volumeMounts:
            - name: script
              mountPath: /scripts/auth-offline.js
              subPath: auth-offline.js
              readOnly: true
            - name: proofs
              mountPath: /proofs
      volumes:
        - name: script
          configMap:
            name: idlab-test-script-playwright-offline
            defaultMode: 0555
        - name: proofs
          persistentVolumeClaim:
            claimName: proofs-pvc
---
