kind: Job
metadata:
  name: idlab-smoke-negative-mkc-link-only
  namespace: idlab
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
spec:
  suspend: true
  backoffLimit: 1
  activeDeadlineSeconds: 1200
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: idlab-smoke
    spec:
      serviceAccountName: idlab-smoke
      restartPolicy: Never
      containers:
        - name: playwright
          image: mcr.microsoft.com/playwright:v1.52.0-jammy
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-lc"]
          args:
            - |
              export npm_config_cache=/tmp/npm-cache
              export PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
              export PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
              npm install --prefix /tmp/idlab-playwright playwright@1.52.0
              export NODE_PATH=/tmp/idlab-playwright/node_modules
              node /scripts/auth-negative-mkc-link-only.js
          env:
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            - name: K8S_NAMESPACE
              value: idlab
            - name: PROOFS_DIR
              value: /proofs
            - name: UKC_BASE_URL
              value: http://ukc-keycloak:8080
            - name: MKC_BASE_URL
              value: http://mkc-keycloak:8080
            - name: BTP_BASE_URL
              value: http://btp-keycloak:8080
            - name: UKC_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: idlab-admin-secrets
                  key: ukcAdminUsername
            - name: UKC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: idlab-admin-secrets
                  key: ukcAdminPassword
            - name: MKC_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: idlab-admin-secrets
                  key: mkcAdminUsername
            - name: MKC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: idlab-admin-secrets
                  key: mkcAdminPassword
            - name: BTP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: idlab-admin-secrets
                  key: btpAdminUsername
            - name: BTP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: idlab-admin-secrets
                  key: btpAdminPassword
          volumeMounts:
            - name: script
              mountPath: /scripts/auth-negative-mkc-link-only.js
              subPath: auth-negative-mkc-link-only.js
              readOnly: true
            - name: proofs
              mountPath: /proofs
      volumes:
        - name: script
          configMap:
            name: idlab-test-script-playwright-negative-mkc
            defaultMode: 0555
        - name: proofs
          persistentVolumeClaim:
            claimName: proofs-pvc
---
