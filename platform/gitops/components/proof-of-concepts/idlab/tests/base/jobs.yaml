apiVersion: batch/v1
kind: Job
metadata:
  name: idlab-seed-ukc
  namespace: idlab
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
spec:
  suspend: true
  backoffLimit: 1
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: idlab-smoke
    spec:
      serviceAccountName: idlab-smoke
      restartPolicy: Never
      containers:
        - name: seed
          image: registry.example.internal/deploykube/bootstrap-tools:1.4
          imagePullPolicy: IfNotPresent
          command: ["/scripts/seed-ukc.sh"]
          env:
            - name: UKC_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: idlab-admin-secrets
                  key: ukcAdminUsername
            - name: UKC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: idlab-admin-secrets
                  key: ukcAdminPassword
            - name: UKC_SYNC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: idlab-service-clients
                  key: ukcClientSecret
          volumeMounts:
            - name: script
              mountPath: /scripts/seed-ukc.sh
              subPath: seed-ukc.sh
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: idlab-test-script-seed-ukc
            defaultMode: 0555
---
