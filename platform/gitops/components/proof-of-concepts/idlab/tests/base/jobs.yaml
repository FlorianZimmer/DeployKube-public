apiVersion: batch/v1
kind: Job
metadata:
  name: idlab-smoke-auth-online
  namespace: idlab
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
spec:
  suspend: true
  backoffLimit: 1
  activeDeadlineSeconds: 1200
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: idlab-smoke
    spec:
      restartPolicy: Never
      containers:
        - name: playwright
          image: mcr.microsoft.com/playwright:v1.52.0-jammy
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-lc"]
          args:
            - |
              export npm_config_cache=/tmp/npm-cache
              export PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
              export PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
              npm install --prefix /tmp/idlab-playwright playwright@1.52.0
              export NODE_PATH=/tmp/idlab-playwright/node_modules
              node /scripts/auth-online.js
          env:
            - name: BTP_BASE_URL
              value: http://btp-keycloak:8080
            - name: UKC_USERNAME
              value: alice
            - name: UKC_PASSWORD
              value: Alice-UKC-123!
          volumeMounts:
            - name: script
              mountPath: /scripts/auth-online.js
              subPath: auth-online.js
              readOnly: true
            - name: proofs
              mountPath: /proofs
      volumes:
        - name: script
          configMap:
            name: idlab-test-script-playwright-online
            defaultMode: 0555
        - name: proofs
          persistentVolumeClaim:
            claimName: proofs-pvc
