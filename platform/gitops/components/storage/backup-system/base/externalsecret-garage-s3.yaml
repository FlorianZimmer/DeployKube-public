apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backup-system-garage-s3
  labels:
    app.kubernetes.io/name: backup-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-core
  target:
    name: backup-system-garage-s3
    creationPolicy: Owner
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
  data:
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: garage/s3
        property: S3_ACCESS_KEY
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: garage/s3
        property: S3_SECRET_KEY
    - secretKey: S3_REGION
      remoteRef:
        key: garage/s3
        property: S3_REGION
    - secretKey: S3_ENDPOINT
      remoteRef:
        key: garage/s3
        property: S3_ENDPOINT
    - secretKey: BUCKET_LOGS
      remoteRef:
        key: garage/s3
        property: BUCKET_LOGS
    - secretKey: BUCKET_TRACES
      remoteRef:
        key: garage/s3
        property: BUCKET_TRACES
    - secretKey: BUCKET_METRICS
      remoteRef:
        key: garage/s3
        property: BUCKET_METRICS
    - secretKey: BUCKET_BACKUPS
      remoteRef:
        key: garage/s3
        property: BUCKET_BACKUPS
