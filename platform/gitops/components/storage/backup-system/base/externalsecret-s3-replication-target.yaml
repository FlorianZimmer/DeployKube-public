apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backup-system-s3-replication-target
  namespace: backup-system
  labels:
    app.kubernetes.io/name: backup-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-core
  target:
    name: backup-system-s3-replication-target
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
  data:
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: backup/s3-replication-target
        property: S3_ACCESS_KEY
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: backup/s3-replication-target
        property: S3_SECRET_KEY
