apiVersion: batch/v1
kind: CronJob
metadata:
  name: storage-smoke-pvc-restic-credentials
  annotations:
    deploykube.gitops/validation-job: "true"
spec:
  # Intentionally offset from :00 to avoid top-of-hour kube-apiserver contention.
  schedule: "41 */6 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 1200
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          restartPolicy: Never
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            runAsNonRoot: true
            fsGroup: 65532
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                # Prefer non-control-plane nodes when present, but remain schedulable on single-node clusters.
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: DoesNotExist
                - weight: 50
                  preference:
                    matchExpressions:
                      - key: node-role.kubernetes.io/master
                        operator: DoesNotExist
          initContainers:
            - name: restic-binary
              image: docker.io/restic/restic@sha256:39d9072fb5651c80d75c7a811612eb60b4c06b32ffe87c2e9f3c7222e1797e76
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  cp "$(command -v restic)" /work/restic
                  chmod 0755 /work/restic
              volumeMounts:
                - name: restic-bin
                  mountPath: /work
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
          containers:
            - name: smoke
              image: registry.example.internal/deploykube/bootstrap-tools@sha256:e7be47a69e3a11bc58c857f2d690a71246ada91ac3a60bdfb0a547f091f6485a
              imagePullPolicy: IfNotPresent
              env:
                - name: DEPLOYMENT_ID
                  value: proxmox-talos
                - name: MIN_REPOS
                  value: "1"
              volumeMounts:
                - name: deployment-config
                  mountPath: /config
                  readOnly: true
                - name: restic-bin
                  mountPath: /work
                  readOnly: true
                - name: backup
                  mountPath: /backup
                  readOnly: true
                - name: active-secret
                  mountPath: /secrets/active
                  readOnly: true
                - name: recovery-secret
                  mountPath: /secrets/recovery
                  readOnly: true
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  command -v yq >/dev/null 2>&1 || { echo "missing dependency: yq" >&2; exit 1; }
                  command -v python3 >/dev/null 2>&1 || { echo "missing dependency: python3" >&2; exit 1; }
                  test -x /work/restic || { echo "missing restic binary in /work/restic" >&2; exit 1; }

                  cfg="/config/deployment-config.yaml"
                  if [ -f "$cfg" ]; then
                    dep="$(yq -r '.spec.deploymentId // ""' "$cfg" 2>/dev/null || true)"
                    if [ -n "$dep" ]; then
                      DEPLOYMENT_ID="$dep"
                      export DEPLOYMENT_ID
                    fi
                  fi

                  python3 - <<'PY'
                  import json
                  import os
                  import subprocess
                  import sys
                  from pathlib import Path

                  deployment_id = os.environ.get("DEPLOYMENT_ID", "").strip()
                  if not deployment_id:
                      print("missing DEPLOYMENT_ID env", file=sys.stderr)
                      sys.exit(1)

                  min_repos_raw = os.environ.get("MIN_REPOS", "1").strip()
                  try:
                      min_repos = int(min_repos_raw)
                  except ValueError:
                      print(f"MIN_REPOS must be an integer, got {min_repos_raw!r}", file=sys.stderr)
                      sys.exit(1)
                  if min_repos < 0:
                      print("MIN_REPOS must be >= 0", file=sys.stderr)
                      sys.exit(1)

                  active_path = Path("/secrets/active/RESTIC_PASSWORD")
                  recovery_path = Path("/secrets/recovery/RESTIC_PASSWORDS_JSON")
                  restic_bin = Path("/work/restic")

                  if not active_path.is_file():
                      print("missing /secrets/active/RESTIC_PASSWORD", file=sys.stderr)
                      sys.exit(1)
                  if not recovery_path.is_file():
                      print("missing /secrets/recovery/RESTIC_PASSWORDS_JSON", file=sys.stderr)
                      sys.exit(1)
                  if not restic_bin.is_file():
                      print("missing /work/restic", file=sys.stderr)
                      sys.exit(1)

                  active_password = active_path.read_text(encoding="utf-8").strip()
                  if not active_password:
                      print("active RESTIC_PASSWORD is empty", file=sys.stderr)
                      sys.exit(1)

                  try:
                      recovery = json.loads(recovery_path.read_text(encoding="utf-8"))
                  except Exception as e:
                      print(f"invalid recovery JSON: {e}", file=sys.stderr)
                      sys.exit(1)

                  pvc = recovery.get("backupSystemPvcRestic")
                  if not isinstance(pvc, dict):
                      print("recovery JSON missing backupSystemPvcRestic object", file=sys.stderr)
                      sys.exit(1)
                  recovery_active = pvc.get("active", "")
                  if not isinstance(recovery_active, str):
                      print("recovery JSON field backupSystemPvcRestic.active must be a string", file=sys.stderr)
                      sys.exit(1)
                  if recovery_active != active_password:
                      print("active password mismatch between backup-system-pvc-restic and backup-recovery-material", file=sys.stderr)
                      sys.exit(1)

                  recovery_candidate = pvc.get("candidate", "")
                  if recovery_candidate is None:
                      recovery_candidate = ""
                  if not isinstance(recovery_candidate, str):
                      print("recovery JSON field backupSystemPvcRestic.candidate must be a string", file=sys.stderr)
                      sys.exit(1)

                  repos_root = Path("/backup") / deployment_id / "pvc-restic" / "namespaces"
                  repo_configs = sorted(repos_root.glob("*/persistentvolumeclaims/*/repo/config"))
                  repo_count = len(repo_configs)
                  if repo_count < min_repos:
                      print(
                          f"repo count below expectation: discovered={repo_count} min={min_repos} root={repos_root}",
                          file=sys.stderr,
                      )
                      sys.exit(1)

                  if repo_count == 0:
                      print("ok: no pvc-restic repos discovered and MIN_REPOS=0")
                      sys.exit(0)

                  checked = 0
                  for cfg in repo_configs:
                      repo = cfg.parent

                      def check_password(password: str, label: str) -> None:
                          env = os.environ.copy()
                          env["RESTIC_REPOSITORY"] = str(repo)
                          env["RESTIC_PASSWORD"] = password
                          try:
                              subprocess.run(
                                  [str(restic_bin), "--no-lock", "cat", "config"],
                                  check=True,
                                  capture_output=True,
                                  text=True,
                                  env=env,
                                  timeout=120,
                              )
                          except subprocess.CalledProcessError as e:
                              stderr = (e.stderr or "").strip()
                              print(f"{label} password failed for repo {repo}: {stderr}", file=sys.stderr)
                              raise

                      check_password(active_password, "active")
                      if recovery_candidate:
                          check_password(recovery_candidate, "candidate")

                      print(f"ok: repo={repo} candidate={'present' if recovery_candidate else 'absent'}")
                      checked += 1

                  print(f"pvc restic credential smoke PASSED (repos={checked})")
                  PY
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
          volumes:
            - name: deployment-config
              configMap:
                name: deploykube-deployment-config
                defaultMode: 0444
            - name: restic-bin
              emptyDir: {}
            - name: backup
              persistentVolumeClaim:
                claimName: backup-target
            - name: active-secret
              secret:
                secretName: backup-system-pvc-restic
                defaultMode: 0440
            - name: recovery-secret
              secret:
                secretName: backup-recovery-material
                defaultMode: 0440
