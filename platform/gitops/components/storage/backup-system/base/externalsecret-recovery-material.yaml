apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backup-recovery-material
  labels:
    app.kubernetes.io/name: backup-system
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-core
  target:
    name: backup-recovery-material
    creationPolicy: Owner
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
      data:
        RESTIC_PASSWORDS_JSON: |
          {
            "backupSystemPvcRestic": {
              "vaultPath": "secret/backup/pvc-restic",
              "active": {{ .RESTIC_PASSWORD | toJson }},
              "candidate": {{ .RESTIC_PASSWORD_CANDIDATE | toJson }},
              "passwordVersion": {{ .PASSWORD_VERSION | toJson }},
              "passwordRotatedAt": {{ .PASSWORD_ROTATED_AT | toJson }}
            }
          }
  data:
    - secretKey: RESTIC_PASSWORD
      remoteRef:
        key: backup/pvc-restic
        property: RESTIC_PASSWORD
    - secretKey: RESTIC_PASSWORD_CANDIDATE
      remoteRef:
        key: backup/pvc-restic
        property: RESTIC_PASSWORD_CANDIDATE
    - secretKey: PASSWORD_VERSION
      remoteRef:
        key: backup/pvc-restic
        property: PASSWORD_VERSION
    - secretKey: PASSWORD_ROTATED_AT
      remoteRef:
        key: backup/pvc-restic
        property: PASSWORD_ROTATED_AT
