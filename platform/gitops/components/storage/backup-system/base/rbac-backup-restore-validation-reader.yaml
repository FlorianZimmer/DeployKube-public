apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backup-restore-validation-reader
rules:
  - apiGroups: [""]
    resources: ["namespaces", "persistentvolumeclaims"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backup-restore-validation-reader
subjects:
  - kind: ServiceAccount
    name: backup-restore-validation-reader
    namespace: backup-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backup-restore-validation-reader
