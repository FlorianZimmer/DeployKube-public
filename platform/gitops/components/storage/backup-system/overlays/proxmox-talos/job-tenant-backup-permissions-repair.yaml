apiVersion: batch/v1
kind: Job
metadata:
  name: tenant-backup-permissions-repair
  namespace: backup-system
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-options: Replace=true
    argocd.argoproj.io/sync-wave: "5"
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 180
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
      labels:
        app.kubernetes.io/name: tenant-backup-permissions-repair
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: repair
          image: registry.example.internal/deploykube/bootstrap-tools@sha256:e7be47a69e3a11bc58c857f2d690a71246ada91ac3a60bdfb0a547f091f6485a
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
                - DAC_OVERRIDE
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              command -v yq >/dev/null 2>&1 || { echo "missing dependency: yq" >&2; exit 1; }

              deployment_id="proxmox-talos"
              target_gid="65532"
              tenants_root="/backup/${deployment_id}/tenants"
              registry="/tenant-registry/tenant-registry.yaml"

              repair_tree() {
                local path="$1"
                mkdir -p "${path}"
                chgrp "${target_gid}" "${path}"
                chmod 2775 "${path}"
                find "${path}" -type d -exec chgrp "${target_gid}" {} +
                find "${path}" -type d -exec chmod 2775 {} +
              }

              repair_tree "${tenants_root}"

              while IFS= read -r tenant_dir; do
                [ -n "${tenant_dir}" ] || continue
                repair_tree "${tenant_dir}"
              done < <(find "${tenants_root}" -mindepth 1 -maxdepth 1 -type d | sort)

              if [ -f "${registry}" ]; then
                while IFS= read -r org_id; do
                  [ -n "${org_id}" ] || continue
                  repair_tree "${tenants_root}/${org_id}"
                  repair_tree "${tenants_root}/${org_id}/s3-mirror"
                done < <(yq -r '.tenants[]?.orgId // empty' "${registry}" | sort -u)
              else
                echo "[tenant-backup-permissions-repair] tenant registry not present; repaired existing tenant directories only"
              fi

              echo "[tenant-backup-permissions-repair] final directory state:"
              find "${tenants_root}" -maxdepth 2 -type d | sort | while IFS= read -r path; do
                stat -c '%A %a %u %g %n' "${path}"
              done
          volumeMounts:
            - name: backup
              mountPath: /backup
            - name: tenant-registry
              mountPath: /tenant-registry
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: backup
          persistentVolumeClaim:
            claimName: backup-target
        - name: tenant-registry
          configMap:
            name: deploykube-tenant-registry
            optional: true
            items:
              - key: tenant-registry.yaml
                path: tenant-registry.yaml
        - name: tmp
          emptyDir: {}
