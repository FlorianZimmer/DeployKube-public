apiVersion: v1
kind: ServiceAccount
metadata:
  name: pv-claimref-repair
  namespace: backup-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pv-claimref-repair
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pv-claimref-repair
subjects:
  - kind: ServiceAccount
    name: pv-claimref-repair
    namespace: backup-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pv-claimref-repair
