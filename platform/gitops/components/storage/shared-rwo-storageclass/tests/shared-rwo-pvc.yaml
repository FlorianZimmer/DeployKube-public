apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-rwo-smoke
  namespace: default
  labels:
    app.kubernetes.io/name: shared-rwo-smoke
    darksite.cloud/backup: skip
    darksite.cloud/backup-skip-reason: test
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: shared-rwo
  resources:
    requests:
      storage: 1Gi
