apiVersion: batch/v1
kind: Job
metadata:
  name: shared-rwo-writer
  namespace: default
  labels:
    app.kubernetes.io/name: shared-rwo-smoke
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 120
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shared-rwo-smoke
    spec:
      restartPolicy: Never
      containers:
        - name: writer
          image: registry.example.internal/deploykube/bootstrap-tools:1.4
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -euo pipefail
              ts="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
              {
                echo "${ts}"
                echo "writer-pod=${HOSTNAME}"
              } > /data/probe.txt
              ls -al /data
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: shared-rwo-smoke
