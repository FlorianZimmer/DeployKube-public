apiVersion: v1
kind: ServiceAccount
metadata:
  name: garage-bootstrap
  namespace: garage
---
apiVersion: batch/v1
kind: Job
metadata:
  name: garage-bootstrap-http
  namespace: garage
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/component: bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 1800
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage
        app.kubernetes.io/component: bootstrap
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: garage-bootstrap
      restartPolicy: Never
      containers:
        - name: garage-bootstrap
          image: registry.example.internal/deploykube/bootstrap-tools:1.4
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: garage-credentials
            - secretRef:
                name: garage-s3
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail

              python3 - <<'PY'
              import datetime
              import hashlib
              import hmac
              import json
              import os
              import time
              import urllib.error
              import urllib.parse
              import urllib.request
              import xml.etree.ElementTree as ET

              admin_endpoint = "http://garage.garage.svc:3903"
              s3_endpoint = os.environ.get("S3_ENDPOINT") or "http://garage.garage.svc:3900"

              admin_token = os.environ.get("GARAGE_ADMIN_TOKEN")
              if not admin_token:
                raise SystemExit("missing GARAGE_ADMIN_TOKEN")

              access_key = os.environ.get("S3_ACCESS_KEY")
              secret_key = os.environ.get("S3_SECRET_KEY")
              if not access_key or not secret_key:
                raise SystemExit("missing S3 credentials (S3_ACCESS_KEY/S3_SECRET_KEY)")
              region = os.environ.get("S3_REGION") or "us-east-1"

              buckets = [
                os.environ.get("BUCKET_LOGS", ""),
                os.environ.get("BUCKET_TRACES", ""),
                os.environ.get("BUCKET_METRICS", ""),
                os.environ.get("BUCKET_BACKUPS") or "garage-backups",
              ]
              if any(not b for b in buckets):
                raise SystemExit("missing bucket name (BUCKET_LOGS/BUCKET_TRACES/BUCKET_METRICS[/BUCKET_BACKUPS])")

              def _json_request(method, url, payload=None, timeout=10):
                body = b"" if payload is None else json.dumps(payload).encode("utf-8")
                headers = {"Authorization": f"Bearer {admin_token}"}
                if payload is not None:
                  headers["Content-Type"] = "application/json"
                req = urllib.request.Request(url, method=method, data=(body if payload is not None else None), headers=headers)
                try:
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                    return resp.status, resp.read()
                except urllib.error.HTTPError as e:
                  return e.code, e.read()
                except Exception as e:
                  return 0, str(e).encode("utf-8", errors="replace")

              def _admin_get(path):
                url = admin_endpoint.rstrip("/") + path
                status, data = _json_request("GET", url, payload=None, timeout=10)
                if status != 200:
                  raise RuntimeError(f"admin GET {path} failed: status={status} err={data[:300]!r}")
                return json.loads(data.decode("utf-8"))

              def _admin_post(path, payload):
                url = admin_endpoint.rstrip("/") + path
                status, data = _json_request("POST", url, payload=payload, timeout=15)
                if status != 200:
                  raise RuntimeError(f"admin POST {path} failed: status={status} err={data[:300]!r}")
                return json.loads(data.decode("utf-8")) if data else {}

              def _retry(fn, what, attempts, sleep_s):
                last_err = None
                for _ in range(attempts):
                  try:
                    return fn()
                  except Exception as e:
                    last_err = e
                    time.sleep(sleep_s)
                raise RuntimeError(f"{what} failed after {attempts} attempts: {last_err}")

              print(f"Waiting for Garage admin API ({admin_endpoint})...", flush=True)

              # Important: a brand-new Garage cluster reports status=unavailable until a layout is applied.
              # Wait only for the admin API and a live node, then proceed to bootstrap the layout.
              status = _retry(lambda: _admin_get("/v2/GetClusterStatus"), "GetClusterStatus", attempts=120, sleep_s=5)
              nodes = status.get("nodes") or []
              up_nodes = [n for n in nodes if n.get("isUp") is True and n.get("id")]
              if not up_nodes:
                raise SystemExit(f"no live Garage nodes found in GetClusterStatus: {status!r}")
              node_id = up_nodes[0]["id"]
              print(f"Garage node id: {node_id}", flush=True)

              layout = _retry(lambda: _admin_get("/v2/GetClusterLayout"), "GetClusterLayout", attempts=30, sleep_s=2)
              roles = layout.get("roles") or []
              staged = layout.get("stagedRoleChanges") or []

              def _role_matches(role_id: str, full_id: str) -> bool:
                if not role_id or not full_id:
                  return False
                return full_id.startswith(role_id) or role_id.startswith(full_id[:16])

              has_role = any(_role_matches(r.get("id", ""), node_id) for r in roles)
              if not has_role and not staged:
                # Deterministic single-node bootstrap: assign the first live node a storage role.
                # Capacity is informational for placement; use 1TB as a stable v1 default.
                print("No node role present; staging single-node layout role...", flush=True)
                _admin_post(
                  "/v2/UpdateClusterLayout",
                  {
                    "roles": [
                      {
                        "id": node_id,
                        "zone": "default",
                        "capacity": 1000000000000,
                        "tags": [],
                      }
                    ]
                  },
                )

              # Apply staged layout changes if present.
              layout2 = _retry(lambda: _admin_get("/v2/GetClusterLayout"), "GetClusterLayout (post-update)", attempts=30, sleep_s=2)
              staged2 = layout2.get("stagedRoleChanges") or []
              if staged2:
                current_version = int(layout2.get("version", 0))
                next_version = current_version + 1
                print(f"Applying staged layout changes (version {next_version})...", flush=True)
                _admin_post("/v2/ApplyClusterLayout", {"version": next_version})

              def _wait_healthy():
                h = _admin_get("/v2/GetClusterHealth")
                if h.get("status") in ("healthy", "degraded"):
                  return h
                raise RuntimeError(f"health={h!r}")

              print("Waiting for Garage cluster health to become ready...", flush=True)
              health = _retry(_wait_healthy, "GetClusterHealth", attempts=120, sleep_s=5)
              print(f"Garage health: {health}", flush=True)

              # Ensure key exists (deterministic Vault-managed key).
              def _get_key():
                url = admin_endpoint.rstrip("/") + "/v2/GetKeyInfo?" + urllib.parse.urlencode({"id": access_key})
                st, data = _json_request("GET", url, payload=None, timeout=10)
                if st != 200:
                  return None
                try:
                  return json.loads(data.decode("utf-8"))
                except Exception:
                  return None

              key_info = _retry(lambda: _get_key() or {}, "GetKeyInfo", attempts=30, sleep_s=2)
              if not key_info.get("accessKeyId"):
                print("Importing deterministic S3 key...", flush=True)
                _admin_post("/v2/ImportKey", {"accessKeyId": access_key, "secretAccessKey": secret_key, "name": "lgtm-storage"})
                key_info = _retry(lambda: _get_key() or {}, "GetKeyInfo (after import)", attempts=30, sleep_s=2)
              if key_info.get("accessKeyId") != access_key:
                raise SystemExit(f"could not confirm S3 key exists (expected {access_key}, got {key_info!r})")

              # Ensure buckets exist (as global aliases).
              def _list_buckets():
                url = admin_endpoint.rstrip("/") + "/v2/ListBuckets"
                st, data = _json_request("GET", url, payload=None, timeout=10)
                if st != 200:
                  raise RuntimeError(f"ListBuckets failed: status={st} err={data[:300]!r}")
                return json.loads(data.decode("utf-8"))

              def _bucket_id_for_alias(alias):
                items = _list_buckets()
                for it in items:
                  for ga in it.get("globalAliases") or []:
                    if ga == alias:
                      return it.get("id")
                return None

              for b in buckets:
                bucket_id = _bucket_id_for_alias(b)
                if not bucket_id:
                  print(f"Creating bucket (global alias): {b}", flush=True)
                  _admin_post("/v2/CreateBucket", {"globalAlias": b})
                  bucket_id = _retry(lambda: _bucket_id_for_alias(b), f"bucket appears ({b})", attempts=30, sleep_s=2)
                if not bucket_id:
                  raise SystemExit(f"bucket {b} still not visible after creation")

                # Grant read/write/owner to the S3 key for this bucket.
                _admin_post(
                  "/v2/AllowBucketKey",
                  {"bucketId": bucket_id, "accessKeyId": access_key, "permissions": {"read": True, "write": True, "owner": True}},
                )

              # Final validation: S3 should accept signed requests and all buckets should be visible.
              def _sign(key, msg):
                return hmac.new(key, msg.encode("utf-8"), hashlib.sha256).digest()

              def _get_signature_key(key, date_stamp, region_name, service_name):
                k_date = _sign(("AWS4" + key).encode("utf-8"), date_stamp)
                k_region = _sign(k_date, region_name)
                k_service = _sign(k_region, service_name)
                k_signing = _sign(k_service, "aws4_request")
                return k_signing

              def _s3_request(method, path, body=b""):
                url = s3_endpoint.rstrip("/") + path
                parsed = urllib.parse.urlparse(url)
                host = parsed.netloc
                amz_date = datetime.datetime.now(datetime.timezone.utc).strftime("%Y%m%dT%H%M%SZ")
                date_stamp = amz_date[:8]
                payload_hash = hashlib.sha256(body).hexdigest()

                canonical_uri = parsed.path or "/"
                canonical_querystring = parsed.query or ""
                canonical_headers = (
                  f"host:{host}\n"
                  f"x-amz-content-sha256:{payload_hash}\n"
                  f"x-amz-date:{amz_date}\n"
                )
                signed_headers = "host;x-amz-content-sha256;x-amz-date"
                canonical_request = (
                  f"{method}\n{canonical_uri}\n{canonical_querystring}\n"
                  f"{canonical_headers}\n{signed_headers}\n{payload_hash}"
                )

                algorithm = "AWS4-HMAC-SHA256"
                credential_scope = f"{date_stamp}/{region}/s3/aws4_request"
                string_to_sign = (
                  f"{algorithm}\n{amz_date}\n{credential_scope}\n"
                  f"{hashlib.sha256(canonical_request.encode('utf-8')).hexdigest()}"
                )
                signing_key = _get_signature_key(secret_key, date_stamp, region, "s3")
                signature = hmac.new(signing_key, string_to_sign.encode("utf-8"), hashlib.sha256).hexdigest()
                authorization = (
                  f"{algorithm} Credential={access_key}/{credential_scope}, "
                  f"SignedHeaders={signed_headers}, Signature={signature}"
                )

                headers = {
                  "Host": host,
                  "x-amz-date": amz_date,
                  "x-amz-content-sha256": payload_hash,
                  "Authorization": authorization,
                }
                req = urllib.request.Request(url, method=method, data=(body or None), headers=headers)
                try:
                  with urllib.request.urlopen(req, timeout=10) as resp:
                    return resp.status, resp.read()
                except urllib.error.HTTPError as e:
                  return e.code, e.read()
                except Exception as e:
                  return 0, str(e).encode("utf-8", errors="replace")

              print("Validating S3 list-buckets...", flush=True)
              st, data = _s3_request("GET", "/")
              if st != 200:
                raise SystemExit(f"S3 list-buckets failed: status={st} err={data[:300]!r}")
              try:
                root = ET.fromstring(data)
                names = {elem.text for elem in root.iter() if elem.tag.endswith("Name") and elem.text}
              except Exception as e:
                raise SystemExit(f"failed to parse list-buckets XML: {e}")

              missing = [b for b in buckets if b not in names]
              if missing:
                raise SystemExit(f"S3 list-buckets missing expected buckets: {missing} (got={sorted(names)})")

              print("Garage bootstrap complete. Buckets:", flush=True)
              for b in sorted(buckets):
                print(f"- {b}", flush=True)
              PY
