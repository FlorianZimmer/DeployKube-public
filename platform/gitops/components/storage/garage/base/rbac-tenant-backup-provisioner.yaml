apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: garage-tenant-backup-provisioner
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: garage-tenant-backup-provisioner
subjects:
  - kind: ServiceAccount
    name: garage-tenant-backup-provisioner
    namespace: garage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: garage-tenant-backup-provisioner

