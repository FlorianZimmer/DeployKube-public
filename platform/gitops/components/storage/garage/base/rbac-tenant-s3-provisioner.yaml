apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: garage-tenant-s3-provisioner
  namespace: garage
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: garage-tenant-s3-provisioner
  namespace: garage
subjects:
  - kind: ServiceAccount
    name: garage-tenant-s3-provisioner
    namespace: garage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: garage-tenant-s3-provisioner

