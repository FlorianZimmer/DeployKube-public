apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-path-provisioner
  namespace: storage-system
  labels:
    app.kubernetes.io/name: local-path-provisioner
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: local-path-provisioner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: local-path-provisioner
    spec:
      serviceAccountName: local-path-provisioner
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Equal
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Equal
      containers:
        - name: local-path-provisioner
          image: rancher/local-path-provisioner:v0.0.30
          imagePullPolicy: IfNotPresent
          command:
            - local-path-provisioner
            - --debug
            - start
            - --provisioner-name
            - darksite.cloud/local-path
            - --namespace
            - storage-system
            - --config
            - /etc/config/config.json
            - --helper-image
            - docker.io/kindest/local-path-helper:v20241212-8ac705d0
            - --configmap-name
            - local-path-config
            - --service-account-name
            - local-path-provisioner
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config/
      volumes:
        - name: config-volume
          configMap:
            name: local-path-config
