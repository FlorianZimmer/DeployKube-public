apiVersion: batch/v1
kind: CronJob
metadata:
  name: minecraft-tcp-smoke
  namespace: minecraft-monifactory
  labels:
    app.kubernetes.io/name: minecraft-monifactory
    app.kubernetes.io/component: smoke-test
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 180
      ttlSecondsAfterFinished: 900
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          enableServiceLinks: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: tcp-smoke
              image: busybox:1.36
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  (set -o pipefail 2>/dev/null) || true

                  host="${MINECRAFT_HOST:-minecraft.minecraft-monifactory.svc.cluster.local}"
                  port="${MINECRAFT_TCP_PORT:-25565}"
                  attempts="${MINECRAFT_SMOKE_ATTEMPTS:-12}"
                  sleep_s="${MINECRAFT_SMOKE_SLEEP_SECONDS:-5}"

                  i=1
                  while [ "${i}" -le "${attempts}" ]; do
                    if nc -z -w 3 "${host}" "${port}" >/dev/null 2>&1; then
                      echo "[minecraft-tcp-smoke] OK: ${host}:${port} reachable"
                      exit 0
                    fi
                    echo "[minecraft-tcp-smoke] attempt ${i}/${attempts} failed; retrying in ${sleep_s}s"
                    i="$((i+1))"
                    sleep "${sleep_s}"
                  done

                  echo "[minecraft-tcp-smoke] FAIL: ${host}:${port} not reachable after ${attempts} attempts" >&2
                  exit 1
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  memory: 64Mi
