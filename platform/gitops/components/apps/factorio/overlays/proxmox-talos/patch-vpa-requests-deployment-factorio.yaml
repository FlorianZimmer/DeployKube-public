apiVersion: apps/v1
kind: Deployment
metadata:
  name: factorio
  namespace: factorio
spec:
  template:
    spec:
      containers:
        - name: backup
          resources:
            requests:
              cpu: "15m"
              memory: "160Mi"
            limits:
              memory: "240Mi"
        - name: factorio
          resources:
            requests:
              cpu: "15m"
              memory: "400Mi"
            limits:
              memory: "600Mi"
