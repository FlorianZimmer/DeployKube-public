apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: factorio-data
  namespace: factorio
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    darksite.cloud/backup: skip
    darksite.cloud/backup-skip-reason: opt-in-example-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: shared-rwo
