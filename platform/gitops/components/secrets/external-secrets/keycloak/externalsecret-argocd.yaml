apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-keycloak-oidc
  namespace: argocd
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-core
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: oidc.clientSecret
      remoteRef:
        key: keycloak/argocd-client
        property: clientSecret
