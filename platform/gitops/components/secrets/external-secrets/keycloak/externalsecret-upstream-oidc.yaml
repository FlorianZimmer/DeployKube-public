apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-upstream-oidc
  namespace: keycloak
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-core
  target:
    name: keycloak-upstream-oidc
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: keycloak/upstream-oidc
