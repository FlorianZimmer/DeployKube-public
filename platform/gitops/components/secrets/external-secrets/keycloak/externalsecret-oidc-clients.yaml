apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-argocd-client
  namespace: keycloak
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-core
  target:
    name: keycloak-argocd-client
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: keycloak/argocd-client
