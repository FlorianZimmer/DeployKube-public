apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-grafana-client
  namespace: keycloak
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-core
  target:
    name: keycloak-grafana-client
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: clientSecret
      remoteRef:
        key: observability/grafana/oidc
        property: clientSecret
