apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: eso-tenant-smoke
  namespace: external-secrets
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-tenant-smoke-project-demo
    kind: ClusterSecretStore
  target:
    name: eso-tenant-smoke
    creationPolicy: Owner
  data:
    - secretKey: message
      remoteRef:
        key: tenants/smoke/projects/demo/bootstrap
        property: message

