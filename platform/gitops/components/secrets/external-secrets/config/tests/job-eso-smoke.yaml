apiVersion: batch/v1
kind: Job
metadata:
  name: eso-smoke
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
  labels:
    deploykube.gitops/job: eso-smoke
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        deploykube.gitops/job: eso-smoke
      annotations:
        sidecar.istio.io/inject: "false"
        sidecar.istio.io/nativeSidecar: 'true'
    spec:
      serviceAccountName: eso-smoke
      restartPolicy: Never
      containers:
        - name: smoke
          image: registry.example.internal/deploykube/bootstrap-tools:1.4
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              command -v jq >/dev/null 2>&1 || { echo "[eso-smoke] missing dependency: jq" >&2; exit 1; }

              echo "[eso-smoke] waiting for ClusterSecretStore/vault-core Ready..."
              ready=""
              for _ in $(seq 1 60); do
                ready="$(kubectl get clustersecretstore vault-core -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)"
                if [ "${ready}" = "True" ]; then
                  break
                fi
                sleep 5
              done
              if [ "${ready}" != "True" ]; then
                echo "[eso-smoke] ClusterSecretStore/vault-core not Ready" >&2
                kubectl get clustersecretstore vault-core -o yaml || true
                exit 1
              fi

              echo "[eso-smoke] waiting for Secret/external-secrets/eso-smoke..."
              for _ in $(seq 1 60); do
                if kubectl -n external-secrets get secret eso-smoke >/dev/null 2>&1; then
                  break
                fi
                sleep 5
              done
              if ! kubectl -n external-secrets get secret eso-smoke >/dev/null 2>&1; then
                echo "[eso-smoke] Secret/external-secrets/eso-smoke not found" >&2
                kubectl -n external-secrets get externalsecret eso-smoke -o yaml || true
                kubectl -n external-secrets get events --sort-by=.lastTimestamp | tail -n 50 || true
                exit 1
              fi

              msg="$(kubectl -n external-secrets get secret eso-smoke -o jsonpath='{.data.message}' | base64 -d || true)"
              if [ -z "${msg}" ]; then
                echo "[eso-smoke] Secret/external-secrets/eso-smoke missing data.message" >&2
                kubectl -n external-secrets get secret eso-smoke -o yaml || true
                exit 1
              fi

              expected="Vault is wired to External Secrets Operator"
              if [ "${msg}" != "${expected}" ]; then
                echo "[eso-smoke] unexpected message: '${msg}' (want '${expected}')" >&2
                exit 1
              fi

              echo "[eso-smoke] waiting for ClusterSecretStore/vault-tenant-smoke-project-demo Ready..."
              ready=""
              for _ in $(seq 1 60); do
                ready="$(kubectl get clustersecretstore vault-tenant-smoke-project-demo -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)"
                if [ "${ready}" = "True" ]; then
                  break
                fi
                sleep 5
              done
              if [ "${ready}" != "True" ]; then
                echo "[eso-smoke] ClusterSecretStore/vault-tenant-smoke-project-demo not Ready" >&2
                kubectl get clustersecretstore vault-tenant-smoke-project-demo -o yaml || true
                exit 1
              fi

              echo "[eso-smoke] waiting for Secret/external-secrets/eso-tenant-smoke..."
              for _ in $(seq 1 60); do
                if kubectl -n external-secrets get secret eso-tenant-smoke >/dev/null 2>&1; then
                  break
                fi
                sleep 5
              done
              if ! kubectl -n external-secrets get secret eso-tenant-smoke >/dev/null 2>&1; then
                echo "[eso-smoke] Secret/external-secrets/eso-tenant-smoke not found" >&2
                kubectl -n external-secrets get externalsecret eso-tenant-smoke -o yaml || true
                kubectl -n external-secrets get events --sort-by=.lastTimestamp | tail -n 50 || true
                exit 1
              fi

              msg="$(kubectl -n external-secrets get secret eso-tenant-smoke -o jsonpath='{.data.message}' | base64 -d || true)"
              if [ -z "${msg}" ]; then
                echo "[eso-smoke] Secret/external-secrets/eso-tenant-smoke missing data.message" >&2
                kubectl -n external-secrets get secret eso-tenant-smoke -o yaml || true
                exit 1
              fi

              expected="Tenant smoke secret is scoped to project"
              if [ "${msg}" != "${expected}" ]; then
                echo "[eso-smoke] unexpected tenant message: '${msg}' (want '${expected}')" >&2
                exit 1
              fi

              neg_es="eso-tenant-smoke-negative"
              neg_secret="eso-tenant-smoke-negative"

              # Negative scope smoke: a tenant-scoped store must not be able to read platform keys outside its tenant/project boundary.
              # This uses a key that should exist (`bootstrap`) so we can distinguish "permission denied" from "not found".
              kubectl -n external-secrets delete externalsecret "${neg_es}" --ignore-not-found --wait=false >/dev/null 2>&1 || true
              kubectl -n external-secrets delete secret "${neg_secret}" --ignore-not-found --wait=false >/dev/null 2>&1 || true

              cat <<EOF | sed 's/^              //' | kubectl apply -f - >/dev/null
              apiVersion: external-secrets.io/v1
              kind: ExternalSecret
              metadata:
                name: ${neg_es}
                namespace: external-secrets
              spec:
                refreshInterval: 30s
                secretStoreRef:
                  kind: ClusterSecretStore
                  name: vault-tenant-smoke-project-demo
                target:
                  name: ${neg_secret}
                  creationPolicy: Owner
                  deletionPolicy: Delete
                data:
                  - secretKey: message
                    remoteRef:
                      key: bootstrap
                      property: message
              EOF

              echo "[eso-smoke] waiting for ExternalSecret/${neg_es} to fail with permission denied..."
              neg_status=""
              neg_reason=""
              neg_msg=""
              neg_event_msg=""
              for _ in $(seq 1 30); do
                neg_status="$(kubectl -n external-secrets get externalsecret "${neg_es}" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)"
                neg_reason="$(kubectl -n external-secrets get externalsecret "${neg_es}" -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}' 2>/dev/null || true)"
                neg_msg="$(kubectl -n external-secrets get externalsecret "${neg_es}" -o jsonpath='{.status.conditions[?(@.type=="Ready")].message}' 2>/dev/null || true)"
                neg_event_msg="$(
                  kubectl -n external-secrets get events \
                    --field-selector involvedObject.kind=ExternalSecret,involvedObject.name="${neg_es}" \
                    -o json 2>/dev/null \
                    | jq -r '.items | sort_by(.lastTimestamp) | last.message // empty' 2>/dev/null \
                    || true
                )"

                if echo "${neg_event_msg}" | grep -Eiq '(permission denied|Code: 403)'; then
                  break
                fi

                if kubectl -n external-secrets get secret "${neg_secret}" >/dev/null 2>&1; then
                  echo "[eso-smoke] FAIL: scoped store read succeeded unexpectedly (Secret/external-secrets/${neg_secret} exists)" >&2
                  kubectl -n external-secrets get secret "${neg_secret}" -o yaml || true
                  kubectl -n external-secrets get externalsecret "${neg_es}" -o yaml || true
                  exit 1
                fi

                sleep 2
              done

              if ! echo "${neg_event_msg}" | grep -Eiq '(permission denied|Code: 403)'; then
                echo "[eso-smoke] FAIL: expected permission denied for ExternalSecret/${neg_es} (status='${neg_status}' reason='${neg_reason}' message='${neg_msg}')" >&2
                kubectl -n external-secrets get externalsecret "${neg_es}" -o yaml || true
                kubectl -n external-secrets get events \
                  --field-selector involvedObject.kind=ExternalSecret,involvedObject.name="${neg_es}" \
                  -o json 2>/dev/null \
                  | jq -r '.items | sort_by(.lastTimestamp) | .[] | {reason,message}' 2>/dev/null \
                  || true
                exit 1
              fi

              kubectl -n external-secrets delete externalsecret "${neg_es}" --ignore-not-found --wait=false >/dev/null 2>&1 || true
              kubectl -n external-secrets delete secret "${neg_secret}" --ignore-not-found --wait=false >/dev/null 2>&1 || true

              echo "[eso-smoke] OK"
