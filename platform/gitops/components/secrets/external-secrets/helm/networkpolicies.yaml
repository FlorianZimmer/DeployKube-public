apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-secrets-allow-egress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    # Kubernetes API server (required for controller-runtime leader election + watches).
    #
    # Note: We keep the Cilium `toEntities: kube-apiserver` policy below as a fast-path,
    # but some dev environments can have entity detection issues. Allow via K8s NP too.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              component: kube-apiserver
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP

    # Istio control-plane (xDS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 15012
          protocol: TCP
        - port: 15017
          protocol: TCP

    # Vault/OpenBao API (ESO reads KV and authenticates via Kubernetes JWT)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault-system
      ports:
        - port: 8200
          protocol: TCP

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-allow-kube-apiserver
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: external-secrets-webhook-allow-kube-apiserver
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets-webhook
  ingress:
    - fromEntities:
        - kube-apiserver
        - cluster
        # Talos runs the apiserver as a hostNetwork static pod; the source IP is a node IP.
        - remote-node
        - host
      toPorts:
        - ports:
            # Allow both Service port and container port (implementation varies across datapaths).
            - port: "443"
              protocol: TCP
            - port: "10250"
              protocol: TCP
