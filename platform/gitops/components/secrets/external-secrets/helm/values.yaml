# External Secrets Operator values for the Mac + OrbStack developer cluster.
# Keeps replicas to 2 for dev while matching defaults that scale in prod.

installCRDs: true

namespaceOverride: external-secrets

replicaCount: 2

serviceAccount:
  create: true
  name: external-secrets

podAnnotations:
  sidecar.istio.io/inject: "true"

podLabels:
  sidecar.istio.io/inject: "true"

leaderElect: true

rbac:
  create: true

podDisruptionBudget:
  enabled: true
  minAvailable: 1

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: external-secrets
              app.kubernetes.io/instance: external-secrets
          topologyKey: kubernetes.io/hostname

metrics:
  service:
    enabled: true

webhook:
  replicaCount: 2
  podAnnotations:
    sidecar.istio.io/inject: "true"
  podLabels:
    sidecar.istio.io/inject: "true"
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

certController:
  replicaCount: 2
  podAnnotations:
    sidecar.istio.io/inject: "true"
  podLabels:
    sidecar.istio.io/inject: "true"
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
