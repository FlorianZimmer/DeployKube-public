apiVersion: batch/v1
kind: Job
metadata:
  name: secrets-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
  labels:
    deploykube.gitops/job: secrets-bootstrap
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        deploykube.gitops/job: secrets-bootstrap
      annotations:
        sidecar.istio.io/inject: "false"
        sidecar.istio.io/nativeSidecar: 'true'
    spec:
      serviceAccountName: secrets-bootstrap
      restartPolicy: Never
      containers:
      - name: bootstrap
        image: registry.example.internal/deploykube/bootstrap-tools:1.4
        command:
        - /bin/sh
        - -c
        - |
          set -euo pipefail
          exec /bin/sh /scripts/bootstrap.sh
        env:
        - name: SOPS_AGE_KEY_FILE
          value: /var/run/sops/age.key
        volumeMounts:
        - name: sops-files
          mountPath: /config
        - name: deployment-config
          mountPath: /deployment-config
        - name: script
          mountPath: /scripts/bootstrap.sh
          subPath: bootstrap.sh
        - name: age-key
          mountPath: /var/run/sops
          readOnly: true
      volumes:
      - name: sops-files
        configMap:
          name: deploykube-deployment-secrets
      - name: deployment-config
        configMap:
          name: deploykube-deployment-config
      - name: script
        configMap:
          name: secrets-bootstrap-script
          defaultMode: 0755
      - name: age-key
        secret:
          secretName: argocd-sops-age
