apiVersion: apps/v1
kind: Deployment
metadata:
  name: kms-shim
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: kms-shim
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
      labels:
        app.kubernetes.io/name: kms-shim
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: kms-shim
                topologyKey: kubernetes.io/hostname
      containers:
        - name: kms-shim
          image: registry.example.internal/deploykube/bootstrap-tools:1.4
          imagePullPolicy: IfNotPresent
          command:
            - /usr/bin/python3
            - /app/kms_shim.py
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PORT
              value: "8200"
            - name: KMS_SHIM_AGE_KEY_FILE
              value: /etc/kms/age.key
            - name: KMS_SHIM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kms-shim-token
                  key: token
          ports:
            - name: http
              containerPort: 8200
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /v1/sys/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
            - name: key
              mountPath: /etc/kms
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: script
          configMap:
            name: kms-shim-script
            items:
              - key: kms_shim.py
                path: kms_shim.py
        - name: key
          secret:
            secretName: kms-shim-key
            defaultMode: 0440
        - name: tmp
          emptyDir: {}
