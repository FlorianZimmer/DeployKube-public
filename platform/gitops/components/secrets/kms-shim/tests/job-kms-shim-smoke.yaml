apiVersion: batch/v1
kind: Job
metadata:
  name: kms-shim-smoke
  namespace: vault-seal-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 120
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: Never
      containers:
        - name: smoke
          image: registry.example.internal/deploykube/bootstrap-tools:1.4
          imagePullPolicy: IfNotPresent
          env:
            - name: KMS_SHIM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kms-shim-token
                  key: token
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail

              echo "[kms-shim-smoke] health"
              curl -sf http://kms-shim:8200/v1/sys/health | jq -e '.sealed == false' >/dev/null

              pt="hello-kms-shim"
              pt_b64="$(printf '%s' "${pt}" | base64 | tr -d '\n')"

              echo "[kms-shim-smoke] encrypt"
              cipher="$(
                curl -sf \
                  -X PUT \
                  -H "X-Vault-Token: ${KMS_SHIM_TOKEN}" \
                  -H 'Content-Type: application/json' \
                  -d "{\"plaintext\":\"${pt_b64}\"}" \
                  http://kms-shim:8200/v1/transit/encrypt/autounseal \
                  | jq -r '.data.ciphertext'
              )"
              test -n "${cipher}"

              echo "[kms-shim-smoke] decrypt"
              got="$(
                curl -sf \
                  -X PUT \
                  -H "X-Vault-Token: ${KMS_SHIM_TOKEN}" \
                  -H 'Content-Type: application/json' \
                  -d "{\"ciphertext\":\"${cipher}\"}" \
                  http://kms-shim:8200/v1/transit/decrypt/autounseal \
                  | jq -r '.data.plaintext' \
                  | base64 -d
              )"

              if [[ "${got}" != "${pt}" ]]; then
                echo "[kms-shim-smoke] FAIL: decrypted plaintext mismatch: got='${got}' want='${pt}'" >&2
                exit 1
              fi

              echo "[kms-shim-smoke] ok"
