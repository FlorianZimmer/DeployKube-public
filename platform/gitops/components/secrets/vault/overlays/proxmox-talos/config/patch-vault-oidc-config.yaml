apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-oidc-config
  namespace: vault-system
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: oidc-config
              env:
                - name: KEYCLOAK_OIDC_HOST
                  value: keycloak.prod.internal.example.com
                - name: KEYCLOAK_OIDC_SCHEME
                  value: https
                - name: VAULT_OIDC_HOST
                  value: vault.prod.internal.example.com

