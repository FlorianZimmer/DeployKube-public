apiVersion: batch/v1
kind: Job
metadata:
  name: openbao-smoke
  namespace: vault-system
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: smoke
          env:
            - name: MIN_VOTERS
              value: "3"
