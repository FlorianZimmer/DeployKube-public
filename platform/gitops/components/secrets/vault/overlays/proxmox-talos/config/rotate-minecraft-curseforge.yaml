apiVersion: batch/v1
kind: Job
metadata:
  name: minecraft-monifactory-curseforge-rotate
  namespace: vault-system
  labels:
    deploykube.gitops/job: minecraft-monifactory-curseforge-rotate
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: Replace=true,Force=true
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        deploykube.gitops/job: minecraft-monifactory-curseforge-rotate
      annotations:
        sidecar.istio.io/inject: "false"
        sidecar.istio.io/nativeSidecar: 'true'
    spec:
      serviceAccountName: vault-bootstrap
      restartPolicy: OnFailure
      containers:
      - name: rotate
        image: registry.example.internal/deploykube/bootstrap-tools:1.4
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - /scripts/rotate-minecraft-curseforge.sh
        volumeMounts:
        - name: script
          mountPath: /scripts
          readOnly: true
        - name: istio-native-exit
          mountPath: /helpers
          readOnly: true
      volumes:
      - name: script
        configMap:
          name: minecraft-monifactory-rotate-script
          defaultMode: 0755
      - name: istio-native-exit
        configMap:
          name: istio-native-exit-script
          defaultMode: 0444
