apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-bootstrap
  namespace: vault-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-bootstrap
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  verbs: ["create"]
- apiGroups: ["platform.darksite.cloud"]
  resources: ["deploymentconfigs"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-bootstrap
subjects:
- kind: ServiceAccount
  name: vault-bootstrap
  namespace: vault-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault-system
  annotations:
    # Keep this as a hook, but run in Sync phase so SA/RBAC/ConfigMap in this
    # app can be applied first on fresh clusters.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
    argocd.argoproj.io/sync-options: Replace=true,Force=true
spec:
  manualSelector: true
  selector:
    matchLabels:
      deploykube.gitops/job: vault-init
  backoffLimit: 3
  template:
    metadata:
      labels:
        deploykube.gitops/job: vault-init
      annotations:
        sidecar.istio.io/inject: "false"
        sidecar.istio.io/nativeSidecar: 'true'
    spec:
      serviceAccountName: vault-bootstrap
      restartPolicy: OnFailure
      containers:
      - name: init
        image: registry.example.internal/deploykube/bootstrap-tools:1.4
        command:
        - /bin/sh
        - -c
        - |
          set -euo pipefail
          exec /bin/sh /scripts/vault-init.sh
        volumeMounts:
        - name: script
          mountPath: /scripts
          readOnly: true
      volumes:
      - name: script
        configMap:
          name: vault-bootstrap-script
          defaultMode: 0755
