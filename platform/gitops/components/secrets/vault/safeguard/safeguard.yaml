apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-safeguard
  namespace: vault-system
  labels:
    deploykube.gitops/component: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-safeguard
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-safeguard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-safeguard
subjects:
- kind: ServiceAccount
  name: vault-safeguard
  namespace: vault-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-safeguard
  namespace: vault-system
  labels:
    deploykube.gitops/job: vault-safeguard
  annotations:
    argocd.argoproj.io/sync-options: Replace=true,Force=true
spec:
  manualSelector: true
  selector:
    matchLabels:
      deploykube.gitops/job: vault-safeguard
  backoffLimit: 3
  template:
    metadata:
      labels:
        deploykube.gitops/job: vault-safeguard
      annotations:
        sidecar.istio.io/inject: "false"
        sidecar.istio.io/nativeSidecar: 'true'
    spec:
      restartPolicy: Never
      serviceAccountName: vault-safeguard
      containers:
      - name: check
        image: registry.example.internal/deploykube/bootstrap-tools:1.4
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          SECRET_NAME=${SECRET_NAME:-vault-init}
          NAMESPACE=${NAMESPACE:-vault-system}
          fail() {
            echo "[vault-safeguard] $1" >&2
            exit 1
          }
          wait_for_secret() {
            local attempts=0
            local max_attempts=60
            local delay=10
            until kubectl -n "$NAMESPACE" get secret "$SECRET_NAME" >/dev/null 2>&1; do
              attempts=$((attempts + 1))
              if [ "$attempts" -ge "$max_attempts" ]; then
                fail "secret ${NAMESPACE}/${SECRET_NAME} is missing after $((attempts * delay))s; sync secrets/bootstrap/vault-init.secret.sops.yaml"
              fi
              echo "[vault-safeguard] waiting for secret ${NAMESPACE}/${SECRET_NAME} (attempt $attempts/$max_attempts)"
              sleep "$delay"
            done
          }
          decode_field() {
            kubectl -n "$NAMESPACE" get secret "$SECRET_NAME" -o jsonpath="{.data.$1}" | base64 -d 2>/dev/null || true
          }
          validate_field() {
            value="$1"
            field="$2"
            if [ -z "$value" ]; then
              fail "${field} in ${SECRET_NAME} is empty"
            fi
            case "$value" in
              REPLACE_*|PLACEHOLDER*|CHANGEME*|changeme*|__*)
                fail "${field} in ${SECRET_NAME} still uses placeholder (${value}); update the SOPS secret with real credentials"
                ;;
            esac
          }
          wait_for_secret
          root_token=$(decode_field root-token)
          recovery_key=$(decode_field recovery-key)
          validate_field "$root_token" "root-token"
          validate_field "$recovery_key" "recovery-key"
          ensure_token_secret() {
            local ns="$1"
            local name="$2"
            if ! kubectl -n "$ns" get secret "$name" >/dev/null 2>&1; then
              fail "secret ${ns}/${name} is missing; sync secrets bootstrap"
            fi
            token_value=$(kubectl -n "$ns" get secret "$name" -o jsonpath='{.data.token}' | base64 -d 2>/dev/null || true)
            validate_field "$token_value" "${name} (namespace $ns)"
          }

          ensure_token_secret vault-system kms-shim-token
          external_addr=$(kubectl -n vault-system get secret kms-shim-token -o jsonpath='{.data.address}' 2>/dev/null | base64 -d 2>/dev/null || true)
          if [ -n "${external_addr}" ]; then
            echo "[vault-safeguard] kms-shim external mode detected (address is set)"
          else
            ensure_token_secret vault-seal-system kms-shim-token
            if ! kubectl -n vault-seal-system get secret kms-shim-key >/dev/null 2>&1; then
              fail "secret vault-seal-system/kms-shim-key is missing; sync secrets bootstrap"
            fi
            seal_key=$(kubectl -n vault-seal-system get secret kms-shim-key -o jsonpath='{.data.age\.key}' | base64 -d 2>/dev/null || true)
            validate_field "$seal_key" "kms-shim-key (namespace vault-seal-system)"
          fi
          echo "vault safeguard checks passed"
