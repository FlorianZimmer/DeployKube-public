# OpenBao values (Vault chart) for the Mac + OrbStack developer cluster.
# Runs OpenBao with integrated Raft storage (single replica) to align with the prod layout.

global:
  enabled: true

server:
  image:
    repository: registry.example.internal/openbao/openbao
    tag: 2.1.0
    pullPolicy: IfNotPresent

  # Disable standalone mode in favour of HA-style Raft even for a single node.
  standalone:
    enabled: false

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          address = "0.0.0.0:8200"
          cluster_address = "0.0.0.0:8201"
          tls_disable = 1
        }

        storage "raft" {
          path = "/vault/data"

          retry_join {
            leader_api_addr = "http://vault-0.vault-internal:8200"
          }
        }

        service_registration "kubernetes" {}

        seal "transit" {
          address = "__VAULT_SEAL_ADDR__"
          token = "__VAULT_SEAL_TOKEN__"
          disable_renewal = false
          key_name = "autounseal"
          mount_path = "transit/"
        }

  dataStorage:
    enabled: true
    storageClass: shared-rwo
    size: 10Gi

  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Delete

  service:
    type: ClusterIP

  networkPolicy:
    enabled: true
    ingress:
      - from:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: vault-system
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: external-secrets
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: step-system
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: keycloak
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: forgejo
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: rbac-system
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: argocd
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: cert-manager
            podSelector:
              matchLabels:
                app.kubernetes.io/instance: cert-manager
                app.kubernetes.io/name: cert-manager
                app.kubernetes.io/component: controller
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: cert-manager
            podSelector:
              matchLabels:
                app.kubernetes.io/name: cert-smoke
                app.kubernetes.io/component: vault-external-issuance
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: istio-system
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: garage
            podSelector:
              matchLabels:
                app.kubernetes.io/name: garage
                app.kubernetes.io/component: tenant-backup-provisioner
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: garage
            podSelector:
              matchLabels:
                app.kubernetes.io/name: garage
                app.kubernetes.io/component: tenant-s3-provisioner
        ports:
          - port: 8200
            protocol: TCP
          - port: 8201
            protocol: TCP

  extraInitContainers:
    - name: autounseal-check
      image: docker.io/library/busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "[debug] waiting for autounseal token..."
          for i in $(seq 1 30); do
            if [ -s /vault/userconfig/autounseal-kms-shim/token ]; then
              echo "[debug] provider: kms-shim"
              echo "[debug] token length: $(wc -c < /vault/userconfig/autounseal-kms-shim/token)"
              head -c 12 /vault/userconfig/autounseal-kms-shim/token | tr -d '\n' | sed 's/.*/[debug] token head: &.../'
              exit 0
            fi
            sleep 2
          done
          echo "[debug] autounseal token missing" >&2
          exit 1
      volumeMounts:
        - name: kms-shim-token
          mountPath: /vault/userconfig/autounseal-kms-shim
          readOnly: true

  volumes:
    - name: kms-shim-token
      secret:
        secretName: kms-shim-token
        optional: false

  volumeMounts:
    - name: kms-shim-token
      mountPath: /vault/userconfig/autounseal-kms-shim
      readOnly: true

  ingress:
    enabled: false

  auditStorage:
    enabled: false

  statefulSet:
    annotations:
      argocd.argoproj.io/compare-options: IgnoreExtraneous
    securityContext:
      pod:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      container:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL

injector:
  enabled: false

csi:
  enabled: false

ui:
  enabled: true
