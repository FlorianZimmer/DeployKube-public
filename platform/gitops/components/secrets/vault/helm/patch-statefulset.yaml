apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
spec:
  # Keep these fields aligned with the existing StatefulSet; they are immutable after creation.
  serviceName: vault-internal
  podManagementPolicy: Parallel
  updateStrategy:
    type: OnDelete
  revisionHistoryLimit: 10
  volumeClaimTemplates:
    # This list is immutable after creation; keep it byte-for-byte compatible with the existing StatefulSet.
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
        labels:
          app.kubernetes.io/instance: vault
          app.kubernetes.io/managed-by: Helm
          app.kubernetes.io/name: vault
          darksite.cloud/backup: native
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
        storageClassName: shared-rwo
        volumeMode: Filesystem
      status:
        phase: Pending
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "true"
        sidecar.istio.io/nativeSidecar: "true"
      labels:
        app.kubernetes.io/name: vault
        app.kubernetes.io/instance: vault
        component: server
    spec:
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      serviceAccount: vault
      containers:
        - name: vault
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
            - name: POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
            - name: VAULT_K8S_POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
            - name: VAULT_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
            - name: VAULT_RAFT_NODE_ID
              valueFrom:
                fieldRef:
                  apiVersion: v1
          args:
            - |
              cp /vault/config/extraconfig-from-values.hcl /home/vault/storageconfig.hcl;
              [ -n "${HOST_IP}" ] && sed -Ei "s|HOST_IP|${HOST_IP?}|g" /home/vault/storageconfig.hcl;
              [ -n "${POD_IP}" ] && sed -Ei "s|POD_IP|${POD_IP?}|g" /home/vault/storageconfig.hcl;
              [ -n "${HOSTNAME}" ] && sed -Ei "s|HOSTNAME|${HOSTNAME?}|g" /home/vault/storageconfig.hcl;
              [ -n "${API_ADDR}" ] && sed -Ei "s|API_ADDR|${API_ADDR?}|g" /home/vault/storageconfig.hcl;
              [ -n "${RAFT_ADDR}" ] && sed -Ei "s|RAFT_ADDR|${RAFT_ADDR?}|g" /home/vault/storageconfig.hcl;

                SEAL_ADDR=""
                SEAL_TOKEN=""
                if [ -s /vault/userconfig/autounseal-kms-shim/token ]; then
                  if [ -s /vault/userconfig/autounseal-kms-shim/address ]; then
                    SEAL_ADDR="$(tr -d '\n' < /vault/userconfig/autounseal-kms-shim/address)"
                    echo "[vault] using seal provider: kms-shim (external address)"
                  else
                    SEAL_ADDR="http://kms-shim.vault-seal-system.svc:8200"
                    echo "[vault] using seal provider: kms-shim"
                  fi
                  SEAL_TOKEN="$(cat /vault/userconfig/autounseal-kms-shim/token)"
                else
                  echo "[vault] autounseal token missing (kms-shim-token)" >&2
                  exit 1
                fi

              [ -n "${SEAL_ADDR}" ] && sed -Ei "s|__VAULT_SEAL_ADDR__|${SEAL_ADDR?}|g" /home/vault/storageconfig.hcl;
              [ -n "${SEAL_TOKEN}" ] && sed -Ei "s|__VAULT_SEAL_TOKEN__|${SEAL_TOKEN?}|g" /home/vault/storageconfig.hcl;
              docker-entrypoint.sh bao server -config=/home/vault/storageconfig.hcl
          ports:
            - containerPort: 8200
              name: http
              protocol: TCP
            - containerPort: 8201
              name: https-internal
              protocol: TCP
            - containerPort: 8202
              name: http-rep
              protocol: TCP
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      volumes:
        - name: config
          configMap:
            defaultMode: 420
