apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-tenant-dns-rfc2136-config
  namespace: vault-system
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 21600
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          serviceAccountName: vault-bootstrap
          restartPolicy: OnFailure
          containers:
            - name: tenant-dns-rfc2136-config
              image: registry.example.internal/deploykube/bootstrap-tools:1.4
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /scripts/tenant-dns-rfc2136.sh
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
                - name: root-token
                  mountPath: /vault/userconfig/root
                  readOnly: true
                - name: tenant-registry
                  mountPath: /tenant-registry
                  readOnly: true
          volumes:
            - name: script
              configMap:
                name: vault-tenant-dns-rfc2136-config-script
                defaultMode: 0755
            - name: root-token
              secret:
                secretName: vault-init
                items:
                  - key: root-token
                    path: token
            - name: tenant-registry
              configMap:
                name: deploykube-tenant-registry
                optional: true
                items:
                  - key: tenant-registry.yaml
                    path: tenant-registry.yaml
