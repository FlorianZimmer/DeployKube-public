apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-jwt-config
  namespace: vault-system
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 21600
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          serviceAccountName: vault-bootstrap
          restartPolicy: OnFailure
          containers:
            - name: jwt-config
              image: registry.example.internal/deploykube/bootstrap-tools:1.4
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /scripts/jwt-config.sh
              env:
                - name: VAULT_ADDR
                  value: http://vault.vault-system.svc:8200
                - name: BAO_ADDR
                  value: http://vault.vault-system.svc:8200
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
                - name: root-token
                  mountPath: /vault/userconfig/root
                  readOnly: true
          volumes:
            - name: script
              configMap:
                name: vault-jwt-config-script
                defaultMode: 0755
            - name: root-token
              secret:
                secretName: vault-init
                items:
                  - key: root-token
                    path: token
