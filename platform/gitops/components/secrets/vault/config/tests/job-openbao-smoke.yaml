apiVersion: batch/v1
kind: Job
metadata:
  name: openbao-smoke
  namespace: vault-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      annotations:
        sidecar.istio.io/nativeSidecar: 'true'
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
    spec:
      restartPolicy: Never
      containers:
        - name: smoke
          image: registry.example.internal/deploykube/bootstrap-tools:1.4
          imagePullPolicy: IfNotPresent
          env:
            - name: VAULT_ADDR
              value: http://vault-active.vault-system.svc:8200
            - name: MIN_VOTERS
              value: "1"
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail

              ISTIO_HELPER="/helpers/istio-native-exit.sh"
              [ -f "$ISTIO_HELPER" ] || { echo "missing istio-native-exit helper" >&2; exit 1; }
              . "$ISTIO_HELPER"
              trap deploykube_istio_quit_sidecar EXIT INT TERM

              command -v jq >/dev/null 2>&1 || { echo "missing dependency: jq" >&2; exit 1; }

              if [ ! -f /vault/userconfig/root/token ]; then
                echo "missing root token file" >&2
                exit 1
              fi
              token="$(cat /vault/userconfig/root/token)"
              if [ -z "${token}" ]; then
                echo "root token is empty" >&2
                exit 1
              fi

              min_voters="${MIN_VOTERS:-1}"

              echo "[openbao-smoke] sys/health"
              health="$(curl -sf "${VAULT_ADDR}/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200")"
              echo "${health}" | jq -e '.initialized == true' >/dev/null
              echo "${health}" | jq -e '.sealed == false' >/dev/null

              echo "[openbao-smoke] raft configuration"
              cfg="$(curl -sf -H "X-Vault-Token: ${token}" "${VAULT_ADDR}/v1/sys/storage/raft/configuration")"
              voters="$(echo "${cfg}" | jq -r '.data.config.servers | length')"
              if ! [[ "${voters}" =~ ^[0-9]+$ ]]; then
                echo "[openbao-smoke] invalid voters value: ${voters}" >&2
                exit 1
              fi
              if [ "${voters}" -lt "${min_voters}" ]; then
                echo "[openbao-smoke] FAIL: raft voters=${voters} < min_voters=${min_voters}" >&2
                exit 1
              fi

              echo "[openbao-smoke] kv read (secret/bootstrap)"
              curl -sf -H "X-Vault-Token: ${token}" "${VAULT_ADDR}/v1/secret/data/bootstrap" | jq -e '.data.data.message' >/dev/null

              echo "[openbao-smoke] ok"
          volumeMounts:
            - name: root-token
              mountPath: /vault/userconfig/root
              readOnly: true
            - name: istio-native-exit
              mountPath: /helpers
              readOnly: true
      volumes:
        - name: root-token
          secret:
            secretName: vault-init
            items:
              - key: root-token
                path: token
        - name: istio-native-exit
          configMap:
            name: istio-native-exit-script
            defaultMode: 0444
