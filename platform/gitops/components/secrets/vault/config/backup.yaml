apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-encryption
  namespace: vault-system
data:
  # Public key only (not secret): used to encrypt tier-0 backup artifacts at rest on the backup target.
  AGE_RECIPIENT: age1publicmirrorplaceholderxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vault-raft-backup
  namespace: vault-system
  annotations:
    # The local-path single-node profile uses WaitForFirstConsumer, so this PVC stays Pending
    # until a pod mounts it. Keep the PVC, but avoid bootstrap deadlocks by running a warmup
    # Job in the same early wave to become the first consumer.
    argocd.argoproj.io/sync-options: Prune=false
    # Ensure the PVC exists before any consumers.
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    darksite.cloud/backup: skip
    darksite.cloud/backup-skip-reason: backup-artifacts
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: shared-rwo
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-raft-backup-warmup
  namespace: vault-system
  annotations:
    # Run alongside the PVC so WaitForFirstConsumer StorageClasses can bind immediately.
    argocd.argoproj.io/sync-wave: "-1"
    # Job pod templates are immutable; force delete/create on drift (for example image reference updates).
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  backoffLimit: 0
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: Never
      containers:
      - name: warmup
        image: registry.example.internal/deploykube/bootstrap-tools:1.4
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          set -euo pipefail
          # Mount the PVC once to trigger PV binding for WaitForFirstConsumer StorageClasses.
          ls -la /backup >/dev/null
        volumeMounts:
        - name: backup
          mountPath: /backup
      volumes:
      - name: backup
        persistentVolumeClaim:
          claimName: vault-raft-backup
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-raft-backup
  namespace: vault-system
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 1800
      ttlSecondsAfterFinished: 21600
      template:
        metadata:
          annotations:
            sidecar.istio.io/nativeSidecar: 'true'
            proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
        spec:
          serviceAccountName: vault-bootstrap
          restartPolicy: OnFailure
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                # Prefer non-control-plane nodes when present, but remain schedulable on single-node clusters.
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: DoesNotExist
                - weight: 50
                  preference:
                    matchExpressions:
                      - key: node-role.kubernetes.io/master
                        operator: DoesNotExist
          containers:
          - name: snapshot
            image: registry.example.internal/deploykube/bootstrap-tools:1.4
            imagePullPolicy: IfNotPresent
            env:
              - name: AGE_RECIPIENT
                valueFrom:
                  configMapKeyRef:
                    name: backup-encryption
                    key: AGE_RECIPIENT
            command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              ISTIO_HELPER="/helpers/istio-native-exit.sh"
              [ -f "$ISTIO_HELPER" ] || { echo "missing istio-native-exit helper" >&2; exit 1; }
              . "$ISTIO_HELPER"
              trap deploykube_istio_quit_sidecar EXIT INT TERM

              command -v jq >/dev/null 2>&1 || { echo "missing dependency: jq" >&2; exit 1; }
              command -v sha256sum >/dev/null 2>&1 || { echo "missing dependency: sha256sum" >&2; exit 1; }
              command -v age >/dev/null 2>&1 || { echo "missing dependency: age" >&2; exit 1; }
              : "${AGE_RECIPIENT:?missing AGE_RECIPIENT}"

              if [ ! -f /vault/userconfig/root/token ]; then
                echo "missing vault root token" >&2
                exit 1
              fi

              token="$(cat /vault/userconfig/root/token)"
              if [ -z "$token" ]; then
                echo "vault root token is empty" >&2
                exit 1
              fi

              # Prefer the active Vault service so we always hit the leader in HA setups.
              vault_addr="http://vault-active.vault-system.svc:8200"

              timestamp="$(date -u +%Y%m%d-%H%M%S)"
              out="/backup/vault-core-${timestamp}.snap.age"
              out_tmp="${out}.tmp"
              tmp="/tmp/vault-core-${timestamp}.snap"
              rm -f "${tmp}" "${out_tmp}"

              # Note: `vault operator raft snapshot save` currently fails in this deployment with
              # "incomplete snapshot, unable to read SHA256SUMS.sealed file". Fetch the snapshot
              # via the HTTP API instead and validate the tar layout.
              echo "saving core raft snapshot to ${out} (via HTTP API against ${vault_addr})"
              for i in 1 2 3 4 5; do
                if curl -fL --show-error \
                  --connect-timeout 5 \
                  --max-time 600 \
                  -H "X-Vault-Token: ${token}" \
                  "${vault_addr}/v1/sys/storage/raft/snapshot" \
                  -o "${tmp}"; then
                  break
                fi
                echo "snapshot fetch failed (attempt ${i}/5); retrying..." >&2
                rm -f "${tmp}"
                sleep "${i}"
              done
              [ -s "${tmp}" ] || { echo "snapshot fetch failed (no output)" >&2; exit 1; }

              python3 - <<PY
              import sys
              import tarfile
              snap_path = "${tmp}"
              with tarfile.open(snap_path, "r:*") as tf:
                names = set(tf.getnames())
              required = {"meta.json", "state.bin"}
              missing = required - names
              if missing:
                print(f"snapshot tar missing: {sorted(missing)}", file=sys.stderr)
                sys.exit(1)
              PY

              age -r "${AGE_RECIPIENT}" -o "${out_tmp}" "${tmp}"
              mv "${out_tmp}" "${out}"
              rm -f "${tmp}"

              sha="$(sha256sum "${out}" | awk '{print $1}')"
              ts_rfc3339="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              marker_tmp="$(mktemp)"
              jq -n \
                --arg timestamp "${ts_rfc3339}" \
                --arg status "ok" \
                --arg source "vault-core" \
                --arg artifact "$(basename "${out}")" \
                --arg artifactSha256 "${sha}" \
                '{timestamp:$timestamp,status:$status,source:$source,artifacts:[$artifact],artifactSha256:$artifactSha256}' > "${marker_tmp}"
              chmod 0644 "${marker_tmp}"
              mv "${marker_tmp}" /backup/LATEST.json
            volumeMounts:
              - name: backup
                mountPath: /backup
              - name: root-token
                mountPath: /vault/userconfig/root
                readOnly: true
              - name: istio-native-exit
                mountPath: /helpers
                readOnly: true
          volumes:
          - name: backup
            persistentVolumeClaim:
              claimName: vault-raft-backup
          - name: root-token
            secret:
              secretName: vault-init
              items:
              - key: root-token
                path: token
          - name: istio-native-exit
            configMap:
              name: istio-native-exit-script
              defaultMode: 0444
