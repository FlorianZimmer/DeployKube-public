apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-tenant-smoke-backup-crypto-delete
  namespace: vault-system
spec:
  # Suspended by default: crypto-delete is an operator action.
  schedule: "43 4 * * *"
  suspend: true
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 21600
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          serviceAccountName: vault-bootstrap
          restartPolicy: Never
          containers:
            - name: crypto-delete
              image: registry.example.internal/deploykube/bootstrap-tools:1.4
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /scripts/tenant-smoke-backup-crypto-delete.sh
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
                - name: root-token
                  mountPath: /vault/userconfig/root
                  readOnly: true
          volumes:
            - name: script
              configMap:
                name: vault-tenant-smoke-backup-crypto-delete-script
                defaultMode: 0755
            - name: root-token
              secret:
                secretName: vault-init
                items:
                  - key: root-token
                    path: token

