apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-tenant-backup-provisioner-role
  namespace: vault-system
spec:
  # Intentionally offset from :00 to avoid top-of-hour kube-apiserver contention.
  schedule: "13 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 21600
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          serviceAccountName: vault-bootstrap
          restartPolicy: OnFailure
          containers:
            - name: reconcile-role
              image: registry.example.internal/deploykube/bootstrap-tools:1.4
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /scripts/tenant-backup-provisioner-role.sh
              env:
                - name: VAULT_K8S_AUTH_MOUNT
                  value: kubernetes
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
                - name: root-token
                  mountPath: /vault/userconfig/root
                  readOnly: true
                - name: tenant-registry
                  mountPath: /tenant-registry
                  readOnly: true
          volumes:
            - name: script
              configMap:
                name: vault-tenant-backup-provisioner-role-script
                defaultMode: 0755
            - name: root-token
              secret:
                secretName: vault-init
                items:
                  - key: root-token
                    path: token
            - name: tenant-registry
              configMap:
                name: deploykube-tenant-registry
                optional: true
                items:
                  - key: tenant-registry.yaml
                    path: tenant-registry.yaml
