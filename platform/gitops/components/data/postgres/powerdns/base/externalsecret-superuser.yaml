apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: powerdns-postgres-superuser
  labels:
    app.kubernetes.io/name: powerdns-postgres
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-core
  target:
    name: powerdns-postgres-superuser
    creationPolicy: Owner
    template:
      mergePolicy: Merge
      type: Opaque
      data:
        username: postgres
  data:
    - secretKey: password
      remoteRef:
        key: dns/powerdns/postgres
        property: password
