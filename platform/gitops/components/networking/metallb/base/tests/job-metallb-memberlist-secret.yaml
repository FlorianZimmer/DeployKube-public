apiVersion: batch/v1
kind: Job
metadata:
  name: metallb-memberlist-secret
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: Never
      serviceAccountName: metallb-memberlist
      containers:
        - name: bootstrap
          image: registry.example.internal/deploykube/bootstrap-tools:1.4
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail

              dump_on_error() {
                echo "[metallb-memberlist] diagnostics (best-effort)" >&2
                kubectl -n metallb-system get secret memberlist -o yaml >&2 || true
                kubectl -n metallb-system get deploy metallb-controller -o wide >&2 || true
                kubectl -n metallb-system get ds metallb-speaker -o wide >&2 || true
                kubectl -n metallb-system get events --sort-by=.lastTimestamp >&2 || true
              }
              trap dump_on_error ERR

              if kubectl -n metallb-system get secret memberlist >/dev/null 2>&1; then
                echo "[metallb-memberlist] Secret/memberlist already exists; nothing to do"
                exit 0
              fi

              echo "[metallb-memberlist] creating Secret/memberlist (encrypt memberlist traffic)"
              key="$(openssl rand -base64 128)"
              kubectl -n metallb-system create secret generic memberlist \
                --from-literal=secretkey="${key}" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "[metallb-memberlist] restarting metallb-controller + metallb-speaker to pick up the new secret"
              kubectl -n metallb-system rollout restart deploy/metallb-controller
              kubectl -n metallb-system rollout restart ds/metallb-speaker

              echo "[metallb-memberlist] ok"

