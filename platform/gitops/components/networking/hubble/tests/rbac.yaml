apiVersion: v1
kind: ServiceAccount
metadata:
  name: hubble-posture
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hubble-posture
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["services", "events"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hubble-posture
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hubble-posture
subjects:
  - kind: ServiceAccount
    name: hubble-posture
    namespace: kube-system

