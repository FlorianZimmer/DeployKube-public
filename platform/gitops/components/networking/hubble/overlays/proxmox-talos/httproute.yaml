apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble-ui
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  hostnames:
    - hubble.prod.internal.example.com
  parentRefs:
    - name: public-gateway
      namespace: istio-system
      sectionName: https-hubble
  rules:
    - backendRefs:
        - name: hubble-auth-proxy
          port: 80
