apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: istio-system
resources:
  - ../../base
  - configmap-kiali-cabundle.yaml
  - httproute.yaml
  - tests/job-kiali-oidc-smoke.yaml
helmGlobals:
  # Vendored chart shared at component root.
  chartHome: ../../charts
helmCharts:
  - name: kiali-server
    version: 2.15.0
    releaseName: kiali
    namespace: istio-system
    valuesFile: values.yaml
patches:
  - path: patch-vpa-requests-deployment-kiali.yaml
  - path: patch-login-token-signing-key-init.yaml
  - path: patch-ha-tier-labels.yaml
