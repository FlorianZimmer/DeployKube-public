apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kiali
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  hostnames:
    - kiali.dev-single.internal.example.com
  parentRefs:
    - name: public-gateway
      namespace: istio-system
      sectionName: https-kiali
  rules:
    - backendRefs:
        - name: kiali
          port: 20001
