apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: istio-system

resources:
  - destinationrule.yaml

helmGlobals:
  # Vendored chart to avoid runtime outbound fetches from Argo repo-server.
  chartHome: charts

helmCharts:
  - name: kiali-server
    version: 2.15.0
    releaseName: kiali
    namespace: istio-system
    valuesFile: values.yaml
