apiVersion: v1
kind: ServiceAccount
metadata:
  name: istio-mesh-posture-smoke
  namespace: platform-ops
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: istio-mesh-posture-smoke
  namespace: platform-ops
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log", "services", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: istio-mesh-posture-smoke
  namespace: platform-ops
  annotations:
    argocd.argoproj.io/sync-wave: "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: istio-mesh-posture-smoke
subjects:
  - kind: ServiceAccount
    name: istio-mesh-posture-smoke
    namespace: platform-ops
