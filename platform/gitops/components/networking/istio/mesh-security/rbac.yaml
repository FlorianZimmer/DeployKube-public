apiVersion: v1
kind: ServiceAccount
metadata:
  name: mesh-security-verifier
  namespace: istio-system
  labels:
    deploykube.gitops/component: networking-istio
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mesh-security-verifier
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mesh-security-verifier
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mesh-security-verifier
subjects:
  - kind: ServiceAccount
    name: mesh-security-verifier
    namespace: istio-system
