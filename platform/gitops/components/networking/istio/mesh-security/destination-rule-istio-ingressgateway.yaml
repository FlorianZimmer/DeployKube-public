apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: istio-ingressgateway
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "4.6"
spec:
  host: istio-ingressgateway.istio-system.svc.cluster.local
  trafficPolicy:
    tls:
      # The Gateway's public ports (80/443) serve HTTP/TLS for non-mesh clients.
      # Disable mesh mTLS here so in-mesh workloads can reach the Gateway using
      # standard HTTP/TLS (e.g. smokes that probe external hostnames via SNI).
      mode: DISABLE
