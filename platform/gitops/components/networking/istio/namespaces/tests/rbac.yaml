apiVersion: v1
kind: ServiceAccount
metadata:
  name: istio-namespaces-smoke
  namespace: istio-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: istio-namespaces-smoke
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: istio-namespaces-smoke
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: istio-namespaces-smoke
subjects:
  - kind: ServiceAccount
    name: istio-namespaces-smoke
    namespace: istio-system

