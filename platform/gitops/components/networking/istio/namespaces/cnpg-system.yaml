apiVersion: v1
kind: Namespace
metadata:
  name: cnpg-system
  labels:
    deploykube.gitops/component: cnpg-operator
    deploykube.gitops/owner: data
    # CNPG admission webhooks are called directly by the kube-apiserver; keep CNPG out-of-mesh.
    istio-injection: disabled
    observability.grafana.com/tenant: platform
