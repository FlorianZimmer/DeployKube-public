phase: phase-1-explicit-drift-check
kubernetes_version: "1.34.2"
talos_version: "v1.10.8"
review_scope: >-
  Kubernetes-managed CoreDNS root block (`.:53`) that DeployKube currently
  commits outside the marker-delimited stub-domain block.
update_expectation: >-
  When Kubernetes/Talos bumps adjust the distro-managed CoreDNS skeleton,
  review the upstream/root block, then update this baseline and
  base/coredns-configmap.yaml intentionally in the same change.
root_corefile: |-
  .:53 {
      errors
      health {
          lameduck 5s
      }
      ready
      log . {
          class error
      }
      prometheus :9153

      kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
          ttl 30
      }
      forward . /etc/resolv.conf {
         max_concurrent 1000
      }
      cache 30 {
         disable success cluster.local
         disable denial cluster.local
      }
      loop
      reload
      loadbalance
  }
