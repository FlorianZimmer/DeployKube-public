apiVersion: batch/v1
kind: Job
metadata:
  name: coredns-smoke
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-options: Replace=true
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 180
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
      labels:
        app.kubernetes.io/name: coredns-smoke
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      enableServiceLinks: false
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: smoke
          image: docker.io/library/busybox:1.36@sha256:b9598f8c98e24d0ad42c1742c32516772c3aa2151011ebaf639089bd18c605b8
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: PRIMARY_FQDN
              valueFrom:
                configMapKeyRef:
                  name: deploykube-dns-wiring
                  key: PRIMARY_FQDN
            - name: SECONDARY_FQDN
              valueFrom:
                configMapKeyRef:
                  name: deploykube-dns-wiring
                  key: SECONDARY_FQDN
            - name: STUB_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: deploykube-dns-wiring
                  key: STUB_DOMAIN
            - name: STUB_FORWARD_TARGET
              valueFrom:
                configMapKeyRef:
                  name: deploykube-dns-wiring
                  key: STUB_FORWARD_TARGET
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              echo "[coredns-smoke] cluster.local resolution"
              out="$(nslookup kubernetes.default.svc.cluster.local 2>&1)" || {
                echo "${out}"
                exit 1
              }
              echo "${out}"

              name_primary="${PRIMARY_FQDN}"
              name_secondary="${SECONDARY_FQDN}"

              echo "[coredns-smoke] stub-domain forwarding (${STUB_DOMAIN} -> ${STUB_FORWARD_TARGET})"
              out_primary="$(nslookup "${name_primary}" 2>&1)" || {
                echo "${out_primary}"
                exit 1
              }
              echo "${out_primary}"

              out_secondary="$(nslookup "${name_secondary}" 2>&1)" || {
                echo "${out_secondary}"
                exit 1
              }
              echo "${out_secondary}"

              parse_ip() {
                echo "$1" | awk '
                  /^Name:/ {found=1; next}
                  found && $1=="Address:" {print $2; exit}
                  found && $1=="Address" && $2 ~ /^[0-9]+:$/ {print $3; exit}
                '
              }

              ip_primary="$(parse_ip "${out_primary}")"
              ip_secondary="$(parse_ip "${out_secondary}")"

              if [ -z "${ip_primary}" ] || [ -z "${ip_secondary}" ]; then
                echo "[coredns-smoke] ERROR: failed to parse IPs (primary='${ip_primary}' secondary='${ip_secondary}')" >&2
                exit 1
              fi

              if [ "${ip_primary}" != "${ip_secondary}" ]; then
                echo "[coredns-smoke] ERROR: mismatch: primary=${ip_primary} secondary=${ip_secondary}" >&2
                exit 1
              fi

              r="wild-$$-$(date +%s)"
              wild_name="${r}.${STUB_DOMAIN}"
              out_wild="$(nslookup "${wild_name}" 2>&1)" || {
                echo "${out_wild}"
                exit 1
              }
              echo "${out_wild}"

              ip_wild="$(parse_ip "${out_wild}")"
              if [ -z "${ip_wild}" ]; then
                echo "[coredns-smoke] ERROR: failed to parse wildcard IP for ${wild_name}" >&2
                exit 1
              fi

              if [ "${ip_wild}" != "${ip_primary}" ]; then
                echo "[coredns-smoke] ERROR: wildcard mismatch: ${wild_name}=${ip_wild} primary=${ip_primary}" >&2
                exit 1
              fi

              echo "[coredns-smoke] OK: primary/secondary/wildcard -> ${ip_primary}"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
