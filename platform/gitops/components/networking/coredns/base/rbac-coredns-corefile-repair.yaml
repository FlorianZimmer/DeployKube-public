apiVersion: v1
kind: ServiceAccount
metadata:
  name: coredns-corefile-repair
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: coredns-corefile-repair
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["coredns"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coredns-corefile-repair
  namespace: kube-system
subjects:
  - kind: ServiceAccount
    name: coredns-corefile-repair
    namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: coredns-corefile-repair
